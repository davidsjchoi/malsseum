<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말씀함께 · 관리자 v1.7.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== v0.95 디자인 토큰 — 탈교회화 화이트+미색, sage/terra/plum ===== */
:root{
  --bg:#FAF7F0; --bg-card:#FFFFFF; --bg-soft:#F5F3EE; --bg-cream:#F2EAD8; --bg-cream-soft:#FBF7EE;
  --ink:#1A1F1D; --ink-2:#4A524E; --ink-3:#8B8E89; --ink-4:#B8BAB6;
  --sage:#B89A6B; --sage-mid:#CDB994; --sage-soft:#E6DAC1; --sage-pale:#F4EEE1; --sage-dark:#8C7350; --sage-deep:#6E5A3C;
  --terra:#C97757; --terra-soft:#F5E5D8; --plum:#7A4D72; --plum-soft:#F0E3ED;
  --sky:#5E81A8; --sky-soft:#E4ECF4;
  --ok:#5A9286; --ok-soft:#E3F0EC; --warn:#B07A2E; --warn-soft:#FBF0E2; --bad:#B0432E; --bad-soft:#F6DED7;
  --line:#ECECE8; --line-soft:#F4F3EF;
  --serif:'Noto Serif KR',serif;
  --sans:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
  --en:'Inter','Pretendard',-apple-system,sans-serif;
  --shadow-sm:0 1px 2px rgba(26,31,29,.04); --shadow-md:0 4px 18px rgba(26,31,29,.06); --shadow-lg:0 14px 40px rgba(26,31,29,.10);
  --radius:16px; --radius-sm:10px; --radius-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.en{font-family:var(--en)}
button{font-family:inherit}
a{color:inherit}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#e0ddd5;border-radius:9px}::-webkit-scrollbar-track{background:transparent}

/* ===== 레이아웃 ===== */
.layout{display:flex;min-height:100vh}
.sidebar{width:236px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:20px 18px 16px}
.side-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,var(--sage-mid),var(--sage-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:19px;box-shadow:var(--shadow-sm)}
.side-brand-text{font-family:var(--serif);font-weight:700;font-size:16px;letter-spacing:-.3px}
.side-brand-sub{font-family:var(--en);font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.4px;margin-top:1px}
.side-nav{flex:1;overflow-y:auto;padding:6px 12px 12px}
.side-group-label{font-size:10.5px;font-weight:700;color:var(--ink-4);letter-spacing:.6px;padding:14px 10px 7px;text-transform:uppercase;font-family:var(--en)}
.side-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;color:var(--ink-2);font-size:13.5px;font-weight:600;letter-spacing:-.2px;transition:background .14s,color .14s;position:relative}
.side-item svg{width:18px;height:18px;flex-shrink:0;color:var(--ink-3);transition:color .14s}
.side-item:hover{background:var(--bg-soft)}
.side-item.active{background:var(--sage-pale);color:var(--sage-deep)}
.side-item.active svg{color:var(--sage-dark)}
.side-badge{margin-left:auto;background:var(--terra);color:#fff;font-family:var(--en);font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:flex;align-items:center;justify-content:center}
.side-bottom{padding:12px;border-top:1px solid var(--line)}
.side-user{display:flex;align-items:center;gap:10px;padding:7px 6px}
.side-user-av{width:32px;height:32px;border-radius:50%;background:var(--sage-soft);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.side-user-name{font-size:13px;font-weight:700}
.side-user-role{font-size:11px;color:var(--ink-3)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(252,250,245,.85);backdrop-filter:saturate(1.1) blur(8px);position:sticky;top:0;z-index:20}
.topbar-title{font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:-.4px}
.topbar-title small{font-family:var(--en);font-size:12px;font-weight:500;color:var(--ink-3);margin-left:8px;letter-spacing:0}
.topbar-right{display:flex;align-items:center;gap:9px}
.demo-chip{font-family:var(--en);font-size:10.5px;font-weight:700;color:var(--sage-deep);background:var(--sage-pale);border:1px solid var(--sage-soft);padding:4px 9px;border-radius:99px;letter-spacing:.5px}
.content{flex:1;padding:26px 28px 60px;max-width:1080px;width:100%}
.view{display:none}.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== 공용 컴포넌트 ===== */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--bg-card);color:var(--ink);font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;transition:all .14s;letter-spacing:-.2px}
.btn:hover{background:var(--bg-soft)}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--sage-dark);border-color:var(--sage-dark);color:#fff}
.btn-primary:hover{background:var(--sage-deep)}
.btn-ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(.96)}
.btn-bad{background:var(--bg-card);border-color:var(--bad-soft);color:var(--bad)}.btn-bad:hover{background:var(--bad-soft)}
.btn-ghost{background:transparent}
.btn-sm{padding:6px 11px;font-size:12px}
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.section-title{font-family:var(--serif);font-size:16px;font-weight:700;margin:26px 0 12px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}
.muted{color:var(--ink-3)}
.hint{font-size:12.5px;color:var(--ink-3);line-height:1.65}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.stat{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
.stat-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.stat-ic svg{width:18px;height:18px}
.stat-num{font-family:var(--en);font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.stat-num small{font-size:13px;color:var(--ink-3);font-weight:600;margin-left:3px}
.stat-label{font-size:12.5px;color:var(--ink-3);font-weight:600;margin-top:5px}
.ic-sage{background:var(--sage-pale);color:var(--sage-dark)}.ic-terra{background:var(--terra-soft);color:var(--terra)}
.ic-plum{background:var(--plum-soft);color:var(--plum)}.ic-sky{background:var(--sky-soft);color:var(--sky)}
.ic-ok{background:var(--ok-soft);color:var(--ok)}.ic-warn{background:var(--warn-soft);color:var(--warn)}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .14s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--sage-deep);border-bottom-color:var(--sage-dark)}
.tab-count{background:var(--bg-soft);color:var(--ink-3);font-family:var(--en);font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:99px}
.tab.active .tab-count{background:var(--sage-pale);color:var(--sage-dark)}

/* list rows / review cards */
.rev-card{border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.rev-card.rejected{background:#FCF7F5;border-color:var(--bad-soft)}
.rev-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:-.2px}
.badge.review{background:var(--warn-soft);color:var(--warn)}
.badge.rejected{background:var(--bad-soft);color:var(--bad)}
.badge.published{background:var(--ok-soft);color:var(--ok)}
.badge.cat{background:var(--bg-soft);color:var(--ink-3);font-weight:600}
.rev-meta{font-size:11.5px;color:var(--ink-3)}
.rev-title{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:-.3px;margin:2px 0 6px}
.rev-body{font-size:13px;color:var(--ink-2);line-height:1.7;max-height:4.8em;overflow:hidden;position:relative}
.rev-body.open{max-height:none}
.rev-reason{margin-top:10px;font-size:12.5px;color:var(--bad);background:var(--bad-soft);padding:8px 11px;border-radius:9px}
.rev-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.empty{text-align:center;padding:50px 20px;color:var(--ink-4)}
.empty svg{width:40px;height:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--ink-3)}

/* generic list */
.lrow{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.lrow-av{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:var(--sage-soft);color:var(--sage-deep)}
.lrow-main{flex:1;min-width:0}
.lrow-title{font-size:13.5px;font-weight:700;letter-spacing:-.2px}
.lrow-sub{font-size:12px;color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lrow-actions{display:flex;gap:7px;flex-shrink:0}
.scope-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg-soft);color:var(--ink-3)}
.scope-pill.church{background:var(--sage-pale);color:var(--sage-dark)}
.scope-pill.urgent{background:var(--bad-soft);color:var(--bad)}
.scope-pill.committee{background:var(--plum-soft);color:var(--plum)}
.is-hidden{opacity:.5}

/* preset / policy */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.preset{border:1.5px solid var(--line);border-radius:14px;padding:15px;cursor:pointer;transition:all .14s;background:var(--bg-card)}
.preset:hover{border-color:var(--sage-mid)}
.preset.on{border-color:var(--sage-dark);background:var(--sage-pale)}
.preset-name{font-size:13.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.preset-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--ink-4);display:flex;align-items:center;justify-content:center}
.preset.on .preset-check{background:var(--sage-dark);border-color:var(--sage-dark)}
.preset.on .preset-check svg{width:11px;height:11px;color:#fff;display:block}
.preset-check svg{display:none}
.tier-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tier-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--bg-soft);color:var(--ink-2)}
.tier-arrow{color:var(--ink-4);font-size:11px}
.tier-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tier-edit-row .idx{width:26px;height:26px;border-radius:8px;background:var(--sage-pale);color:var(--sage-dark);font-family:var(--en);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* seg */
.seg{display:inline-flex;gap:4px;background:var(--bg-soft);padding:4px;border-radius:11px}
.seg-btn{border:none;background:transparent;cursor:pointer;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-3);transition:all .14s}
.seg-btn.on{background:var(--bg-card);color:var(--sage-deep);box-shadow:0 1px 3px rgba(110,90,60,.14)}

/* method cards */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.method-card{border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:all .14s}
.method-card.on{border-color:var(--sage-dark);background:var(--sage-pale)}
.method-card h4{font-family:var(--serif);font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.method-en{font-family:var(--en);font-size:11px;color:var(--ink-3);font-weight:600}
.method-steps{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.method-step{display:flex;gap:8px;font-size:12.5px;color:var(--ink-2)}
.method-step .n{font-family:var(--en);font-weight:700;color:var(--sage-dark)}

/* fields */
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.field .sub{font-weight:500;color:var(--ink-3);font-size:11.5px;margin-left:5px}
.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--ink);background:var(--bg-card);transition:border .14s}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--sage-mid)}
.textarea{resize:vertical;min-height:110px;line-height:1.7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.switch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--line);border-radius:13px;background:var(--bg-card);margin-bottom:10px}
.switch-info h4{font-size:13.5px;font-weight:700}
.switch-info p{font-size:12px;color:var(--ink-3);margin-top:3px}
.toggle{width:46px;height:27px;border-radius:99px;background:var(--ink-4);position:relative;cursor:pointer;transition:background .18s;flex-shrink:0;border:none}
.toggle.on{background:var(--sage-dark)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(19px)}
.note{background:var(--sage-pale);border:1px solid var(--sage-soft);border-radius:12px;padding:14px 16px;font-size:12.5px;color:var(--sage-deep);line-height:1.7}
.note b{color:var(--sage-deep)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,31,29,.42);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.open{display:flex;animation:fade .18s ease}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:540px;max-height:88vh;overflow-y:auto}
.modal-head{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:var(--serif);font-size:18px;font-weight:700}
.modal-x{border:none;background:var(--bg-soft);width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--ink-3);font-size:18px;line-height:1}
.modal-body{padding:18px 24px}
.modal-foot{padding:0 24px 22px;display:flex;gap:9px;justify-content:flex-end}

/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:200;box-shadow:var(--shadow-lg);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  .sidebar{width:64px}.side-brand-text,.side-brand-sub,.side-item span:not(.side-badge),.side-group-label,.side-user-info{display:none}
  .side-item{justify-content:center}.method-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-brand">
      <div class="side-mark">함</div>
      <div>
        <div class="side-brand-text">말씀함께</div>
        <div class="side-brand-sub en">ADMIN · v1.7.1</div>
      </div>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-bottom">
      <div class="side-user">
        <div class="side-user-av">관</div>
        <div class="side-user-info">
          <div class="side-user-name">관리자</div>
          <div class="side-user-role" id="sideChurch">우리 교회</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 class="topbar-title" id="pageTitle">대시보드 <small class="en">Dashboard</small></h1>
      <div class="topbar-right">
        <span class="demo-chip en">DEMO</span>
        <button class="btn btn-sm" onclick="openUserApp()">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          사용자 앱
        </button>
      </div>
    </div>
    <div class="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-column"></div>
      <div class="view" id="view-tiers"></div>
      <div class="view" id="view-method"></div>
      <div class="view" id="view-subscription"></div>
      <div class="view" id="view-devotional"></div>
      <div class="view" id="view-pdf"></div>
      <div class="view" id="view-prayer"></div>
      <div class="view" id="view-pwj"></div>
      <div class="view" id="view-rooms"></div>
      <div class="view" id="view-settings"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toast"></div>

<script>
/* ====================================================================
   말씀함께 관리자 v1.5 — 사용자 앱과 동일한 localStorage 키 공유
   ==================================================================== */
const STORAGE_KEYS = {
  user:'mh_v05_user', prefs:'mh_v05_prefs',
  columnState:'mh_v05_column_state', columnsCustom:'mh_v05_columns_custom',
  prayers:'mh_v05_prayers', prayersHidden:'mh_v05_prayers_hidden', prayersSeedVersion:'mh_v05_prayers_seed_version',
  devotionalsCustom:'mh_v05_devotionals_custom',
  homeBanner:'mh_v05_home_banner',   // v0.98 — 홈 배너
  homePhoto:'mh_v05_home_photo',     // v1.7 — 홈 '오늘의 말씀' 박스 배경 사진
  familyWorship:'mh_v05_family_worship',
  pwj:'mh_v05_pwj_content',   // v1.6.1 — 예수동행기도 콘텐츠(앱 중보기도 탭 상단)
  rooms:'mh_v06_rooms', roomPosts:'mh_v06_room_posts', roomPostsHidden:'mh_v06_room_posts_hidden',
};
function _read(k,f){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):(f!==undefined?f:null);}catch(e){return f!==undefined?f:null;} }
function _write(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function getPrefs(){ return Object.assign({fontSize:'m',notifications:true,churchName:'우리 교회',medMethod:'lectio',lang:'ko',groupPreset:'shepherd'}, _read(STORAGE_KEYS.prefs,{})); }
function setPrefs(patch){ _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefs(), patch)); }
function getChurchName(){ const n=(getPrefs().churchName||'').trim(); return n||'우리 교회'; }
function getUser(){ return Object.assign({name:'성도님',subscribed:false}, _read(STORAGE_KEYS.user,{})); }
function setUser(patch){ _write(STORAGE_KEYS.user, Object.assign({}, getUser(), patch)); }

function getGroupTiers(){
  const p=getPrefs();
  let names=Array.isArray(p.groupTiers)&&p.groupTiers.length?p.groupTiers:(GROUP_PRESETS[p.groupPreset]?GROUP_PRESETS[p.groupPreset].tiers:GROUP_PRESETS.shepherd.tiers);
  names=names.slice(0,4).map(n=>(n||'').trim()).filter(Boolean);
  if(!names.length) names=GROUP_PRESETS.shepherd.tiers.slice();
  return names.map((n,i)=>({key:TIER_KEYS[i],name:n}));
}

function ensureSubmissionSeed(){
  const all=_read(STORAGE_KEYS.columnsCustom,null);
  if(all===null){ _write(STORAGE_KEYS.columnsCustom, JSON.parse(JSON.stringify(COLUMN_SUBMISSIONS_SEED))); }

function allColumns(){ return _read(STORAGE_KEYS.columnsCustom,{}); }
function listSubmissions(){
  const all=allColumns();
  return Object.keys(all).map(k=>all[k]).filter(c=>c&&!c._deleted&&(c.status==='review'||c.status==='rejected')).sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
}
function listPublished(){
  const custom=allColumns(); const merged=[];
  COLUMNS_SEED.forEach(c=>{ const o=custom[c.id]; if(o&&o._deleted)return; merged.push(o?Object.assign({},c,o):c); });
  Object.keys(custom).forEach(id=>{ const c=custom[id]; if(c&&!c._deleted&&parseInt(id,10)>1000&&c.status==='published') merged.push(c); });
  return merged.filter(c=>!c.draft&&c.status!=='review'&&c.status!=='rejected');
}
function approveColumn(id){ const all=allColumns(); if(all[id]){all[id].status='published';all[id].draft=false;delete all[id].rejectReason;all[id].date=new Date().toLocaleDateString('ko-KR');_write(STORAGE_KEYS.columnsCustom,all);} }
function rejectColumn(id,reason){ const all=allColumns(); if(all[id]){all[id].status='rejected';all[id].draft=true;all[id].rejectReason=reason||'';_write(STORAGE_KEYS.columnsCustom,all);} }
function deleteSubmission(id){ const all=allColumns(); if(all[id]){all[id]._deleted=true;_write(STORAGE_KEYS.columnsCustom,all);} }
function addColumn(data){ const all=allColumns(); let id=1001; while(all[id])id++; all[id]=Object.assign({id,likes:0,reads:0,comments:[],draft:false,status:'published',date:new Date().toLocaleDateString('ko-KR'),pastor:'담임목사',role:'담임목사',church:getChurchName()},data); _write(STORAGE_KEYS.columnsCustom,all); }

function addPrayer({who,scope,body,urgent,committee,district,grove,cell}){
  const all=rawPrayers(); const newId=Math.max(0,...all.map(p=>p.id||0))+1;

function buildNav(){
  const el=document.getElementById('sideNav'); let h='';
  NAV.forEach(n=>{
    if(n.group){ h+=`<div class="side-group-label en">${n.group}</div>`; return; }
    const b=n.badge?n.badge():0;
    h+=`<div class="side-item" data-view="${n.id}" onclick="go('${n.id}')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">${n.icon}</svg>
      <span>${n.name}</span>${b>0?`<span class="side-badge en">${b}</span>`:''}</div>`;
  });
  el.innerHTML=h;
}
const RENDERERS={};
let current='dashboard';
function go(id){
  current=id;
  document.querySelectorAll('.side-item').forEach(e=>e.classList.toggle('active',e.dataset.view===id));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  const n=NAV.find(x=>x.id===id);
  document.getElementById('pageTitle').innerHTML=`${n.name} <small class="en">${n.en}</small>`;
  if(RENDERERS[id]) RENDERERS[id]();
  buildNav(); document.querySelectorAll('.side-item').forEach(e=>e.classList.toggle('active',e.dataset.view===id));
}

/* ── v1.7: 홈 '오늘의 말씀' 사진 관리 (사용자 앱 홈 말씀 박스 배경) ── */
const HOME_PHOTO_DEFAULT = 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1080&q=75';
function getHomePhotoAdmin(){ return _read(STORAGE_KEYS.homePhoto, null); }
function onHomePhotoPick(input){
  const f = input.files && input.files[0];
  if(!f) return;
  const rd = new FileReader();
  rd.onload = function(e){
    const img = new Image();
    img.onload = function(){
      /* 긴 변 1080px로 축소 + JPEG 압축 → localStorage 용량 보호 */
      const MAX = 1080;
      const scale = Math.min(1, MAX/Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.max(1, Math.round(img.width*scale));
      cv.height = Math.max(1, Math.round(img.height*scale));
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      let data;
      try{ data = cv.toDataURL('image/jpeg', 0.82); }catch(err){ data = e.target.result; }
      try{
        _write(STORAGE_KEYS.homePhoto, { img:data, name:f.name, updatedAt:Date.now() });
        toast('사진이 저장되었습니다 — 사용자 앱 홈에 즉시 반영됩니다');
      }catch(err){
        alert('사진 저장에 실패했습니다. 더 작은 사진으로 다시 시도해 주세요.');
      }
      RENDERERS.dashboard();
    };
    img.onerror = function(){ alert('이미지 파일을 읽을 수 없습니다.'); };
    img.src = e.target.result;
  };
  rd.readAsDataURL(f);
}
function clearHomePhoto(){
  if(!confirm('업로드한 사진을 삭제하고 기본 사진으로 되돌릴까요?')) return;
  localStorage.removeItem(STORAGE_KEYS.homePhoto);
  toast('기본 사진으로 되돌렸습니다'); RENDERERS.dashboard();
}

  urgent:{ title:"캐나다 ‘메가 산불’에 전역 비상..북미를 뒤덮은 주황빛 재앙", team:'관리자', date:'2026.07.19', body:"극심한 폭염 속 900여 건 동시다발 발생… 소실 면적 남한 4분의 1 넘어서\n독성 연기 남하로 토론토·뉴욕 등 북미 대도시 대기질 ‘최악’ 기록\n\n캐나다 전역이 기후변화가 초래한 역대급 대형 산불로 거대한 화염과 연기에 휩싸였다. 2026년 7월 중순 현재, 알버타와 브리티시컬럼비아(BC) 등 서부 지역부터 온타리오, 퀘벡 등 동부 지역에 이르기까지 캐나다 전역에서 약 900건의 산불이 동시다발적으로 타오르고 있다.\n\n올해 누적 소실 면적은 이미 250만 헥타르(ha)를 돌파했다. 이는 대한민국 전체 면적의 25%를 넘어서는 대규모다. 특히 온타리오주 북서부에서 발생한 ‘썬더베이 36’ 화재는 주변 불씨를 집어삼키며 단일 화재로만 35만 헥타르 이상을 태우는 등 통제 불능의 메가 산불로 돌변했다.\n\n문제는 화재 피해에 그치지 않는다. 강한 기류를 타고 남하한 거대한 산불 연기가 북미 대륙 전체의 일상을 마비시키고 있다. 지난 15일을 기점으로 캐나다 최대 도시 토론토의 하늘은 온통 주황색 독성 안개로 뒤덮였다. 토론토는 한때 ‘세계에서 대기질이 가장 나쁜 도시 1위’에 오르는 불명예를 안았으며, 공공 실외 행사와 체육시설이 전면 폐쇄됐다.\n\n이 재앙적인 연기는 국경을 넘어 미국 중서부와 북동부 20개 주까지 침투했다. 뉴욕, 시카고, 디트로이트 등 미 주요 대도시 주민들은 \"매캐한 플라스틱 탄 냄새가 진동한다\"며 고통을 호소했고, 미 당국은 수천만 명의 시민에게 대기질 경보를 발령했다. 병원 응급실에는 천식 등 호흡기 질환을 호소하는 환자들의 발길이 급증하고 있다.\n\n기후 전문가들은 이번 사태가 6월 말부터 이어진 이례적인 폭염과 장기 가뭄이 맞물린 결과라고 분석했다. 현장에서는 수천 명의 소방대원이 사투를 벌이고 있으나, 워낙 광범위한 지역에서 불길이 치솟아 진화에 난항을 겪고 있다. 기상청 관계자는 \"하늘에서 충분한 양의 비가 내리지 않는 한, 북미를 강타한 주황색 연기 공포는 당분간 지속될 것\"이라고 암울한 전망을 내놓았다.\n< 출처 : kbs뉴스, 연합뉴스>\n\n기도제목\n\n1. 주님. 캐나다 전역 번지고 있는 산불을 막아주소서. 900건의 산불을 사람의 힘으로 멈출 수 없습니다. 통제 불능의 메가 산불 뒤에 있는 강한 바람과 건조한 기후를 다스려 주시고, 오직 전능하신 주님의 손길로 불길을 막아 멈추어 주소서.\n\n2. 모든 불을 꺼뜨릴 비를 내려 주소서. 진화 인력의 손길이 닿지 못하는 깊은 오지와 산맥 구석구석까지 주님의 시원한 단비가 임하여, 타오르는 불길이 소멸하게 하소서.\n\n3. 캐나다 토론토부터 미국의 뉴욕, 시카고에 이르기까지 북미 전역을 뒤덮은 주황빛 독성 연기로 고통받는 수천만 명의 주민들을 살펴 주소서. 하루아침에 삶의 터전을 잃고 대피한 이재민들에게 속히 따뜻한 도움의 손길과 위로가 닿게 하소서.\n\n4. 산불을 진화하고 있는 소방관들의 안전을 지키시고 보호하여 주소서. 유독가스와 뜨거운 열기 속에서 목숨을 걸고 방어선을 구축하고 있는 모든 소방관과 자원봉사자들의 안전을 눈동자처럼 지켜 주소서.\n\n5. 이 거대한 자연의 위기 앞에서 인간의 교만을 내려놓고, 창조주 하나님만을 바라보며 두렵고 떨림으로 경외하게 하소서. 어려움을 지날 때 인간의 무력함을 깨닫고, 주님의 위대하심을 고백하게 하소서.\n\n6. 위기 앞에서 모든 나라가 연대하며 하나되게 하소서. 자국의 이기주의로 어려움에 있는 캐나다에 고통이 더하지 않게 하소서. 이웃을 사랑하며 도움의 손길을 더하는 위로의 시간이 되게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },

  { title:"대통령 낙태약 허용 검토 지시, 태아 생명 보호를 위한 바른법 제정 기도", team:"바른법제정팀", date:"2026.07.19", body:"◇ 대통령 낙태약 허용 검토 지시… 교계, 강력 반발\n\n이재명 대통령이 최근 모자보건법 개정 전이라도 경구용 유산 유도 의약품인 ‘미프진’ 처방의 허용 방안을 검토하라고 지시한 것을 두고 태아 생명보호 운동 단체들이 우려를 제기했다. 위기 임신부에게 약물을 주며 책임을 회피할 것이 아니라 아이를 낳고 기를 수 있는 실질적인 국가 책임 지원 체계를 마련해야 한다는 취지다.\n\n태아 생명보호 운동 연합체인 행동하는프로라이프(상임대표 이봉화)는 16일 성명을 내고 “대통령의 말 한마디로 낙태약을 허용할 수는 없다”며 관련 검토 지시 철회를 촉구했다.\n\n이 대통령은 지난 14일 국무회의에서 낙태 허용 기준이 되는 임신 주수를 둘러싼 입법 논의가 장기간 이어지고 있는 점을 언급하며 “문제가 해결되기 전이라도 의사가 재량으로 판단하게 허용한다든지, 주요 쟁점이 정리되기 전이라도 약품 판매를 허용할 수도 있는 것 아닌가”라고 말했다.\n\n행동하는프로라이프는 이에 대해 “충분한 법적·의료적 안전장치 없이 의사의 재량만으로 약물 사용을 허용하는 것은 태아의 생명과 여성의 안전 모두를 위협하는 선례가 될 수 있다”며 “모든 의료적·법적 책임을 여성 개인에게 떠넘길 우려가 있다”고 지적했다. 이어 “약물 낙태는 자궁외임신 여부 확인과 출혈·감염 관리, 불완전 유산 여부 확인 등 고도의 의료적 관리가 필요한 의료행위”라고 부연했다.\n\n교계와 생명운동 단체들은 미프진 문제를 단순히 의약품 허가 사안으로만 접근해서는 안 된다고 목소리를 높인다. 약물 낙태를 둘러싼 의료적 안전성과 함께 태아 생명 보호, 사회적 책임까지 종합적으로 논의해야 한다는 의견이다.\n\n전문가들은 생명권과 여성의 자기결정권 가운데 어느 한 가치만을 앞세우기보다 태아의 생명 보호와 여성 건강권을 함께 보장할 수 있는 사회적 합의를 마련해야 한다고 조언한다. 아울러 위기 임신부에 대한 상담과 돌봄, 실질적인 출산·양육 지원 확대와 함께 2019년 헌법재판소의 헌법불합치 결정 이후 이어진 낙태 관련 입법 공백을 해소하는 논의도 병행될 필요가 있다고 강조한다.\n\n이봉화 대표는 “헌법재판소 결정은 태아의 생명권과 여성의 자기결정권을 함께 고려하는 새로운 입법 체계를 마련하라는 취지”라며 “입법 공백을 이유로 또 행정적 판단만으로 약물 사용을 허용하는 것은 신중해야 한다”고 말했다.\n\n◇ \"부작용 심각한 고위험성 의약품 검증 없이 풀겠다는 것…중단해야\"\n\n국민의힘 윤용근 의원은 15일 \"어제 이재명 대통령이 법 개정 전이라도 낙태약 '미프진'을 판매 허용하라고 지시했다는 소식에 경악을 금치 못한다\"며 \"가장 약한 태아의 생명권을 유린하고 여성의 건강을 위협하는 졸속 '약물 낙태' 허용 시도를 강력히 규탄한다\"고 밝혔다.\n\n윤 의원은 이날 국회에서 장지영 이화여자대학교 부속 서울병원 교수와 가톨릭생명윤리연구소장 박은호 신부, 시민단체 태아·여성보호국민연합과 기자회견을 열고 \"헌법이 부여한 국가의 생명 수호 의무를 저버린 초법적 발상이자 국민의 생명을 담보로 벌이는 위험천만한 도박\"이라며 이같이 밝혔다.\n\n그는 \"가장 존엄해야 할 생명기본권을 존중하는 양심이 털끝만큼이라도 과연 있나\"라며 \"'해외 직구 사고 방지'라는 기만적인 핑계를 대고 있지만, 부작용이 심각한 고위험성 의약품을 검증과 안전 규정도 없이 풀겠다는 것은 여성의 건강을 해치는 위험한 발상\"이라고 했다.\n\n그러면서 \"정부는 법치를 파괴하는 위험천만한 약물 허용 시도를 즉각 중단하라. 태아의 생명권과 임신한 여성의 건강권을 지킬 실질적이고 근본적인 대책부터 내놓으라\"고 덧붙였다.\n\n아울러 윤 의원은 조만간 임신부 지원 및 태아 생명 보호를 위한 '태아생명 기본법'을 발의하겠다고 했다.\n\n앞서 이 대통령은 전날 주재한 국무회의에서 임신 중지 약물인 미프진 사용과 관련해 \"우리나라에선 허용이 안 돼 여성들이 해외에서 직구해 복용하는 모양\"이라며 \"의사의 양심과 재량에 맡기는 것도 하나의 방법으로, 이걸 방치해 처방 없이 해외에서 막 사서 투약하는 것보다 낫다\"고 말했다.\n\n◇ 李대통령 낙태약 언급에 정은경 보건복지부 장관 \"허가시 안전 기준 마련\"\n\n이 대통령이 최근 인공임신중절 의약품인 '미프진'의 적정 복용이 필요하다고 언급하면서 실제 도입 여부에 관심이 높아지고 있다. 정은경 보건복지부 장관은 \"(약을) 도입할 경우 안전 사용에 대한 기준 마련을 준비하고 있다\"고 밝혔다.\n\n정 장관은 지난 15일 복지부 정부세종청사에서 열린 하반기 업무보고 사전브리핑에서 '미프진' 관련 질문에 \"임신중지 약물 관련 낙태에 관한 헌법불합치 판정이 있었고 개선 입법을 하라는 요청이 있었는데 아직 입법이 미비한 부분에 대해 정부로서 책임감을 갖고 있다\"며 \"모자보건법 개정 등 필요한 부분을 국회와 논의하면서 진행하겠다\"고 밝혔다.\n\n이어 \"약제가 허가돼 도입할 경우 안전하게 사용할 수 있도록 의료계와 임상진료 지침 등 안전한 사용에 대한 기준을 마련하는 걸 준비하고 있다\"고 덧붙였다.\n\n◇ “저출산 극복해야 할 상황에 의사 재량으로 낙태약을?”\n\n한국교회연합(대표회장 천환 목사, 이하 한교연)이 이재명 대통령의 낙태약물 관련 발언을 비판하며 발언 취소를 촉구했다.\n\n한교연은 16일 발표한 성명에서 “낙태 약물 도입을 의사의 양심과 재량에 맡기자는 대통령의 무책임한 발언을 취소해야 한다”며 “국민의 생명과 안전에 대한 무책임한 회피일 뿐 아니라 생명 보호 최일선에 서 있는 대통령으로서 헌법적 의무를 방기한 매우 위험한 발언”이라고 주장했다.\n\n아울러 우리나라가 저출산으로 인한 인구 감소 위기에 직면한 상황을 언급하며 “정부와 종교계, 사회단체를 비롯해 온 국민이 국가의 앞날을 걱정하며 저출산 극복을 위해 지혜를 모으고 있는 상황에서 대통령이 곧 태어날 생명을 마음대로 없애도록 의사에게 재량권을 주자는 말을 해서는 안 된다”고 주장했다.\n\n그러면서 “태아는 작고 약하지만 반드시 보호받아야 할 귀중한 생명”이라며 “그 생명이 완전한 인격체로 성장하기까지 국가는 모든 책임을 다해야 한다”고 강조했다.\n<출처 : 뉴시스, 연합뉴스, 국민일보, 기독일보 종합>\n\n기도제목\n\n1. 주님, 생명의 주권이 오직 하나님께 있음을 고백합니다.\n우리나라와 열방 가운데 태아의 생명을 보호하는 바른 법이 세워지게 하시고, 입법부와 행정부, 사법부가 하나님의 뜻을 경외하며 생명을 존중하는 법과 제도를 이루는 도구로 쓰임받게 하소서.\n\n2. 생명의 거룩함이 무너져가는 이 시대를 긍휼히 여겨주소서.\n낙태죄 헌법불합치 결정 이후 입법 공백이 길어지는 가운데 태아의 생명이 방치되지 않게 하시고, 낙태약 도입과 관련된 모든 시도가 주님의 뜻 가운데 바로 서게 하소서. 상업적 이익과 편의의 논리가 아니라 생명을 보호하는 방향으로 법과 정책이 세워지게 하시고, 태아를 주님의 눈동자와 같이 지켜주소서.\n\n3. 생명을 인간의 선택 아래 둔 우리의 죄를 용서하여 주소서.\n편리와 선택이라는 이름으로 생명을 가볍게 여긴 죄를 긍휼히 여기시고, 태아를 ‘선택의 대상’이 아닌 ‘하나님의 형상’으로 바라보는 성경적 가치가 이 땅의 법과 정책 가운데 온전히 반영되게 하소서. 또한 생명을 포기하도록 내모는 사회 구조적 문제들도 주님께서 바로잡아 주소서.\n\n4. 임산부 지원 및 태아 생명 보호를 위한 ‘태아생명 기본법’이 주님의 뜻 가운데 세워지게 하소서.\n태중의 생명 또한 하나님께서 지으신 존귀한 존재임을 기억하게 하시고, 법적으로도 분명히 보호받게 하소서. 태아의 생명권과 임신한 여성의 건강권이 함께 존중받을 수 있도록, 실질적이고 근본적인 보호가 이루어지는 지혜로운 제도와 환경이 마련되게 하소서.\n\n5. 입법부와 행정부, 사법부 위에 하나님의 공의와 생명 존중의 정신이 굳게 서게 하소서.\n모든 공직자들이 사람의 눈이 아닌 하나님의 뜻을 두려워하며 판단하고 결정하게 하시고, 법과 정책이 태아의 생명권을 분명히 지키는 방향으로 바로 서게 하소서. 낙태를 정당화하고 확산시키려는 흐름을 막아주시고, 생명 보호를 우선하는 공의로운 법질서가 세워지게 하소서.\n\n6. 만군의 여호와의 말씀을 의지하여 기도합니다.\n이는 힘으로 되지 아니하며 능력으로 되지 아니하고 오직 주님의 영으로 이루어짐을 믿습니다. “내 백성”이라 부르시며 애통하시는 주님의 마음을 본받아, 이 땅의 입법부와 행정부와 사법부를 위하여 우리가 겸손히 주님을 구하게 하소서.\n여호와의 이름으로 일컫는 하나님의 백성들이 악한 길에서 떠나 스스로 낮추고 기도하며 여호와의 얼굴을 구하게 하소서. 주께서 이 땅을 고쳐주실 것을 믿음으로 끝까지 합심하여, 우리 한 몸 된 공동체를 위한 기도가 불일 듯 일어나게 하소서.\n\n예수님 이름으로 기도합니다. 아멘" },
  { title:"한국교회가 하나님의 사랑과 존중의 언어로 말하며 가르치게 하시고 기도하게 하소서", team:"한국교회팀", date:"2026.07.19", body:"혐오·조롱이 놀이가 된 교실…\"교회가 먼저 존중의 언어 가르쳐야\"\n\n고교 야구장에서 나온 조롱성 응원 구호가 징계와 경찰 수사로까지 이어지면서 학교 현장에 퍼진 조롱 문화가 수면 위로 드러났다. 온라인 유행어와 혐오 표현이 놀이처럼 소비되는 가운데, 다음세대에게 존중의 언어를 가르치는 교육이 절실하다는 목소리가 커지고 있다.\n\n논란은 지난달 29일 서울 목동구장에서 열린 제81회 청룡기 전국고교야구선수권대회 배재고와 광주제일고의 경기에서 불거졌다. 당시 배재고 야구부 일부 학생들은 광주와 5·18민주화운동을 조롱하는 응원 구호를 외쳤다. 사건이 알려지자 대한야구소프트볼협회는 배재고 야구부에 전국대회 출전정지 6개월의 징계를 내렸다.\n\n배재고 야구부 학생과 지도자, 학부모, 교직원 등 86명은 지난 6일 광주일고를 찾아 공식 사과했다. 야구부 주장과 감독은 광주일고 학생과 학부모, 광주시민에게 사과의 뜻을 전하며 재발 방지를 약속했다.\n\n하지만 이번 일을 특정 학교 학생들의 일탈로만 볼 수 없다는 지적이 나온다. 외모와 장애, 출신 지역 등을 희화화하는 표현이 온라인에서 '밈'과 유행어로 소비되면서 학교 현장까지 자연스럽게 스며들고 있기 때문이다.\n\n무엇보다 교회가 다음세대에게 존중의 언어와 공감의 가치를 먼저 가르쳐야 한다는 주문도 나온다. 혐오 표현을 단순히 금지하는 데 그치지 않고, 학생들이 일상에서 접하는 언어와 온라인 문화를 성경적 가치관으로 분별하도록 돕는 교육이 필요하다는 것이다.\n\n기독교학교교육연구소 소장은 \"교회학교는 성경 지식을 전달하는 데 그치지 말고 학생들이 사용하는 언어와 온라인 콘텐츠, 또래문화를 함께 살펴야 한다\"며 \"유행하는 표현을 무분별하게 따라 하지 않고, 그 말이 끼칠 영향력을 판단하는 힘을 길러줘야 한다\"고 말했다. 또한 \"경쟁 중심 사회에서 쌓인 스트레스가 조롱과 공격적인 언어로 표출되지 않도록 근본적인 교육이 필요하다\"며 \"이번 사건이 우리 사회의 언어문화를 성찰하는 계기가 돼야 한다\"고 강조했다. <출처 : 데일리굿뉴스>\n\n기도제목\n\n1. 세상의 물질만능주의와 성공지향주의에 휩쓸려 내가 왕이 되려고 나를 보호하고 방어해야 한다고 합리화하며 내 마음대로 판단하고 평가했던 교만함과 언어의 습관들을 용서하여 주소서. 하나님을 먼저 믿은 어른인 우리가 하나님이 나의 주인되시며 하나님의 통치하심에 순종하지 못해 무너져버린 삶의 기준과 진리가 하나님 앞에 다시 무릎 꿇게 하셔서 말씀 안에서 회복되고 바로 세워지게 하셔서 오직 하나님의 자녀로 하나님을 닮은 마음과 입술과 행실로 살아가게 하소서.\n\n2. 가정에서부터 먼저 다음세대를 영육이 강건한 하나님의 생명을 담은 빛의 세대로 양육하게 하소서.\n부모들이 오직 하나님께 받은 사랑으로 자녀의 마음과 정서를 세심히 살피며 신뢰와 존중으로 양육하며 말하게 하소서.\n특별히 부모들이 자녀들의 이야기를 진심으로 경청하며 공감하게 하시고, 사랑과 안정감을 누리게 하셔서 다음세대들이 타인의 아픔에 공감할 줄 아는 건강하고 성숙한 인격으로 자라나게 하소서.\n\n3. 학교에서의 교육이 성적과 성공만을 추구하는 세상의 교육이 아닌 하나님의 생명의 가치와 인성을 자라게 하는 참된 교육으로 뿌리 내리게 하소서.\n하나님을 경외하는 선생님들이 되게 하시고 선생님들을 위해 기도하는 부모들이 되게 하소서. 선생님을 공경함으로 권위가 세워지게 하시고, 학생을 존귀히 여기는 서로를 사랑하는 배움터가 되게 하소서.\n하나님이 각자에게 심어주신 달란트들이 발견되고 발전될 수 있도록 서로를 격려하며 너그럽게 품어주게 하셔서 협력하여 선을 이루며 함께 자라가는 교육현장이 되게 하소서.\n\n4. 인터넷과 미디어를 통해 확산되는 혐오와 조롱, 폭력과 생명 경시 문화가 무너지게 하소서. 특별히 아동·청소년을 대상으로 한 미디어 콘텐츠가 보호의 원칙과 사회적 책임성을 회복하게 하소서. 끊임없이 우리들의 마음과 생각을 지배하려는 세상의 교묘한 계략에 담대히 맞설 수 있도록 모든 세대가 깨어 하나님께 기도하게 하시고, 영적으로 분별할 지혜와 입술의 파수꾼을 세워주셔서 예수님의 생명을 담은 언어로 말하게 하여 주소서.\n\n5. 한국교회의 교회학교 사역자들과 교사들이 예배와 셀모임을 통해 말씀을 전하는 것과 더불어 다음세대들에게 교회 밖의 일상에서 접하는 언어와 온라인 문화를 성경적 가치관으로 분별할 수 있도록 시대를 분별하는 통찰과 성경적 기준에 근거하여 가르칠 수 있도록 하나님의 지혜를 허락하소서.\n\n예수님의 이름으로 기도합니다 아멘." },
  { title:"한국·우크라이나 양 정상회담에 관한 기도", team:"복음통일팀", date:"2026.07.16", body:"\"북한군 포로 의사 존중, 국제법 따라 해결\" 李대통령, 젤렌스키와 회담\n\n나토(NATO·북대서양조약기구) 정상회의 참석차 튀르키예 앙카라를 방문한 이재명 대통령이 8일(현지 시각) 볼로디미르 젤렌스키 우크라이나 대통령과 정상회담을 했다. 이 대통령이 젤렌스키 대통령과 회담한 것은 취임 후 이번이 처음이다.\n\n청와대는 이날 회담에서 양 정상이 \"우크라이나 내 북한군 포로 문제는 당사자들의 자유의사를 존중하여 국제법과 인도주의 원칙에 부합하는 방식으로 해결해 나가기로 뜻을 모았다\"고 밝혔다. 한국 귀순 의사를 밝힌 북한군 포로들의 의사를 존중하며, 당사자의 의사에 반해 고문·처형의 우려가 있는 곳으로 보내지 않는다는 국제법상의 강제 송환 금지 원칙을 준수하겠다는 취지다. 양국 정상이 이런 원칙에 합의한 만큼, 지난해 1월 러시아 쿠르스크에서 우크라이나군에 체포된 후 19개월째 억류돼 있는 북한군 포로 2명의 한국행이 조만간 성사될지 주목된다.\n\n이 대통령과 젤렌스키 대통령은 이날 앙카라 시내 한 호텔에서 만나 43분간 회담을 가졌다. 강유정 청와대 수석대변인은 회담 뒤 서면 브리핑을 통해 \"이 대통령은 우크라이나 국민들이 필요로 하는 인도적 지원을 지속하면서 우크라이나 복구·재건을 위한 국제사회의 노력에도 지속 동참해 나갈 것이라고 강조했다\"고 전했다. 젤렌스키 대통령은 우리 정부의 지원에 감사의 뜻을 전하며, 우크라이나의 재건 과정에서 한국 정부와 기업들의 지속적인 관심과 참여를 기대한다고 밝혔다.\n\n이와 관련, 우리 정부는 전날 이번 나토 정상회의를 계기로 우크라이나에 대한 인도적 지원과 국제적 재건·복구 프로젝트 참여를 포함해 1억달러(약 1500억원) 규모 포괄적 지원을 약속했다고 밝혔다. 다만 살상무기는 지원하지 않는다.\n\n당초 30분을 예정하고 시작된 회담은 낮 12시부터 43분간 이어졌다. 청와대는 두 정상이 \"한반도 및 우크라이나 정세와 관련 폭넓은 의견을 교환하고, 양국 관계의 발전을 위해 앞으로도 긴밀한 소통을 이어가기로 했다\"고 밝혔다. 한국의 1억달러 포괄적 지원과 북한군 포로 문제 외에 우크라이나 전쟁의 전황, 북·러 군사 협력의 실태, 우크라이나 재건 문제 등이 논의된 것으로 보인다. <출처 : 조선일보>\n\n기도제목\n\n1. 지난 2월, 우크라이나 내 북한군 포로 백평강과 리강은 두 청년의 기사를 보게 하시고 강제 북송을 막고 안전한 이송을 위해 생명 살리는 간절한 기도를 하게 하셨습니다.\n나토 정상회의 참석 중 8일, 이재명 대통령과 젤렌스키 우크라이나 대통령이 정상회담을 갖고 양 정상이 우크라이나 내 북한군 포로 문제를 국제법과 인도주의 원칙에 부합하는 방식으로 해결해 나가기로 합의하였습니다. 이는 갇힌 자의 탄식과 생명 살리는 중보기도를 들으사 가장 선한 하나님의 때에 하나님의 방법으로 포로된 자를 자유케 하시는 하나님의 역사이시기에 감사와 찬양을 올려드립니다.\n\n2. 19개월째 우크라이나에 억류되어있는 두 북한군 포로에게 생명의 위협을 받는 강제 북송을 막아주시고 두 북한군 포로의 자유의사가 존중되어 조속히 남한으로 안전하게 이송되게 하소서.\n한국과 우크라이나 정부가 국제인권법과 국제난민법과 헌법의 원칙에 기반한 즉각적이고 적극적으로 책임있는 실제적인 조치를 하게 하소서. 또한 중국과 북한에 있는 모든 갇힌 자들이 공포와 통제 가운데서 벗어나 자유하게 하시고 원하는 곳으로 풀려나게 하소서.\n\n3. 두 북한군 청년이 한국에 와서 잘 정착할 때까지 그리스도인들의 돕는 손길과 기도가 멈추지 않게 하소서.\n두 청년이 하나님을 깊이 만나며 주님의 은혜와 사랑과 평강을 누리게 하시며 복음통일에 귀하게 쓰임 받는 사역자가 되게 하소서. 자유와 복음이 북한 곳곳마다 전해지게 하시며 김씨 일가 우상숭배와 주체사상이 무너지고 마음껏 예배드리는 복음통일을 이루게 하소서.\n\n4. 한국과 우크라이나의 양 정상회담을 통해 한국의 1억 달러 포괄적 지원과 북한군 포로 문제 외에 우크라이나 전쟁의 전황, 북러 군사 협력의 실태, 우크라이나 재건 문제 등이 논의되게 하심을 감사드립니다.\n이 논의가 정치, 경제, 외교의 변수에 흔들림 없이 진행되게 하시고, 굳건히 지켜지며 실현되게 하소서. 한국 정부가 시대적 대변화의 흐름을 바르게 파악하고 복잡한 국제정세에서 현명한 외교적 입장을 취할 수 있기를 구합니다. 특히 북·중·러와 미·일과의 관계를 바르게 맺게 하소서.\n\n5. 적대적 두 국가론을 취하며 핵과 무기 개발로 끊임없이 남한을 위협하는 북한으로 인해 군사적 위협이 높아지고 있습니다.\n우리 정부가 북한의 군사적 위협을 넉넉히 방비할 안보 능력을 갖추도록 준비하게 하소서. 한국과 우크라이나 관계가 우크라이나의 최신 드론 기술과 전쟁 노하우를 전수 받는 협력관계로 진척되게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
  { title:"한국교회의 모든 성도가 삶의 일상 가운데 예수님을 전하는 선교사로 살아가게 하소서", team:"한국교회팀", date:"2026.07.12", body:"\"직업이 곧 선교지\"…일상 속 보냄 받은 교회를 말하다\n\n교회의 선교 본질을 회복하고, '선교적 교회'를 확장해나가기 위한 운동(Movement) 차원에서 매년 진행되는 '2026 프레시콘퍼런스(FRESH Conference)'가 지난 6월 29일부터 7월 1일까지 열렸으며 '선교적 교회'로의 체질 개선이 한국교회의 희망임을 강조했다.\n\n'교회의 존재 이유는 더 많은 사람을 교회 안으로 모으는 데 있는 것이 아니라, 성도들을 세상으로 파송하는 데 있다'는 '선교적 교회'의 관점이 한국교회 내에 확산되고 있다.\n\n교회가 세상 속으로 보냄 받은 공동체라면, 성도의 일상과 직업도 복음을 살아내는 선교의 현장이다. '선교적 교회'로서의 선교 핵심은, 성도라면 누구나 선교사이며, 특별한 해외 선교지가 아닌 내가 속한 곳에서, 나와 일상적 관계를 맺는 이들 속에서 먼저 복음에 합당한 삶을 살아냄으로써 하나님의 나라를 경험하게 하고, 예수 그리스도를 증거하는 삶을 살아내는 것이다.\n\n발제자로 나선 북미 선교적 교회 운동 전문가는 \"선교적 교회 운동의 핵심은 예수를 따른다고 말하는 사람들이 실제 삶과 일상 속에서 예수를 따르고 있는가에 있다\"며 \"선교적 삶은 결국 부르심에 응답해 살아가는 삶\"이며 성도는 부르심을 받은 존재일 뿐 아니라 세상 속으로 보냄 받은 존재라고 설명했다. 특히 선교적 삶의 출발점은 특별한 사역이나 해외 선교지가 아니라, 이미 주어진 삶의 자리라고 짚었다.\n\n또한 성도의 직업과 일터를 선교의 현장으로 해석했다. \"여러분은 그곳에서 사람들을 만나고, 축복하며, 함께 살아갈 수 있다\"며 \"선교는 몇몇 파송 선교사만의 일이 아니라 교회 전체가 함께 감당해야 할 사명\"이라고 밝혔다.\n\n선교적 삶을 위한 실제적 태도로는 직업과 삶의 자리 재해석, 하나님께 자신을 내어드리는 태도, 의도성을 가진 시간 사용을 제안했다. \"어디를 가든 그곳이 선교지고, 만나는 사람들이 우리에게 맡겨진 사람들\"이라며 \"여러분이 성장하기 원하는 곳에 시간을 투자해야 한다\"고 권면했다.\n\n선택 강의에서는 비즈니스와 선교를 연결하는 실제적 논의도 이어졌다. \"선교는 타문화나 타지역에서 이뤄지는 종교적 활동만이 아니라, 우리가 보냄 받은 현장을 선교지로 인식하는 데서 시작된다\"고 전했다. <출처 : 아이굿뉴스>\n\n기도제목\n\n1. 우리 모두가 예수님의 십자가 사랑으로 구원받은 자임을 감사하게 하소서. 허락하신 삶의 모든 자리가 하나님의 사랑을 전하는 선교지임을 기억하게 하셔서 오직 예수님을 닮은 십자가의 사랑으로 사랑하게 하시고 우리의 삶이 예배가 되게 하소서.\n\n2. 공동체와 직장 안에서 화평케하는 자, 경청하는 자, 인내하는 자로 우리의 말과 행동과 삶을 통해 그리스도인의 정체성이 드러나게 하셔서 그리스도인의 참된 사명을 감당하게 하소서. 불평이 많은 세상 속에서 감사의 언어를 선택하게 하시고, 경쟁이 치열한 세상 속에서 나눔의 삶을 실천하게 하소서. 사랑받기를 기다리기보다 먼저 다가가 사랑을 전하는 성도가 되게 하소서. 예수님이 만나게 해주신 서로를 믿음의 동역자로 존귀히 여기며 서로에게 언제나 온유와 겸손으로 예수님께 하듯 하게 하소서.\n\n3. 예수님을 믿는 모든 가정이 예수님이 주인 되시는 가정으로 살게 하소서. 믿음의 제사장 남편과 돕는 배필의 아내와 믿음의 동역자인 자녀들 사이에 사랑과 존중이 깊어지게 하셔서 자녀들에게 믿음의 유산이 잘 전해지게 하시고, 믿음의 가정으로 그리스도인의 선한 영향력을 흘려보내게 하소서. 온 세대가 성령의 능력으로 한반도를 넘어 온 열방을 향해 나아가 복음을 전파하는 부흥의 세대로 일어나게 하시고, 예수님께서 맡겨주신 \"가서 제자 삼으라\"는 위대한 명령을 끝까지 감당하게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
  { title:"내년 최저임금 노사격차 '990원' 심의촉진구간 제시 전망", team:"정경사문팀", date:"2026.07.11", body:"내년도 최저임금 수준을 협상하고 있는 노동계와 경영계의 요구 격차가 '990원'까지 좁혀졌지만 여전히 간극이 커 9일 회의에서 공익위원들이 '심의 촉진구간'을 제시할 전망이다. 최저임금위원회는 이날 오후 3시 정부세종청사에서 제13차 전원회의를 연다.\n\n최저임금은 근로자·사용자·공익위원 9명씩 총 27명이 모여 매년 결정한다. 노사가 최초 요구안을 제시한 뒤 수정안을 거듭하며 격차를 좁히는 방식이다.\n\n앞서 노동계는 최저임금 최초 요구안으로 올해(1만320원)보다 16.3% 오른 시급 1만2천원을 제시했고, 경영계는 동결을 첫 제시안으로 꺼냈다. 지난 회의에서 6차 수정안으로 노동계와 경영계는 각각 시간당 1만1천450원과 1만460원을 제시했다. 양측의 격차가 990원으로 줄어든 것이다.\n\n노사의 견해차가 여전한 데다 확정 고시 시한이 임박해 공익위원들이 상한선과 하한선인 '심의 촉진구간'을 제시해 합의 또는 표결을 유도할 가능성이 있다. 최저임금 법정 심의 시한은 올해의 경우 지난달 29일까지로 이미 지났다.\n\n최종 시한을 넘겼다고 해도 최저임금위는 남은 행정절차 등을 고려해 7월 중순까지는 최저임금안을 고용노동부 장관에게 제출해야 한다. 이후 노동부 장관은 8월 5일까지 최저임금을 확정해 고시해야 한다. 효력은 내년 1월 1일부터 발생한다.\n\n이런 일정을 감안해 최종 타결은 오는 14일 이뤄질 것이란 관측이 지배적이다. <출처 : 데일리굿뉴스>\n\n기도제목\n\n1. 노사에게 인자와 정의의 마음을 주셔서 노사협정이 잘 이루어지도록. 양측 모두에게 가장 감사한 금액으로 결정되게 하여 주소서.\n\n2. 노동계 경영계 있는 자들이 나라의 충성된 자로 서게 하소서. 거짓을 행하지 않고, 악이 아니라 선을 택하는 자들이 되게 하소서. 개인의 이익이 아닌 모두를 위한 결정이 내려지게 하소서.\n\n3. 협상을 하는 리더들에게 굳건한 마음을 주소서. 개인의 사리사욕을 채울 수 있는 악의 유혹 앞에서 흔들리지 않는 용기를 주소서. 다윗처럼 온전한 길을 쫓는 마음을 주소서.\n\n4. 이 나라가 주님이 통치하는 나라임을 고백합니다. 완전한 길인 하나님만 주목하고, 하나님의 통치가 우리나라에 온전히 서게 될 것을 기대하게 하소서.\n\n5. 국민 한사람 한사람이 양심과 신앙에서 가정과 사회 모든 영역에서 완전한 자로 서게 하소서. 믿음의 자들이 아는 만큼 살아내고, 하나님께 소망을 두고 쉬지않고 기도하게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘" }
  ],
};
function getPwjAdmin(){
  const c=_read(STORAGE_KEYS.pwj,null);
  return (c && c.urgent && Array.isArray(c.korea) && c.korea.length) ? c : JSON.parse(JSON.stringify(PWJ_SEED));
}
RENDERERS.pwj=function(){
  const d=getPwjAdmin();
  const f=(id,label,val)=>`<div class="field"><label>${label}</label><input class="input" id="${id}" value="${esc(val||'')}"></div>`;
  const ta=(id,label,val,h)=>`<div class="field"><label>${label}</label><textarea class="textarea" id="${id}" style="min-height:${h||140}px">${esc(val||'')}</textarea></div>`;
  document.getElementById('view-pwj').innerHTML=`
    <p class="hint">앱 <b>중보기도 탭 상단</b>에 표시되는 예수동행기도(praywithjesus.org) 콘텐츠입니다. 사이트에 새 글이 올라오면 여기에 붙여넣고 저장하세요 — 앱에 즉시 반영됩니다. (원문: <a href="https://www.praywithjesus.org/main/sub.html?pageCode=2" target="_blank" rel="noopener">긴급기도</a> · <a href="https://www.praywithjesus.org/main/sub.html?pageCode=121" target="_blank" rel="noopener">대한민국을 위한 기도</a>)</p>
    <div class="section-title">🔥 긴급기도제목 <span style="font-size:11px;color:var(--ink-3);font-weight:600">· 최신 1건</span></div>
    <div class="card" style="padding:16px;margin-bottom:22px">
      ${f('pwj-u-title','제목',d.urgent.title)}
      ${f('pwj-u-date','등록일 (예: 2026.07.19)',d.urgent.date)}
      ${ta('pwj-u-body','본문 (기사 + 기도제목)',d.urgent.body,220)}
    </div>
    <div class="section-title">대한민국을 위한 기도 <span style="font-size:11px;color:var(--ink-3);font-weight:600">· 최근 5건</span></div>
    ${d.korea.map((k,i)=>`
      <div class="card" style="padding:16px;margin-bottom:14px">
        <div style="font-weight:800;font-size:13px;color:var(--ink-3);margin-bottom:10px">${i+1}번째 글</div>
        ${f('pwj-k'+i+'-title','제목',k.title)}
        ${f('pwj-k'+i+'-team','작성팀',k.team)}
        ${f('pwj-k'+i+'-date','등록일',k.date)}
        ${ta('pwj-k'+i+'-body','본문 (기사 + 기도제목)',k.body,180)}
      </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-primary" onclick="savePwj()">저장 (앱에 반영)</button>
      <button class="btn btn-ghost" onclick="resetPwj()">처음 내용으로 되돌리기</button>
    </div>`;
};
function savePwj(){
  const v=id=>document.getElementById(id).value;
  const d={
    fetchedAt:new Date().toLocaleDateString('ko-KR'),
    urgent:{ title:v('pwj-u-title').trim(), team:'관리자', date:v('pwj-u-date').trim(), body:v('pwj-u-body').trim() },
    korea:[0,1,2,3,4].map(i=>({ title:v('pwj-k'+i+'-title').trim(), team:v('pwj-k'+i+'-team').trim(), date:v('pwj-k'+i+'-date').trim(), body:v('pwj-k'+i+'-body').trim() })),
  };
  _write(STORAGE_KEYS.pwj,d);
  toast('저장되었습니다 — 앱 중보기도 탭에 반영됩니다');
}
function resetPwj(){
  if(!confirm('편집한 내용을 버리고 처음(2026.07.19 스냅샷) 내용으로 되돌릴까요?')) return;
  try{ localStorage.removeItem(STORAGE_KEYS.pwj); }catch(e){}
  toast('처음 내용으로 되돌렸습니다');
  RENDERERS.pwj();
}

    }).join('')}
      <div class="preset ${isCustom()?'on':''}" onclick="go('tiers')">
        <div class="preset-name">직접 설정<span class="preset-check"><svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span></div>
        <div class="hint">아래에서 단계 이름을 직접 편집</div></div>

    </div>`;
};

  const list=getFwMonth(fwMonthKey).slice();
  const v=id=>document.getElementById('fw-'+id).value.trim();

  if(i>=0) list[i]=w; else list.push(w);
  saveFwMonth(fwMonthKey,list); closeModal(); toast('가정예배가 저장되었습니다 (앱 달력 탭 반영)'); RENDERERS.devotional();

/* ====================== 뷰: 책자 PDF 업로드 (v0.97) ======================
   「말씀함께」 책자 내지 PDF를 올리면 매일 묵상(01~31)을 자동 파싱해
   사용자 앱의 묵상 본문(devotionalsCustom)으로 반영합니다. */
let _pdfParsed = null;   // {list, year, month, fw}
let _fwParsed = null;    // 온 세대 가정예배 파싱 결과

RENDERERS.pdf=function(){
  document.getElementById('view-pdf').innerHTML=`
    <p class="hint">「말씀함께」 내지 PDF(펼침)를 업로드하면 <b>매일 묵상</b> 페이지를 자동으로 인식해 날짜별 묵상 본문으로 변환합니다. 변환 결과를 확인한 뒤 앱에 반영하세요.</p>
    <div class="card" style="padding:22px">
      <div class="section-title" style="margin-top:0">1. 발행 월 선택 & PDF 업로드</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input class="input" id="pdf-year" type="number" value="2026" style="width:90px"> 년
        <input class="input" id="pdf-month" type="number" min="1" max="12" value="7" style="width:70px"> 월호
        <input type="file" id="pdf-file" accept="application/pdf" style="flex:1;min-width:220px">
        <button class="btn btn-primary" onclick="parseBookletPdf()">PDF 분석</button>
      </div>
      <div class="note" style="margin-top:12px" id="pdf-status">PDF를 선택하고 ‘PDF 분석’을 누르세요. (처리는 브라우저 안에서만 이루어집니다)</div>
    </div>
    <div id="pdf-result"></div>`;
};

function ensurePdfJs(){
  return new Promise((res,rej)=>{
    if(window.pdfjsLib) return res();
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc.onload=()=>{ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; res(); };
    sc.onerror=()=>rej(new Error('pdf.js 로드 실패 — 인터넷 연결을 확인하세요'));
    document.head.appendChild(sc);
  });
}

/* 텍스트 아이템을 y좌표로 줄 단위 재구성 */
function _pageLines(tc){
  const rows={};
  tc.items.forEach(it=>{
    const y=Math.round(it.transform[5]/3)*3;
    (rows[y]=rows[y]||[]).push({x:it.transform[4], str:it.str});
  });
  return Object.keys(rows).map(Number).sort((a,b)=>b-a)
    .map(y=>rows[y].sort((a,b)=>a.x-b.x).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim())
    .filter(l=>l);
}

async function parseBookletPdf(){
  const f=document.getElementById('pdf-file').files[0];
  const st=document.getElementById('pdf-status');
  if(!f){ toast('PDF 파일을 선택하세요'); return; }
  st.innerHTML='<b>분석 중…</b> pdf.js 로드 및 텍스트 추출';
  try{
    await ensurePdfJs();
    const buf=await f.arrayBuffer();
    const doc=await pdfjsLib.getDocument({data:buf}).promise;
    const year=parseInt(document.getElementById('pdf-year').value,10)||2026;
    const month=parseInt(document.getElementById('pdf-month').value,10)||7;
    const days={};
    let lastDay=null;
    _fwParsed=null;
    for(let p=1;p<=doc.numPages;p++){
      st.innerHTML='<b>분석 중…</b> '+p+' / '+doc.numPages+' 페이지';
      const lines=_pageLines(await (await doc.getPage(p)).getTextContent());
      const txt=lines.join('\n');
      // 온 세대 가정예배 페이지 (겹침 글자 허용: 온온 세세대대…)
      if(/온+\s*세+대+\s*가+정+예+배+/.test(txt) && /성경 봉독/.test(txt)){
        const g={};
        const wk=txt.match(/(첫|둘|셋|넷|다섯)째 주/); if(wk) g.week=wk[0];
        const dl=txt.match(/(\d{1,2})일 말씀/); if(dl) g.dayLabel=dl[0];
        const rd=txt.match(/성경 봉독\s*&?\s*암?송?\s*([가-힣]+\s?\d+[편장]\s?\d+~\d+절)\s*\(암송\s*([^)]+)\)/);
        if(rd){ g.reading=rd[1]; g.amsung=rd[2].trim(); }
        const hy=txt.match(/(?:^|\n)찬양\s+([^\n]+)/); if(hy) g.hymn=hy[1].trim();
        // 제목: 'NN' 단독 줄 다음 줄에서 끝의 번호 제거
        for(let li=0; li<lines.length-1; li++){
          if(/^\d{1,2}$/.test(lines[li]) && /[가-힣]/.test(lines[li+1])){
            g.title=lines[li+1].replace(/\s*\d{1,2}\s*$/,'').replace(/^\d{1,2}일 말씀\s*/,'').trim(); break;
          }
        }
        const seg=(a,b)=>{
          const ai=lines.findIndex(l=>a.test(l)); if(ai<0) return '';
          let out=[lines[ai].replace(a,'').trim()];
          for(let j=ai+1;j<lines.length;j++){
            if(b.test(lines[j])) break;
            const l=lines[j].replace(/^부\s*름\s*/,'').replace(/^&\s*암송\s*/,'');
            if(/^[가-힣“‘"']/.test(l)) out.push(l);
          }
          return out.filter(Boolean).join(' ').trim();
        };
        g.call=seg(/^예배로의\s*/, /성경 봉독|말씀 나눔/);
        g.share=seg(/^말씀 나눔\s*/, /나눔 질문/);
        g.question=seg(/^나눔 질문\s*/, /축복 기도/);
        g.bless=seg(/^축복 기도\s*/, /주님이 가르쳐|가+정+\s*미+션+/);
        g.mission=seg(/^가+정+\s*미+션+\s*/, /^\d+$/);
        if(g.week||g.title){ (_fwParsed=_fwParsed||[]).push(g); }
        continue;
      }
      // 일기 등 부록 페이지 제외
      if(/추천 예수동행일기|소그룹 나눔|집필진|활용법/.test(txt) && !/말씀암송/.test(txt)) continue;
      // 주일 페이지
      const sun=txt.match(/^\s*(\d{1,2})\s*\n?[\s\S]{0,40}주일 말씀/m) || (/주일 말씀/.test(txt) && txt.match(/(\d{1,2})\s*\n/));
      if(/주일 말씀/.test(txt) && /내가 받은 한 말씀/.test(txt)){
        const dn=(txt.match(/(?:^|\n)(\d{1,2})(?:\n|\s)/)||[])[1];
        if(dn){ const k=_dk(year,month,dn);
          days[k]={ book:'주일', range:'주일 말씀 기록', subtitle:'예배에서 받은 한 말씀을 기록합니다', theme:'주일 예배', sunday:true, _source:'pdf' };
        }
        continue;
      }
      // 매일 묵상 도입면 (말씀암송 + 오늘의 찬양 + 맥 잡기)
      if(/말씀암송/.test(txt) && /오늘의 찬양/.test(txt) && /맥 잡기/.test(txt)){
        const e={_source:'pdf'};
        let dayNo=null, title=null;
        for(const l of lines){
          const m=l.match(/^(\d{1,2})\s+([‘’“”"']?[가-힣].{2,60})$/);
          if(m && !/장$|절$|편$/.test(m[2].trim())){ dayNo=m[1]; title=m[2].trim(); break; }
        }
        if(!dayNo) continue;
        const am=txt.match(/말씀암송\s*\|?\s*([가-힣]{1,6}\s?\d+:\d+(?:~\d+)?)/);
        const hy=txt.match(/오늘의 찬양\s+([^\n]+)/);
        const mj=txt.match(/맥 잡기\s*\|?\s*([가-힣]+\s?\d+[편장]?\s?\d*~?\d*절?)/);
        e.subtitle=title; e.theme=title;
        if(am) e.amsung={ref:am[1].replace(/\s+/,' '), text:''};
        if(hy) e.hymn=hy[1].trim();
        if(mj){ e.range=mj[1].trim(); e.book=(mj[1].match(/^[가-힣]+/)||['시편'])[0]; }
        // 암송 구절 텍스트: 제목 다음 순수 한글 문장 1~2줄
        const ti=lines.findIndex(l=>l.startsWith(dayNo+' '));
        if(ti>=0){
          const cand=lines.slice(ti+1, ti+3).filter(l=>/^[가-힣]/.test(l)&&!/오늘의 찬양|맥 잡기/.test(l));
          if(cand.length && e.amsung) e.amsung.text=cand.join(' ').trim();
        }
        // 맥잡기 본문: '맥 잡기' 줄 이후 한글 서술문
        const mi=lines.findIndex(l=>/맥 잡기/.test(l));
        if(mi>=0){
          const maek=[];
          for(let i=mi+1;i<lines.length;i++){
            const l=lines[i];
            if(/^\d+\s/.test(l)||/[A-Za-z]{4,}/.test(l)||/통독 본문/.test(l)) break;
            if(/^[가-힣“‘"']/.test(l)) maek.push(l);
            if(maek.join(' ').length>250) break;
          }
          if(maek.length) e.maek=maek.join(' ');
        }
        // 본문(개역개정) 후보: 숫자로 시작하는 한글 구절
        const vs=lines.filter(l=>/^\d{1,2}\s+[가-힣]/.test(l)&&!/^0?\d\s+[‘’“”]/.test(l)).slice(0,14);
        if(vs.length>=3){
          e.passage=vs.join(' ').replace(/(?:^|\s)(\d{1,2})\s/g,(mm,n)=>' <span class="verse-num">'+n+'</span>').trim();
        }
        const k=_dk(year,month,dayNo);
        days[k]=Object.assign(days[k]||{}, e);
        lastDay=k;
        continue;
      }
      // 해설면 (말씀해설 + Q.)
      if(/말씀해설/.test(txt) && lastDay){
        const e=days[lastDay]||{};
        const ei=lines.findIndex(l=>/말씀해설/.test(l));
        const qi=lines.findIndex(l=>/^Q\s*\./.test(l)||/^Q\./.test(l));
        if(ei>=0){
          const end=qi>0?qi:lines.length;
          const expo=lines.slice(ei+1,end).filter(l=>/^[가-힣“‘"'(]/.test(l)).join(' ');
          if(expo) e.exposition=expo;
        }
        if(qi>=0){
          const qe=lines.findIndex((l,i)=>i>qi&&/말씀기도/.test(l));
          e.question=lines.slice(qi,qe>0?qe:qi+3).join(' ').replace(/^Q\s*\.\s*/,'').trim();
        }
        // 말씀기도/말씀살기 블록
        const pr=[]; let cur=null;
        for(const l of lines){
          const rm=l.match(/^(\d+(?:~\d+)?절)$/);
          if(rm){ cur={ref:rm[1], verse:'', body:''}; pr.push(cur); continue; }
          if(cur){
            if(/^[“"]/.test(l)) cur.verse+= (cur.verse?' ':'')+l.replace(/[“”"]/g,'');
            else if(/예수동행기도|말씀기록|www\./.test(l)){ cur=null; }
            else if(/^[가-힣]/.test(l)&&!/말씀기도|말씀살기/.test(l)) cur.body+=(cur.body?' ':'')+l;
          }
        }
        if(pr.length) e.prayer=pr.filter(x=>x.body).slice(0,2);
        days[lastDay]=e;
      }
    }
    const list=Object.keys(days).sort().map(k=>({dateKey:k, entry:days[k]}));
    _pdfParsed={list, year, month, fw:(_fwParsed||[])};
    st.innerHTML='<b>분석 완료</b> — 매일 묵상 '+list.length+'일 · 가정예배 '+(_fwParsed||[]).length+'주 인식';
    renderPdfResult();
  }catch(err){
    st.innerHTML='<b style="color:var(--bad,#c0392b)">오류:</b> '+esc(err.message);
  }
}
function _dk(y,m,d){ return y+'-'+String(m).padStart(2,'0')+'-'+String(parseInt(d,10)).padStart(2,'0'); }

function renderPdfResult(){
  const el=document.getElementById('pdf-result');
  if(!_pdfParsed||!_pdfParsed.list.length){ el.innerHTML=emptyBox('인식된 묵상이 없습니다. 내지(펼침) PDF인지 확인하세요.'); return; }
  el.innerHTML=`
    <div class="section-title">2. 인식 결과 확인 (${_pdfParsed.list.length}일)</div>
    ${_pdfParsed.list.map((d,i)=>{
      const e=d.entry;
      const ok=[e.subtitle&&'제목', e.range&&'본문범위', e.hymn&&'찬양', e.amsung&&e.amsung.ref&&'암송', e.maek&&'맥잡기', e.passage&&'본문', e.exposition&&'해설', e.question&&'질문', e.prayer&&e.prayer.length&&'기도', e.sunday&&'주일'].filter(Boolean);
      return `<div class="lrow">
        <div class="lrow-av" style="background:var(--sage-pale,#eef3ee);color:var(--sage-dark,#3c5c4c);font-size:11px">${d.dateKey.slice(5)}</div>
        <div class="lrow-main">
          <div class="lrow-title">${esc(e.subtitle||'(주일)')}</div>
          <div class="lrow-sub">${esc(e.range||'')} · 인식된 항목: ${ok.join(', ')||'-'}</div>
        </div>
        <div class="lrow-actions"><label style="font-size:12px;display:flex;gap:6px;align-items:center"><input type="checkbox" class="pdf-apply" data-i="${i}" checked> 반영</label></div>
      </div>`;
    }).join('')}
    ${(_pdfParsed.fw&&_pdfParsed.fw.length)?`
      <div class="section-title">온 세대 가정예배 (${_pdfParsed.fw.length}주 인식)</div>
      ${_pdfParsed.fw.map((w,i)=>`<div class="lrow">
        <div class="lrow-av" style="background:var(--sage-pale,#eef3ee);color:var(--sage-dark,#3c5c4c);font-size:10.5px">${esc(w.week||(i+1)+'주')}</div>
        <div class="lrow-main"><div class="lrow-title">${esc(w.title||'(제목 미인식)')}</div>
          <div class="lrow-sub">${esc(w.dayLabel||'')} · ${esc(w.reading||'')} · 암송 ${esc(w.amsung||'')}</div></div>
        <div class="lrow-actions"><label style="font-size:12px;display:flex;gap:6px;align-items:center"><input type="checkbox" class="fw-apply" data-i="${i}" checked> 반영</label></div>
      </div>`).join('')}`:''}
    <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
      <button class="btn btn-primary" onclick="applyPdfToApp()">3. 선택 항목을 앱에 반영</button>
      <span class="hint" style="margin:0">기존 시드/편집 내용 위에 병합됩니다. ‘묵상 본문’ 메뉴에서 개별 수정할 수 있습니다.</span>
    </div>`;
}

function applyPdfToApp(){
  if(!_pdfParsed) return;
  const custom=_read(STORAGE_KEYS.devotionalsCustom,{})||{};
  let n=0;
  document.querySelectorAll('.pdf-apply:checked').forEach(cb=>{
    const d=_pdfParsed.list[parseInt(cb.dataset.i,10)];
    if(!d) return;
    custom[d.dateKey]=Object.assign({},custom[d.dateKey]||{},d.entry);
    n++;
  });
  _write(STORAGE_KEYS.devotionalsCustom,custom);
  // 가정예배 반영
  let fwN=0;
  const fwSel=[];
  document.querySelectorAll('.fw-apply:checked').forEach(cb=>{
    const w=(_pdfParsed.fw||[])[parseInt(cb.dataset.i,10)];
    if(w){ fwSel.push(w); fwN++; }
  });
  if(fwN){
    const mk=_pdfParsed.year+'-'+String(_pdfParsed.month).padStart(2,'0');
    saveFwMonth(mk, fwSel);
  }
  toast(n+'일 묵상'+(fwN?(' · 가정예배 '+fwN+'주'):'')+'가 앱에 반영되었습니다 ✅');
  go('devotional');
}

function init(){
  ensureSubmissionSeed();
  document.getElementById('sideChurch').textContent=getChurchName();
  buildNav();
  go(current);
}
init();
