<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말씀함께 · 관리자 v1.7.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== v0.95 디자인 토큰 — 탈교회화 화이트+미색, sage/terra/plum ===== */
:root{
  --bg:#FAF7F0; --bg-card:#FFFFFF; --bg-soft:#F5F3EE; --bg-cream:#F2EAD8; --bg-cream-soft:#FBF7EE;
  --ink:#1A1F1D; --ink-2:#4A524E; --ink-3:#8B8E89; --ink-4:#B8BAB6;
  --sage:#B89A6B; --sage-mid:#CDB994; --sage-soft:#E6DAC1; --sage-pale:#F4EEE1; --sage-dark:#8C7350; --sage-deep:#6E5A3C;
  --terra:#C97757; --terra-soft:#F5E5D8; --plum:#7A4D72; --plum-soft:#F0E3ED;
  --sky:#5E81A8; --sky-soft:#E4ECF4;
  --ok:#5A9286; --ok-soft:#E3F0EC; --warn:#B07A2E; --warn-soft:#FBF0E2; --bad:#B0432E; --bad-soft:#F6DED7;
  --line:#ECECE8; --line-soft:#F4F3EF;
  --serif:'Noto Serif KR',serif;
  --sans:'Pretendard','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
  --en:'Inter','Pretendard',-apple-system,sans-serif;
  --shadow-sm:0 1px 2px rgba(26,31,29,.04); --shadow-md:0 4px 18px rgba(26,31,29,.06); --shadow-lg:0 14px 40px rgba(26,31,29,.10);
  --radius:16px; --radius-sm:10px; --radius-lg:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.en{font-family:var(--en)}
button{font-family:inherit}
a{color:inherit}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#e0ddd5;border-radius:9px}::-webkit-scrollbar-track{background:transparent}

/* ===== 레이아웃 ===== */
.layout{display:flex;min-height:100vh}
.sidebar{width:236px;flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:20px 18px 16px}
.side-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,var(--sage-mid),var(--sage-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:19px;box-shadow:var(--shadow-sm)}
.side-brand-text{font-family:var(--serif);font-weight:700;font-size:16px;letter-spacing:-.3px}
.side-brand-sub{font-family:var(--en);font-size:10px;font-weight:600;color:var(--ink-3);letter-spacing:.4px;margin-top:1px}
.side-nav{flex:1;overflow-y:auto;padding:6px 12px 12px}
.side-group-label{font-size:10.5px;font-weight:700;color:var(--ink-4);letter-spacing:.6px;padding:14px 10px 7px;text-transform:uppercase;font-family:var(--en)}
.side-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;color:var(--ink-2);font-size:13.5px;font-weight:600;letter-spacing:-.2px;transition:background .14s,color .14s;position:relative}
.side-item svg{width:18px;height:18px;flex-shrink:0;color:var(--ink-3);transition:color .14s}
.side-item:hover{background:var(--bg-soft)}
.side-item.active{background:var(--sage-pale);color:var(--sage-deep)}
.side-item.active svg{color:var(--sage-dark)}
.side-badge{margin-left:auto;background:var(--terra);color:#fff;font-family:var(--en);font-size:10px;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:99px;display:flex;align-items:center;justify-content:center}
.side-bottom{padding:12px;border-top:1px solid var(--line)}
.side-user{display:flex;align-items:center;gap:10px;padding:7px 6px}
.side-user-av{width:32px;height:32px;border-radius:50%;background:var(--sage-soft);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.side-user-name{font-size:13px;font-weight:700}
.side-user-role{font-size:11px;color:var(--ink-3)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(252,250,245,.85);backdrop-filter:saturate(1.1) blur(8px);position:sticky;top:0;z-index:20}
.topbar-title{font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:-.4px}
.topbar-title small{font-family:var(--en);font-size:12px;font-weight:500;color:var(--ink-3);margin-left:8px;letter-spacing:0}
.topbar-right{display:flex;align-items:center;gap:9px}
.demo-chip{font-family:var(--en);font-size:10.5px;font-weight:700;color:var(--sage-deep);background:var(--sage-pale);border:1px solid var(--sage-soft);padding:4px 9px;border-radius:99px;letter-spacing:.5px}
.content{flex:1;padding:26px 28px 60px;max-width:1080px;width:100%}
.view{display:none}.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== 공용 컴포넌트 ===== */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--bg-card);color:var(--ink);font-size:13px;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;transition:all .14s;letter-spacing:-.2px}
.btn:hover{background:var(--bg-soft)}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--sage-dark);border-color:var(--sage-dark);color:#fff}
.btn-primary:hover{background:var(--sage-deep)}
.btn-ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(.96)}
.btn-bad{background:var(--bg-card);border-color:var(--bad-soft);color:var(--bad)}.btn-bad:hover{background:var(--bad-soft)}
.btn-ghost{background:transparent}
.btn-sm{padding:6px 11px;font-size:12px}
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.section-title{font-family:var(--serif);font-size:16px;font-weight:700;margin:26px 0 12px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}
.muted{color:var(--ink-3)}
.hint{font-size:12.5px;color:var(--ink-3);line-height:1.65}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.stat{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
.stat-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.stat-ic svg{width:18px;height:18px}
.stat-num{font-family:var(--en);font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.stat-num small{font-size:13px;color:var(--ink-3);font-weight:600;margin-left:3px}
.stat-label{font-size:12.5px;color:var(--ink-3);font-weight:600;margin-top:5px}
.ic-sage{background:var(--sage-pale);color:var(--sage-dark)}.ic-terra{background:var(--terra-soft);color:var(--terra)}
.ic-plum{background:var(--plum-soft);color:var(--plum)}.ic-sky{background:var(--sky-soft);color:var(--sky)}
.ic-ok{background:var(--ok-soft);color:var(--ok)}.ic-warn{background:var(--warn-soft);color:var(--warn)}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.tab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .14s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--sage-deep);border-bottom-color:var(--sage-dark)}
.tab-count{background:var(--bg-soft);color:var(--ink-3);font-family:var(--en);font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:99px}
.tab.active .tab-count{background:var(--sage-pale);color:var(--sage-dark)}

/* list rows / review cards */
.rev-card{border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.rev-card.rejected{background:#FCF7F5;border-color:var(--bad-soft)}
.rev-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:-.2px}
.badge.review{background:var(--warn-soft);color:var(--warn)}
.badge.rejected{background:var(--bad-soft);color:var(--bad)}
.badge.published{background:var(--ok-soft);color:var(--ok)}
.badge.cat{background:var(--bg-soft);color:var(--ink-3);font-weight:600}
.rev-meta{font-size:11.5px;color:var(--ink-3)}
.rev-title{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:-.3px;margin:2px 0 6px}
.rev-body{font-size:13px;color:var(--ink-2);line-height:1.7;max-height:4.8em;overflow:hidden;position:relative}
.rev-body.open{max-height:none}
.rev-reason{margin-top:10px;font-size:12.5px;color:var(--bad);background:var(--bad-soft);padding:8px 11px;border-radius:9px}
.rev-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.empty{text-align:center;padding:50px 20px;color:var(--ink-4)}
.empty svg{width:40px;height:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:14px;font-weight:600;color:var(--ink-3)}

/* generic list */
.lrow{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.lrow-av{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:var(--sage-soft);color:var(--sage-deep)}
.lrow-main{flex:1;min-width:0}
.lrow-title{font-size:13.5px;font-weight:700;letter-spacing:-.2px}
.lrow-sub{font-size:12px;color:var(--ink-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.lrow-actions{display:flex;gap:7px;flex-shrink:0}
.scope-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg-soft);color:var(--ink-3)}
.scope-pill.church{background:var(--sage-pale);color:var(--sage-dark)}
.scope-pill.urgent{background:var(--bad-soft);color:var(--bad)}
.scope-pill.committee{background:var(--plum-soft);color:var(--plum)}
.is-hidden{opacity:.5}

/* preset / policy */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.preset{border:1.5px solid var(--line);border-radius:14px;padding:15px;cursor:pointer;transition:all .14s;background:var(--bg-card)}
.preset:hover{border-color:var(--sage-mid)}
.preset.on{border-color:var(--sage-dark);background:var(--sage-pale)}
.preset-name{font-size:13.5px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.preset-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--ink-4);display:flex;align-items:center;justify-content:center}
.preset.on .preset-check{background:var(--sage-dark);border-color:var(--sage-dark)}
.preset.on .preset-check svg{width:11px;height:11px;color:#fff;display:block}
.preset-check svg{display:none}
.tier-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tier-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--bg-soft);color:var(--ink-2)}
.tier-arrow{color:var(--ink-4);font-size:11px}
.tier-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tier-edit-row .idx{width:26px;height:26px;border-radius:8px;background:var(--sage-pale);color:var(--sage-dark);font-family:var(--en);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* seg */
.seg{display:inline-flex;gap:4px;background:var(--bg-soft);padding:4px;border-radius:11px}
.seg-btn{border:none;background:transparent;cursor:pointer;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-3);transition:all .14s}
.seg-btn.on{background:var(--bg-card);color:var(--sage-deep);box-shadow:0 1px 3px rgba(110,90,60,.14)}

/* method cards */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.method-card{border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:all .14s}
.method-card.on{border-color:var(--sage-dark);background:var(--sage-pale)}
.method-card h4{font-family:var(--serif);font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.method-en{font-family:var(--en);font-size:11px;color:var(--ink-3);font-weight:600}
.method-steps{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.method-step{display:flex;gap:8px;font-size:12.5px;color:var(--ink-2)}
.method-step .n{font-family:var(--en);font-weight:700;color:var(--sage-dark)}

/* fields */
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.field .sub{font-weight:500;color:var(--ink-3);font-size:11.5px;margin-left:5px}
.input,.textarea,.select{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;color:var(--ink);background:var(--bg-card);transition:border .14s}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--sage-mid)}
.textarea{resize:vertical;min-height:110px;line-height:1.7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.switch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--line);border-radius:13px;background:var(--bg-card);margin-bottom:10px}
.switch-info h4{font-size:13.5px;font-weight:700}
.switch-info p{font-size:12px;color:var(--ink-3);margin-top:3px}
.toggle{width:46px;height:27px;border-radius:99px;background:var(--ink-4);position:relative;cursor:pointer;transition:background .18s;flex-shrink:0;border:none}
.toggle.on{background:var(--sage-dark)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(19px)}
.note{background:var(--sage-pale);border:1px solid var(--sage-soft);border-radius:12px;padding:14px 16px;font-size:12.5px;color:var(--sage-deep);line-height:1.7}
.note b{color:var(--sage-deep)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,31,29,.42);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.open{display:flex;animation:fade .18s ease}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:540px;max-height:88vh;overflow-y:auto}
.modal-head{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:var(--serif);font-size:18px;font-weight:700}
.modal-x{border:none;background:var(--bg-soft);width:30px;height:30px;border-radius:50%;cursor:pointer;color:var(--ink-3);font-size:18px;line-height:1}
.modal-body{padding:18px 24px}
.modal-foot{padding:0 24px 22px;display:flex;gap:9px;justify-content:flex-end}

/* toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:200;box-shadow:var(--shadow-lg);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  .sidebar{width:64px}.side-brand-text,.side-brand-sub,.side-item span:not(.side-badge),.side-group-label,.side-user-info{display:none}
  .side-item{justify-content:center}.method-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-brand">
      <div class="side-mark">함</div>
      <div>
        <div class="side-brand-text">말씀함께</div>
        <div class="side-brand-sub en">ADMIN · v1.7.3</div>
      </div>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-bottom">
      <div class="side-user">
        <div class="side-user-av">관</div>
        <div class="side-user-info">
          <div class="side-user-name">관리자</div>
          <div class="side-user-role" id="sideChurch">우리 교회</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 class="topbar-title" id="pageTitle">대시보드 <small class="en">Dashboard</small></h1>
      <div class="topbar-right">
        <span class="demo-chip en">DEMO</span>
        <button class="btn btn-sm" onclick="openUserApp()">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          사용자 앱
        </button>
      </div>
    </div>
    <div class="content">
      <div class="view active" id="view-dashboard"></div>
      <div class="view" id="view-column"></div>
      <div class="view" id="view-tiers"></div>
      <div class="view" id="view-method"></div>
      <div class="view" id="view-subscription"></div>
      <div class="view" id="view-devotional"></div>
      <div class="view" id="view-pdf"></div>
      <div class="view" id="view-prayer"></div>
      <div class="view" id="view-pwj"></div>
      <div class="view" id="view-rooms"></div>
      <div class="view" id="view-settings"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toast"></div>

<script>
/* ====================================================================
   말씀함께 관리자 v1.5 — 사용자 앱과 동일한 localStorage 키 공유
   ==================================================================== */
const STORAGE_KEYS = {
  user:'mh_v05_user', prefs:'mh_v05_prefs',
  columnState:'mh_v05_column_state', columnsCustom:'mh_v05_columns_custom',
  prayers:'mh_v05_prayers', prayersHidden:'mh_v05_prayers_hidden', prayersSeedVersion:'mh_v05_prayers_seed_version',
  devotionalsCustom:'mh_v05_devotionals_custom',
  homeBanner:'mh_v05_home_banner',   // v0.98 — 홈 배너
  homePhoto:'mh_v05_home_photo',     // v1.7 — 홈 '오늘의 말씀' 박스 배경 사진
  familyWorship:'mh_v05_family_worship',
  pwj:'mh_v05_pwj_content',   // v1.6.1 — 예수동행기도 콘텐츠(앱 중보기도 탭 상단)
  rooms:'mh_v06_rooms', roomPosts:'mh_v06_room_posts', roomPostsHidden:'mh_v06_room_posts_hidden',
};
function _read(k,f){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):(f!==undefined?f:null);}catch(e){return f!==undefined?f:null;} }
function _write(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function getPrefs(){ return Object.assign({fontSize:'m',notifications:true,churchName:'우리 교회',medMethod:'lectio',lang:'ko',groupPreset:'shepherd'}, _read(STORAGE_KEYS.prefs,{})); }
function setPrefs(patch){ _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefs(), patch)); }
function getChurchName(){ const n=(getPrefs().churchName||'').trim(); return n||'우리 교회'; }
function getUser(){ return Object.assign({name:'성도님',subscribed:false}, _read(STORAGE_KEYS.user,{})); }
function setUser(patch){ _write(STORAGE_KEYS.user, Object.assign({}, getUser(), patch)); }

function getGroupTiers(){
  const p=getPrefs();
  let names=Array.isArray(p.groupTiers)&&p.groupTiers.length?p.groupTiers:(GROUP_PRESETS[p.groupPreset]?GROUP_PRESETS[p.groupPreset].tiers:GROUP_PRESETS.shepherd.tiers);
  names=names.slice(0,4).map(n=>(n||'').trim()).filter(Boolean);
  if(!names.length) names=GROUP_PRESETS.shepherd.tiers.slice();
  return names.map((n,i)=>({key:TIER_KEYS[i],name:n}));
}

>오라 우리가 굽혀 경배하며 우리를 지으신 여호와 앞에 무릎을 꿇자 <span class=\"verse-num\">7</span>그는 우리의 하나님이시요 우리는 그가 기르시는 백성이며 그의 손이 돌보시는 양이기 때문이라 너희가 오늘 그의 음성을 듣거든 <span class=\"verse-num\">8</span>너희는 므리바에서와 같이 또 광야의 맛사에서 지냈던 날과 같이 너희 마음을 완악하게 하지 말지어다 <span class=\"verse-num\">9</span>그 때에 너희 조상들이 내가 행한 일을 보고서도 나를 시험하고 조사하였도다 <span class=\"verse-num\">10</span>내가 사십 년 동안 그 세대로 말미암아 근심하여 이르기를 그들은 마음이 미혹된 백성이라 내 길을 알지 못한다 하였도다 <span class=\"verse-num\">11</span>그러므로 내가 노하여 맹세하기를 그들은 내 안식에 들어오지 못하리라 하였도다", "exposition": "시편 기자는 하나님이 만유의 왕이시며 우리를 돌보는 목자이심을 고백하며, 우리를 찬양의 자리로 초대합니다. 그러나 우리는 하나님의 일하심을 경험하고도 어느새 마음이 완악해지곤 합니다.\n\n이스라엘 백성은 광야에서 하나님의 인도하심을 경험했지만 자기 고집을 앞세우다가 하나님의 근심이 되었고, 결국 약속의 땅에 들어가지 못했습니다. 이스라엘 백성의 모습은 우리를 돌아보게 합니다.\n\n참된 예배는 찬양에 머물지 않고, 내 삶의 방향과 고집을 내려놓는 온전한 <strong>‘순종’</strong>으로 완성됩니다. 주님의 세밀한 음성에 마음의 빗장을 풀고, 목자 되신 주님을 겸손히 뒤따르는 우리가 되길 원합니다.", "question": "주님께서 들려주시는 세밀한 음성을 외면한 채 이스라엘 백성처럼 마음을 완악하게 하고 있는 일은 없는지 돌아봅시다.", "prayer": [{"ref": "6~7절", "verse": "오라 우리가 굽혀 경배하며 우리를 지으신 여호와 앞에 무릎을 꿇자 그는 우리의 하나님이시요 우리는 그가 기르시는 백성이며 그의 손이 돌보시는 양이기 때문이라", "body": "주님을 경외함으로 내 삶 속에서 일하시는 주님을 더 선명히 바라보게 하소서. 완악한 마음을 내려놓게 하시고, 응답이 더디게 느껴지거나 내 뜻과 다르게 보일지라도 오늘 주시는 말씀에 즉각 순종할 수 있도록 담대한 믿음을 주소서."}, {"ref": "10절", "verse": "내가 사십 년 동안 그 세대로 말미암아 근심하여 이르기를 그들은 마음이 미혹된 백성이라 내 길을 알지 못한다 하였도다", "body": "치열한 영적 전쟁에서 이미 승리하신 예수 그리스도 안에 거하게 하소서. 우리 삶 깊숙이 들어온 중독의 사슬에서 건져 주소서. 술, 음란, 게임, 도박, 마약 등 개인을 병들게 하고 가정과 사회를 파괴하는 모든 중독과 죄에서 우리를 자유롭게 하소서."}]}, "2026-07-03": {"book": "시편", "chapter": "96편", "range": "시편 96편 1~13절", "subtitle": "하나님만이 만왕의 왕이십니다", "theme": "온 땅의 왕이신 여호와", "hymn": {"no": "찬송 95장 · 나의 기쁨 나의 소망 되시며", "title": "기뻐하며 왕께 노래 부르리"}, "maek": "이방의 모든 신은 손으로 만든 실체 없는 우상에 불과하지만, 여호와께서는 하늘을 지으신 유일한 창조주요 왕이십니다 4~6절. 그러므로 온 땅의 족속들은 예물을 들고 그분의 궁정에 나아와 합당한 영광을 돌려야 합니다 7~9절. 마침내 공의와 진실로 세상을 심판하러 오실 왕을 기대하며, 온 피조물이 함께 기쁨으로 노래합니다 10~13절.", "amsung": {"ref": "시 96:2", "text": "여호와께 노래하여 그의 이름을 송축하며 그의 구원을 날마다 전파할지어다"}, "passage": "<span class=\"verse-num\">1</span>새 노래로 여호와께 노래하라 온 땅이여 여호와께 노래할지어다 <span class=\"verse-num\">2</span>여호와께 노래하여 그의 이름을 송축하며 그의 구원을 날마다 전파할지어다 <span class=\"verse-num\">3</span>그의 영광을 백성들 가운데에, 그의 기이한 행적을 만민 가운데에 선포할지어다 <span class=\"verse-num\">4</span>여호와는 위대하시니 지극히 찬양할 것이요 모든 신들보다 경외할 것임이여 <span class=\"verse-num\">5</span>만국의 모든 신들은 우상들이지만 여호와께서는 하늘을 지으셨음이로다 <span class=\"verse-num\">6</span>존귀와 위엄이 그의 앞에 있으며 능력과 아름다움이 그의 성소에 있도다 <span class=\"verse-num\">7</span>만국의 족속들아 영광과 권능을 여호와께 돌릴지어다 여호와께 돌릴지어다 <span class=\"verse-num\">8</span>여호와의 이름에 합당한 영광을 그에게 돌릴지어다 예물을 들고 그의 궁정에 들어갈지어다 <span class=\"verse-num\">9</span>아름답고 거룩한 것으로 여호와께 예배할지어다 온 땅이여 그 앞에서 떨지어다 <span class=\"verse-num\">10</span>모든 나라 가운데서 이르기를 여호와께서 다스리시니 세계가 굳게 서고 흔들리지 않으리라 그가 만민을 공평하게 심판하시리라 할지로다 <span class=\"verse-num\">11</span>하늘은 기뻐하고 땅은 즐거워하며 바다와 거기에 충만한 것이 외치고 <span class=\"verse-num\">12</span>밭과 그 가운데에 있는 모든 것은 즐거워할지로다 그 때 숲의 모든 나무들이 여호와 앞에서 즐거이 노래하리니 <span class=\"verse-num\">13</span>그가 임하시되 땅을 심판하러 임하실 것임이라 그가 의로 세계를 심판하시며 그의 진실하심으로 백성을 심판하시리로다", "exposition": "시편 기자는 우리에게<strong>‘새 노래</strong>를 부르라고 요청합니다. 이는 단순히 새로운 곡조를 말하는 것이 아닙니다. 하나님 은혜를 매일 새롭게 경험하는 자만이 부를 수 있는 감사의 고백입니다. 세상의 우상은 실체 없는 헛것에 불과하지만, 하나님의 존귀와 위엄은 이 땅에 충만하며 세상을 견고하게 붙듭니다. 이제 우리는 침묵을 깨고 열방 중에<em>\"여호와께서 다스리시니 세계가 굳게 서고 흔들리지 않으리라</em>(10절)라고 선포 해야 합니다. 장차 공의와 진실로 세상을 심판하러 오실 주님을 기쁨으로 기다리며, 삶의 모든 영역에서 하나님의 주권을 인정해야 합니다. 구원받은 성도가 드려야 할 가장 아름다운 ‘새 노래’는 예배당 안의 찬양에 머물지 않고, 일상의 모든 자리에서 오직 하나님만이 왕이심을 고백하는 삶 자체입니다.", "question": "지금 내 삶에서 하나님보다 더 의지하거나 두려워하고 있는 헛된 우상은 무엇입니까?", "prayer": [{"ref": "2절", "verse": "여호와께 노래하여 그의 이름을 송축하며 그의 구원을 날마다 전파할지어다", "body": "모든 주권이 하나님께 있음을 고백하며, 하나님의 통치 아래 겸손히 살아가는 믿음을 허락하소서. 미전도 종족과 열방 가운데 왕 되신 하나님이 전파되고, 하나님의 이름이 온 땅에서 높아지게 하소서."}, {"ref": "5절", "verse": "만국의 모든 신들은 우상들이지만 여호와께서는 하늘을 지으셨음이로다", "body": "내 안에 하나님보다 더 사랑하고 있는 것은 무엇인지 분별하길 원합니다. ‘나는 죽고 예수로 사는’ 믿음이 실제가 되어 오늘도 ‘예수 생명’으로 살아가게 하소서."}]}, "2026-07-04": {"book": "시편", "chapter": "97편", "range": "시편 97편 1~12절", "subtitle": "내 영혼에 뿌려진 빛의 씨앗", "theme": "빛과 기쁨의 씨앗", "hymn": {"no": "찬송 21장 · 다 찬양하여라", "title": "주님 큰 영광 받으소서"}, "maek": "97편은 하나님 나라의 도래를 소망하고 경축하는 노래입니다. 하나님 나라가 임하고 완성되는 일은 온 세상의 질서가 바로잡히고, 모든 거짓된 우상이 무너지며, 이 땅이 온전히 회복되는 사건입니다. 그러므로 만유는 하나님의 통치 아래 기쁨과 감사로 응답해야 합니다.", "amsung": {"ref": "시 97:10", "text": "여호와를 사랑하는 너희여 악을 미워하라 그가 그의 성도의 영혼을 보전하사 악인의 손에서 건지시느니라"}, "passage": "<span class=\"verse-num\">1</span>여호와께서 다스리시나니 땅은 즐거워하며 허다한 섬은 기뻐할지어다 <span class=\"verse-num\">2</span>구름과 흑암이 그를 둘렀고 의와 공평이 그의 보좌의 기초로다 <span class=\"verse-num\">3</span>불이 그의 앞에서 나와 사방의 대적들을 불사르시는도다 <span class=\"verse-num\">4</span>그의 번개가 세계를 비추니 땅이 보고 떨었도다 <span class=\"verse-num\">5</span>산들이 여호와의 앞 곧 온 땅의 주 앞에서 밀랍 같이 녹았도다 <span class=\"verse-num\">6</span>하늘이 그의 의를 선포하니 모든 백성이 그의 영광을 보았도다 <span class=\"verse-num\">7</span>조각한 신상을 섬기며 허무한 것으로 자랑하는 자는 다 수치를 당할 것이라 너희 신들아 여호와께 경배할지어다 <span class=\"verse-num\">8</span>여호와여 시온이 주의 심판을 듣고 기뻐하며 유다의 딸들이 즐거워하였나이다 <span class=\"verse-num\">9</span>여호와여 주는 온 땅 위에 지존하시고 모든 신들보다 위에 계시니이다 <span class=\"verse-num\">10</span>여호와를 사랑하는 너희여 악을 미워하라 그가 그의 성도의 영혼을 보전하사 악인의 손에서 건지시느니라 <span class=\"verse-num\">11</span>의인을 위하여 빛을 뿌리고 마음이 정직한 자를 위하여 기쁨을 뿌리시는도다 <span class=\"verse-num\">12</span>의인이여 너희는 여호와로 말미암아 기뻐하며 그의 거룩한 이름에 감사할지어다", "exposition": "하나님의 통치는 흔들리지 않는 <strong>의와 공평</strong>에 기초합니다. 구름과 흑암 속에 계신 주님의 위엄은 모든 불의와 헛된 우상을 무너뜨리고, 온 세상에 하나님의 영광을 나타냅니다.\n\n하나님의 백성 된 우리는 그분의 영광스러운 통치 아래 하나님을 사랑하며 악을 미워하는 자로 살아야 합니다. 또한 하나님은 그분을 사랑하는 성도의 인생 여정에 <em>빛과 기쁨의 씨앗</em>(11절)을 뿌려 주십니다.\n\n당장 열매가 보이지 않더라도, 오직 그리스도 안에서 믿음으로 사는 자에게는 그 씨앗이 반드시 열매를 맺습니다. 오늘 하루 내 뜻과 불의를 내려놓고, 주님이 뿌리신 빛의 길을 걸어가길 원합니다.", "question": "주님이 나의 일상에 뿌려 주신 빛과 기쁨의 씨앗은 무엇입니까? 지금 당장 열매가 보이지 않더라도 열매 맺게 하실 주님의 약속을 믿음으로 붙들고 있습니까?", "prayer": [{"ref": "10절", "verse": "여호와를 사랑하는 너희여 악을 미워하라 그가 그의 성도의 영혼을 보전하사 악인의 손에서 건지시느니라", "body": "남북 분단의 아픔이 속히 끝나게 하소서. 북한 땅에 자유와 평화의 복음이 전파되어 복음의 꽃이 피어나게 하소서. 주님을 마음껏 예배하고 찬양하는 날이 북한 땅에 속히 임하게 하소서."}, {"ref": "11~12절", "verse": "의인을 위하여 빛을 뿌리고 마음이 정직한 자를 위하여 기쁨을 뿌리시는도다 의인이여 너희는 여호와로 말미암아 기뻐하며 그의 거룩한 이름에 감사할지어다", "body": "세상의 헛된 즐거움에 흔들리지 않고 오직 주님 한 분만으로 "maek": "다윗은 하나님이 자신의 모든 죄를 용서하시고, 병을 고치시며, 생명을 구덩이에서 건지신 은혜를 고백하며 찬양을 시작합니다. 하나님은 부모가 자녀를 긍휼히 여기듯 우리를 사랑하시며, 그분의 인자하심은 하늘이 땅보다 높음같이 큽니다. 인생은 풀과 같이 연약하지만, 하나님의 인자하심은 영원히 변치 않습니다.", "amsung": {"ref": "시 103:1~2", "text": "내 영혼아 여호와를 송축하라 내 속에 있는 것들아 다 그의 거룩한 이름을 송축하라 내 영혼아 여호와를 송축하며 그의 모든 은택을 잊지 말지어다"}, "passage": "<span class=\"verse-num\">1</span>내 영혼아 여호와를 송축하라 내 속에 있는 것들아 다 그의 거룩한 이름을 송축하라 <span class=\"verse-num\">2</span>내 영혼아 여호와를 송축하며 그의 모든 은택을 잊지 말지어다 <span class=\"verse-num\">3</span>그가 네 모든 죄악을 사하시며 네 모든 병을 고치시며 <span class=\"verse-num\">4</span>네 생명을 파멸에서 속량하시고 인자와 긍휼로 관을 씌우시며 <span class=\"verse-num\">5</span>좋은 것으로 네 소원을 만족하게 하사 네 청춘을 독수리 같이 새롭게 하시는도다 <span class=\"verse-num\">6</span>여호와께서 공의로운 일을 행하시며 억압 당하는 모든 자를 위하여 심판하시는도다 <span class=\"verse-num\">7</span>그의 행위를 모세에게, 그의 행사를 이스라엘 자손에게 알리셨도다 <span class=\"verse-num\">8</span>여호와는 긍휼이 많으시고 은혜로우시며 노하기를 더디 하시고 인자하심이 풍부하시도다 <span class=\"verse-num\">9</span>자주 경책하지 아니하시며 노를 영원히 품지 아니하시리로다 <span class=\"verse-num\">10</span>우리의 죄를 따라 우리를 처벌하지는 아니하시며 우리의 죄악을 따라 우리에게 그대로 갚지는 아니하셨으니 <span class=\"verse-num\">11</span>이는 하늘이 땅에서 높음 같이 그를 경외하는 자에게 그의 인자하심이 크심이로다 <span class=\"verse-num\">12</span>동이 서에서 먼 것 같이 우리의 죄과를 우리에게서 멀리 옮기셨으며 <span class=\"verse-num\">13</span>아버지가 자식을 긍휼히 여김 같이 여호와께서는 자기를 경외하는 자를 긍휼히 여기시나니 <span class=\"verse-num\">14</span>이는 그가 우리의 체질을 아시며 우리가 단지 먼지뿐임을 기억하심이로다 <span class=\"verse-num\">15</span>인생은 그 날이 풀과 같으며 그 영화가 들의 꽃과 같도다 <span class=\"verse-num\">16</span>그것은 바람이 지나가면 없어지나니 그 있던 자리도 다시 알지 못하거니와 <span class=\"verse-num\">17</span>여호와의 인자하심은 자기를 경외하는 자에게 영원부터 영원까지 이르며 그의 의는 자손의 자손에게 이르리니 <span class=\"verse-num\">18</span>곧 그의 언약을 지키고 그의 법도를 기억하여 행하는 자에게로다 <span class=\"verse-num\">19</span>여호와께서 그의 보좌를 하늘에 세우시고 그의 왕권으로 만유를 다스리시도다 <span class=\"verse-num\">20</span>능력이 있어 여호와의 말씀을 행하며 그의 말씀의 소리를 듣는 여호와의 천사들이여 여호와를 송축하라 <span class=\"verse-num\">21</span>그에게 수종들며 그의 뜻을 행하는 모든 천군이여 여호와를 송축하라 <span class=\"verse-num\">22</span>여호와의 지으심을 받고 그가 다스리시는 모든 곳에 있는 너희여 여호와를 송축하라 내 영혼아 여호와를 송축하라", "exposition": "다윗은 “내 영혼아 여호와를 송축하라”라고 선포합니다. 그리고 주님이 베푸신 모든 은택을 결코 잊지 않겠다고 결단합니다. 다윗이 나열하는 은혜의 목록 가운데 가장 먼저 나오는 것은 왕의 자리도, 전쟁의 승리도 아닌 죄 용서입니다(3절). 그는 자신이 누리는 모든 것이 하나님의 인자와 긍휼의 결과임을 고백합니다.\n\n이렇게 고백하는 사람만이 참된 감사와 찬송을 하나님께 드릴 수 있습니다. 반면, 지금 누리는 것을 당연하게 여기는 사람에게는 감사가 없습니다. 하나님의 인자하심은 영원에서 영원까지 하나님을 경외하는 자에게 허락됩니다. 우리 삶의 유일한 이유가 되시는 여호와를 영원히 송축합시다.", "question": "지금 누리는 삶의 자리가 나의 노력에 따른 당연한 결과라고 생각합니까? 아니면 하나님의 인자와 긍휼의 결과라고 고백할 수 있습니까?", "prayer": [{"ref": "2~3절", "verse": "내 영혼아 여호와를 송축하며 그의 모든 은택을 잊지 말지어다 그가 네 모든 죄악을 사하시며 네 모든 병을 고치시며", "body": "가난과 질병으로 고통받는 이들에게 주님의 위로를 베풀어 주소서. 고통받는 이들의 삶에 필요한 모든 것을 주님의 은혜로 채워 주시고, 돕는 손길을 허락하소서."}, {"ref": "19절", "verse": "여호와께서 그의 보좌를 하늘에 세우시고 그의 왕권으로 만유를 다스리시도다", "body": "모든 주권이 하나님께 있음을 고백하며 살게 하소서. 하나님을 경외함으로 세상의 가치와 기준을 뛰어넘게 하시고, 하나님의 말씀과 방법대로 살아가는 믿음의 증인이 되게 하소서."}]}, "2026-07-12": {"sunday": true, "book": "주일", "range": "주일 말씀 기록", "subtitle": "예배에서 받은 한 말씀을 기록합니다", "theme": "주일 예배", "hymn": {"no": "찬송 28장", "title": "복의 근원 강림하사"}}, "2026-07-13": {"book": "시편", "chapter": "104편", "range": "시편 104편 1~35절", "subtitle": "숨결 하나에도 섭리하시는 하나님", "theme": "창조주의 섭리", "hymn": {"no": "찬송 79장 · 주 하나님 지으신 모든 세계", "title": "창조의 아버지"}, "maek": "본문은 온 우주를 창조하시고 지금도 섭리하시는 하나님의 광대하심을 노래합니다(1~24절). 각종 들짐승과 새, 바다의 리워야단에 이르기까지 모든 생명이 때를 따라 공급하시는 하나님의 손을 바라보며 살아갑니다(25~28절). 하나님의 섭리는 오늘도 쉬지 않습니다(30절). 시편 기자는 창조주 하나님을 평생 노래하기를, 자신의 기도가 하나님께 기쁨이 되기를 소원합니다(33~34절).", "amsung": {"ref": "시 104:24", "text": "여호와여 주께서 하신 일이 어찌 그리 많은지요 주께서 지혜로 그들을 다 지으셨으니 주께서 지으신 것들이 땅에 가득하니이다"}, "passage": "<span class=\"verse-num\">1</span>내 영혼아 여호와를 송축하라 여호와 나의 하나님이여 주는 심히 위대하시며 존귀와 권위로 옷 입으셨나이다 <span class=\"verse-num\">2</span>주께서 옷을 입음 같이 빛을 입으시며 하늘을 휘장 같이 치시며 <span class=\"verse-num\">3</span>물에 자기 누각의 들보를 얹으시며 구름으로 자기 수레를 삼으시고 바람 날개로 다니시며 <span class=\"verse-num\">4</span>바람을 자기 사신으로 삼으시고 불꽃으로 자기 사역자를 삼으시며 <span class=\"verse-num\">5</span>땅에 기초를 놓으사 영원히 흔들리지 아니하게 하셨나이다 <span class=\"verse-num\">6</span>옷으로 덮음 같이 주께서 땅을 깊은 바다로 덮으시매 물이 산들 위로 솟아올랐으나 <span class=\"verse-num\">7</span>주께서 꾸짖으시니 물은 도망하며 주의 우렛소리로 말미암아 빨리 가며 <span class=\"verse-num\">8</span>주께서 그들을 위하여 정하여 주신 곳으로 흘러갔고 산은 오르고 골짜기는 내려갔나이다 <span class=\"verse-num\">9</span>주께서 물의 경계를 정하여 넘치지 못하게 하시며 다시 돌아와 땅을 덮지 못하게 하셨나이다 <span class=\"verse-num\">10</span>여호와께서 샘을 골짜기에서 솟아나게 하시고 산 사이에 흐르게 하사 <span class=\"verse-num\">11</span>각종 들짐승에게 마시게 하시니 들나귀들도 해갈하며 <span class=\"verse-num\">12</span>공중의 새들도 그 가에서 깃들이며 나뭇가지 사이에서 지저귀는도다 <span class=\"verse-num\">13</span>그가 그의 누각에서부터 산에 물을 부어 주시니 주께서 하시는 일의 결실이 땅을 만족시켜 주는도다 <span class=\"verse-num\">14</span>그가 가축을 위한 풀과 사람을 위한 채소를 자라게 하시며 땅에서 먹을 것이 나게 하셔서 <span class=\"verse-num\">15</span>사람의 마음을 기쁘게 하는 포도주와 사람의 얼굴을 윤택하게 하는 기름과 사람의 마음을 힘있게 하는 양식을 주셨도다 <span class=\"verse-num\">16</span>여호와의 나무에는 물이 흡족함이여 곧 그가 심으신 레바논 백향목들이로다 <span class=\"verse-num\">17</span>새들이 그 속에 깃들임이여 학은 잣나무로 집을 삼는도다 <span class=\"verse-num\">18</span>높은 산들은 산양을 위함이여 바위는 너구리의 피난처로다 <span class=\"verse-num\">19</span>여호와께서 달로 절기를 정하심이여 해는 그 지는 때를 알도다 <span class=\"verse-num\">20</span>주께서 흑암을 지어 밤이 되게 하시니 삼림의 모든 짐승이 기어나오나이다 <span class=\"verse-num\">21</span>젊은 사자들은 그들의 먹이를 쫓아 부르짖으며 그들의 먹이를 하나님께 구하다가 <span class=\"verse-num\">22</span>해가 돋으면 물러가서 그들의 굴 속에 눕고 <span class=\"verse-num\">23</span>사람은 나와서 일하며 저녁까지 수고하는도다 <span class=\"verse-num\">24</span>여호와여 주께서 하신 일이 어찌 그리 많은지요 주께서 지혜로 그들을 다 지으셨으니 주께서 지으신 것들이 땅에 가득하니이다 <span class=\"verse-num\">25</span>거기에는 크고 넓은 바다가 있고 그 속에는 생물 곧 크고 작은 동물들이 무수하니이다 <span class=\"verse-num\">26</span>그 곳에는 배들이 다니며 주께서 지으신 리워야단이 그 속에서 노나이다 <span class=\"verse-num\">27</span>이것들은 다 주께서 때를 따라 먹을 것을 주시기를 바라나이다 <span class=\"verse-num\">28</span>주께서 주신즉 그들이 받으며 주께서 손을 펴신즉 그들이 좋은 것으로 만족하다가 <span class=\"verse-num\">29</span>주께서 낯을 숨기신즉 그들이 떨고 주께서 그들의 호흡을 거두신즉 그들은 죽어 먼지로 돌아가나이다 <span class=\"verse-num\">30</span>주의 영을 보내어 그들을 창조하사 지면을 새롭게 하시나이다 <span class=\"verse-num\">31</span>여호와의 영광이 영원히 계속할지며 여호와는 자신께서 행하시는 일들로 말미암아 즐거워하시리로다 <span class=\"verse-num\">32</span>그가 땅을 보신즉 땅이 진동하며 산들을 만지신즉 연기가 나는도다 <span class=\"verse-num\">33</span>내가 평생토록 여호와께 노래하며 내가 살아 있는 동안 내 하나님을 찬양하리로다 <span class=\"verse-num\">34</span>나의 기도를 기쁘게 여기시기를 바라나니 나는 여호와로 말미암아 즐거워하리로다 <span class=\"verse-num\">35</span>죄인들을 땅에서 소멸하시며 악인들을 다시 있지 못하게 하시리로다 내 영혼아 여호와를 송축하라 할렐루야", "exposition": "104편은 하나님의 창조를 노래합니다. 창세기 1장이 하나님을 창조의 유일한 주체로 선포한다면, 본문은 그 피조물이 창조주께 드려야 할 송축의 고백입니다. 주님은 하늘을 휘장처럼 치시고 땅의 기초를 세워 흔들리지 않게 하셨으며, 물의 경계를 정해 혼돈을 막으시는 질서의 하나님이십니다. 모든 생명이 때를 따라 공급하시는 하나님의 손을 의지합니다(27~28절).\n\n30절은 ‘주의 영’을 보내어 지면을 새롭게 하신다고 선포합니다. 이는 물질적 창조를 넘어, 하나님의 영이 지금도 피조물을 새롭게 하시는 섭리를 뜻합니다. 내 호흡 한 번, 오늘 하루의 일상이 창조주의 세밀한 섭리 안에 있음을 기억할 때 “여호와여 주께서 하신 일이 어찌 그리 많은지요”(24절)라고 찬양할 수 있습니다. 평생토록 이 하나님을 노래하는 것이 우리에게 주어진 가장 아름다운 응답입니다(33절).", "question": "이 땅의 질서와 조화를 주관하시는 하나님의 주권을 신뢰하며, 나의 숨결과 모든 일상의 필요까지 세밀하게 채우시는 창조주 하나님께 감사의 기도와 찬양을 드립시다.", "prayer": [{"ref": "1절", "verse": "내 영혼아 여호와를 송축하라 여호와 나의 하나님이여 주는 심히 위대하시며 존귀와 권위로 옷 입으셨나이다", "body": "하나님의 나라가 이 세상에 임하게 하소서. 기후 재앙으로 신음하는 세계를 긍휼히 여겨 주시고, 주님의 창조 질서가 이 땅에 온전히 회복되게 하소서."}, {"ref": "24절", "verse": "여호와여 주께서 하신 일이 어찌 그리 많은지요 주께서 지혜로 그들을 다 지으셨으니 주께서 지으신 것들이 땅에 가득하니이다", "body": "물질만능주의, 생명을 경시하는 세태, 저출산의 어두운 그늘이 사라지게 하소서. 생육하고 번성하고 충만하라는 말씀에 순종하는 세대가 세워지게 하소서."}]}, "2026-07-14": {"book": "시편", "chapter": "105편", "range": "시편 105편 1~45절", "subtitle": "언약의 하나님은 잊지 않으십니다", "theme": "언약을 기억하시는 하나님", "hymn": {"no": "찬송 425장 · 주님의 뜻을 이루소서", "title": "신실하게 진실하게"}, "maek": "본문은 아브라함부터 가나안 입성까지 이스라엘의 역사 속에 나타난 언약의 하나님을 찬양하는 시입니다. 하나님은 고난 가운데 있는 이스라엘 백성을 요셉과 모세를 통해 인도하셨습니다. 시편 기자는 이 모든 구원 역사의 목적이 하나님의 율례를 지키고 순종하게 하려 하는 것임을 선포하며, 주님의 은혜를 기억하고 찬송할 것을 선포합니다.", "amsung": {"ref": "시 105:8", "text": "그는 그의 언약 곧 천 대에 걸쳐 명령하신 말씀을 영원히 기억하셨으니"}, "passage": "<span class=\"verse-num\">1</span>여호와께 감사하고 그의 이름을 불러 아뢰며 그가 하는 일을 만민 중에 알게 할지어다 <span class=\"verse-num\">2</span>그에게 노래하며 그를 찬양하며 그의 모든 기이한 일들을 말할지어다 <span class=\"verse-num\">3</span>그의 거룩한 이름을 자랑하라 여호와를 구하는 자들은 마음이 즐거울지로다 <span class=\"verse-num\">4</span>여호와와 그의 능력을 구할지어다 그의 얼굴을 항상 구할지어다 <span class=\"verse-num\">5</span>- <span class=\"verse-num\">6</span>그의 종 아브라함의 후손 곧 택하신 야곱의 자손 너희는 그가 행하신 기적과 그의 이적과 그의 입의 판단을 기억할지어다 <span class=\"verse-num\">7</span>그는 여호와 우리 하나님이시라 그의 판단이 온 땅에 있도다 <span class=\"verse-num\">8</span>그는 그의 언약 곧 천 대에 걸쳐 명령하신 말씀을 영원히 기억하셨으니 <span class=\"verse-num\">9</span>이것은 아브라함과 맺은 언약이고 이삭에게 하신 맹세이며 <span class=\"verse-num\">10</span>야곱에게 세우신 율례 곧 이스라엘에게 하신 영원한 언약이라 <span class=\"verse-num\">11</span>이르시기를 내가 가나안 땅을 네게 주어 너희에게 할당된 소유가 되게 하리라 하셨도다 <span class=\"verse-num\">12</span>그 때에 그들의 사람 수가 적어 그 땅의 나그네가 되었고 <span class=\"verse-num\">13</span>이 족속에게서 저 족속에게로, 이 나라에서 다른 민족에게로 떠돌아다녔도다 <span class=\"verse-num\">14</span>그러나 그는 사람이 그들을 억압하는 것을 용납하지 아니하시고 그들로 말미암아 왕들을 꾸짖어 <span class=\"verse-num\">15</span>이르시기를 나의 기름 부은 자를 손대지 말며 나의 선지자들을 해하지 말라 하셨도다 <span class=\"verse-num\">16</span>그가 또 그 땅에 기근이 들게 하사 그들이 의지하고 있는 양식을 다 끊으셨도다 <span class=\"verse-num\">17</span>그가 한 사람을 앞서 보내셨음이여 요셉이 종으로 팔렸도다 <span class=\"verse-num\">18</span>그의 발은 차꼬를 차고 그의 몸은 쇠사슬에 매였으니 <span class=\"verse-num\">19</span>곧 여호와의 말씀이 응할 때까지라 그의 말씀이 그를 단련하였도다 <span class=\"verse-num\">20</span>왕이 사람을 보내어 그를 석방함이여 뭇 백성의 통치자가 그를 자유롭게 하였도다 <span class=\"verse-num\">21</span>그를 그의 집의 주관자로 삼아 그의 모든 소유를 관리하게 하고 <span class=\"verse-num\">22</span>그의 뜻대로 모든 신하를 다스리며 그의 지혜로 장로들을 교훈하게 하였도다 <span class=\"verse-num\">23</span>이에 이스라엘이 애굽에 들어감이여 야곱이 함의 땅에 나그네가 되었도다 <span class=\"verse-num\">24</span>여호와께서 자기의 백성을 크게 번성하게 하사 그의 대적들보다 강하게 하셨으며 <span class=\"verse-num\">25</span>또 그 대적들의 마음이 변하게 하여 그의 백성을 미워하게 하시며 그의 종들에게 교활하게 행하게 하셨도다 <span class=\"verse-num\">26</span>그리하여 그는 그의 종 모세와 그의 택하신 아론을 보내시니 <span class=\"verse-num\">27</span>그들이 그들의 백성 중에서 여호와의 표적을 보이고 함의 땅에서 징조들을 행하였도다 <span class=\"verse-num\">28</span>여호와께서 흑암을 보내사 그곳을 어둡게 하셨으나 그들은 그의 말씀을 지키지 아니하였도다 <span class=\"verse-num\">29</span>그들의 물도 변하여 피가 되게 하사 그들의 물고기를 죽이셨도다 <span class=\"verse-num\">30</span>그 땅에 개구리가 많아져서 왕의 궁실에도 있었도다 <span class=\"verse-num\">31</span>여호와께서 말씀하신즉 파리 떼가 오며 그들의 온 영토에 이가 생겼도다 <span class=\"verse-num\">32</span>비 대신 우박을 내리시며 그들의 땅에 화염을 내리셨도다 <span class=\"verse-num\">33</span>그들의 포도나무와 무화과나무를 치시며 그들의 지경에 있는 나무를 찍으셨도다 <span class=\"verse-num\">34</span>여호와께서 말씀하신즉 황충과 수많은 메뚜기가 몰려와 <span class=\"verse-num\">35</span>그들의 땅에 있는 모든 채소를 먹으며 그들의 밭에 있는 열매를 먹었도다 <span class=\"verse-num\">36</span>또 여호와께서 그들의 기력의 시작인 그 땅의 모든 장자를 치셨도다 <span class=\"verse-num\">37</span>마침내 그들을 인도하여 은 금을 가지고 나오게 하시니 그의 지파 중에 비틀거리는 자가 하나도 없었도다 <span class=\"verse-num\">38</span>그들이 떠날 때에 애굽이 기뻐하였으니 그들이 그들을 두려워함이로다 <span class=\"verse-num\">39</span>여호와께서 낮에는 구름을 펴사 덮개를 삼으시고 밤에는 불로 밝히셨으며 <span class=\"verse-num\">40</span>그들이 구한즉 메추라기를 가져 오시고 또 하늘의 양식으로 그들을 만족하게 하셨도다 <span class=\"verse-num\">41</span>반석을 여신즉 물이 흘러나와 마른 땅에 강 같이 흘렀으니 <span class=\"verse-num\">42</span>이는 그의 거룩한 말씀과 그의 종 아브라함을 기억하셨음이로다 <span class=\"verse-num\">43</span>그의 백성이 즐겁게 나오게 하시며 그의 택한 자는 노래하며 나오게 하시고 <span class=\"verse-num\">44</span>여러 나라의 땅을 그들에게 주시며 민족들이 수고한 것을 소유로 가지게 하셨으니 <span class=\"verse-num\">45</span>이는 그들이 그의 율례를 지키고 그의 율법을 따르게 하려 하심이로다 할렐루야", "exposition": "105편은 아브라함 시대부터 가나안 입성까지 하나님의 언약이 어떻게 성취되어 왔는지를 선포하는 찬양시입니다. 역대상 16장에는 다윗이 언약궤를 예루살렘으로 옮길 때 이 시의 앞부분을 찬양에 사용했다는 기록이 있습니다. 나라를 잃고 이방 땅에서 살아가는 포로기 백성에게도, 이 역사의 선포는 “보라, 하나님은 전에도 잊지 않으셨다. 지금도 잊지 않으신다”라는 동일한 소망의 메시지가 되었을 것입니다.\n\n현재의 고통은 하나님의 언약이 끝났다는 증거가 아닙니다. “그는 그의 언약을 … 영원히 기억하셨으니”(8절). 오히려 하나님은 과거에도 현재에도 약속의 말씀 안에서 역사하고 계십니다. 모든 역사의 주관자는 하나님이십니다. 하나님의 언약은 하나님의 때에 반드시 성취됩니다.", "question": "내 삶에 이해할 수 없는 시련이 닥칠 때 그 안에도 신실하신 하나님의 언약과 목적이 있음을 온전히 신뢰합니까?", "prayer": [{"ref": "1절", "verse": "여호와께 감사하고 그의 이름을 불러 아뢰며 그가 하는 일을 만민 중에 알게 할지어다", "body": "세계 열방 가운데 선교의 문이 계속해서 활짝 열리게 하시고, 이를 방해하는 악한 사탄의 역사가 예수 그리스도의 이름으로 떠나가게 하소서."}, {"ref": "8절", "verse": "그는 그의 언약 곧 천 대에 걸쳐 명령하신 말씀을 영원히 기억하셨으니", "body": "주님의 선하신 뜻이 온전히 이루어지게 하소서. 천 대에 걸쳐 약속을 기억하시는 신실하신 하나님, 무슨 일을 만나든지 원망하지 않고 오직 믿음으로 순종하며 하나님의 성품을 드러내는 삶을 살게 하소서."}]}, "2026-07-15": {"book": "시편", "chapter": "106편", "range": "시편 106편 1~23절", "subtitle": "반복되는 죄, 멈추지 않는 은혜", "theme": "반복되는 죄와 은혜", "hymn": {"no": "찬송 310장 · 아 하나님의 은혜로", "title": "이 세상을 살아가는 동안에(원하고 바라고 기도합니다)"}, "maek": "본문은 인간의 반복적인 죄의 성품을 고백하는 회개와 참회의 시입니다. 시편 기자는 홍해의 기적을 체험하고도 금방 하나님의 행하심을 잊어버린 조상들의 죄를 자신의 죄로 고백합니다. 더불어 탐욕과 우상 숭배로 인해 광야에서 멸망할 위기에 처했을 때, 하나님이 세우신 중보자 모세의 기도를 통해 진노를 돌이키신 하나님의 자비로운 성품을 묵상합니다.", "amsung": {"ref": "시 106:4", "text": "여호와여 주의 백성에게 베푸시는 은혜로 나를 기억하시며 주의 구원으로 나를 돌보사"}, "passage": "<span class=\"verse-num\">1</span>할렐루야 여호와께 감사하라 그는 선하시며 그 인자하심이 영원함이로다 <span class=\"verse-num\">2</span>누가 능히 여호와의 권능을 다 말하며 주께서 받으실 찬양을 다 선포하랴 <span class=\"verse-num\">3</span>정의를 지키는 자들과 항상 공의를 행하는 자는 복이 있도다 <span class=\"verse-num\">4</span>여호와여 주의 백성에게 베푸시는 은혜로 나를 기억하시며 주의 구원으로 나를 돌보사 <span class=\"verse-num\">5</span>내가 주의 택하신 자가 형통함을 보고 주의 나라의 기쁨을 나누어 가지게 하사 주의 유산을 자랑하게 하소서 <span class=\"verse-num\">6</span>우리가 우리의 조상들처럼 범죄하여 사악을 행하며 악을 지었나이다 <span class=\"verse-num\">7</span>우리의 조상들이 애굽에 있을 때 주의 기이한 일들을 깨닫지 못하며 주의 크신 인자를 기억하지 아니하고 바다 곧 홍해에서 거역하였나이다 <span class=\"verse-num\">8</span>그러나 여호와께서는 자기의 이름을 위하여 그들을 구원하셨으니 그의 큰 권능을 만인이 알게 하려 하심이로다 <span class=\"verse-num\">9</span>이에 홍해를 꾸짖으시니 곧 마르니 그들을 인도하여 바다 건너가기를 마치 광야를 지나감 같게 하사 <span class=\"verse-num\">10</span>그들을 그 미워하는 자의 손에서 구원하시며 그 원수의 손에서 구원하셨고 <span class=\"verse-num\">11</span>그들의 대적들은 물로 덮으시매 그들 중에서 하나도 살아 남지 못하였도다 <span class=\"verse-num\">12</span>이에 그들이 그의 말씀을 믿고 그를 찬양하는 노래를 불렀도다 <span class=\"verse-num\">13</span>그러나 그들은 그가 행하신 일을 곧 잊어버리며 그의 가르침을 기다리지 아니하고 <span class=\"verse-num\">14</span>광야에서 욕심을 크게 내며 사막에서 하나님을 시험하였도다 <span class=\"verse-num\">15</span>그러므로 여호와께서는 그들이 요구한 것을 그들에게 주셨을지라도 그들의 영혼은 쇠약하게 하셨도다 <span class=\"verse-num\">16</span>그들이 진영에서 모세와 여호와의 거룩한 자 아론을 질투하매 <span class=\"verse-num\">17</span>땅이 갈라져 다단을 삼키며 아비람의 당을 덮었고 <span class=\"verse-num\">18</span>불이 그들의 당에 붙음이여 화염이 악인들을 살랐도다 <span class=\"verse-num\">19</span>그들이 호렙에서 송아지를 만들고 부어 만든 우상을 경배하여 <span class=\"verse-num\">20</span>자기 영광을 풀 먹는 소의 형상으로 바꾸었도다 <span class=\"verse-num\">21</span>애굽에서 큰 일을 행하신 그의 구원자 하나님을 그들이 잊었나니 <span class=\"verse-num\">22</span>그는 함의 땅에서 기사와 홍해에서 놀랄 만한 일을 행하신 이시로다 <span class=\"verse-num\">23</span>그러므로 여호와께서 그들을 멸하리라 하셨으나 그가 택하신 모세가 그 어려움 가운데에서 그의 앞에 서서 그의 노를 돌이켜 멸하시지 아니하게 하였도다", "exposition": "106편은 출애굽부터 바벨론 포로기에 이르는 이스라엘의 죄악과 반역의 역사를 고백하는 참회시입니다. 시편 기자는 하나님의 위대한 구원 역사 뒤에 숨겨진 인간의 뿌리 깊은 죄를 고발합니다. 이스라엘 백성은 홍해를 가르신 하나님의 권능을 노래한 지 얼마 되지 않아 시내산에서 금송아지 우상을 만들고(출 32장), 탐욕과 반역의 죄에 빠졌습니다.\n\n인간의 죄성은 하나님의 은혜를 경험하고도 잊어버리는 완악함에 뿌리를 둡니다. 하나님은 백성의 반복되는 죄에도 불구하고 그들과 맺으신 언약을 기억하시며 인자하심을 따라 뜻을 돌이키셨습니다(106:45). 우리의 연약함을 아시고 독생자 예수 그리스도를 이 땅에 보내 주신 하나님의 사랑이 바로 그 증거입니다.", "question": "하나님의 은혜를 경험하고도 그 은혜를 잊어버린 채 원망의 자리에 서 있지는 않은지 돌아봅시다.", "prayer": [{"ref": "8절", "verse": "그러나 여호와께서는 자기의 이름을 위하여 그들을 구원하셨으니 그의 큰 권능을 만인이 알게 하려 하심이로다", "body": "북한 땅을 구원의 빛으로 환하게 밝혀 주소서. 그 땅의 모든 이가 살아 계신 하나님을 믿게 하소서. 가난과 굶주림으로 고통받고 있는 북한 주민들을 불쌍히 여겨 주소서."}, {"ref": "23절", "verse": "그러므로 여호와께서 그들을 멸하리라 하셨으나 그가 택하신 모세가 그 어려움 가운데에서 그의 앞에 서서 그의 노를 돌이켜 멸하시지 아니하게 하였도다", "body": "죽어 가는 열방의 영혼들을 위해 눈물로 씨앗을 뿌리며 기도하는 중보자들을 일으켜 주소서. 선교 완성을 위한 중보자와 동역자가 풍성히 일어나 기도의 부흥을 경험하게 하소서."}]}, "2026-07-16": {"book": "시편", "chapter": "106편", "range": "시편 106편 24~48절", "subtitle": "죄의 깊이보다 깊은 하나님의 사랑", "theme": "죄보다 깊은 사랑", "hymn": {"no": "찬송 304장 · 그 크신 하나님의 사랑", "title": "하나님의 사랑을(주만 바라볼찌라)"}, "maek": "본문은 가나안 입성 이후에도 이어진 이스라엘의 불신앙과 타락의 역사를 다룹니다. 백성은 우상 숭배와 혼합주의, 자녀를 제물로 바치는 끔찍한 죄를 범하며 하나님의 진노를 샀습니다. 그러나 하나님은 그들이 고통 중에 부르짖자 백성과 맺으신 언약을 기억하고 뜻을 돌이키셨습니다. 이에 시편 기자는 거듭된 용서의 은혜를 근거로 현재의 포로 생활에서 구원해 주실 것을 간구합니다.", "amsung": {"ref": "시 106:44~45", "text": "그러나 여호와께서 그들의 부르짖음을 들으실 때에 그들의 고통을 돌보시며 그들을 위하여 그의 언약을 기억하시고 그 크신 인자하심을 따라 뜻을 돌이키사"}, "passage": "<span class=\"verse-num\">24</span>그들이 그 기쁨의 땅을 멸시하며 그 말씀을 믿지 아니하고 <span class=\"verse-num\">25</span>그들의 장막에서 원망하며 여호와의 음성을 듣지 아니하였도다 <span class=\"verse-num\">26</span>이러므로 그가 그의 손을 들어 그들에게 맹세하기를 그들이 광야에 엎드러지게 하고 <span class=\"verse-num\">27</span>또 그들의 후손을 뭇 백성 중에 엎드러뜨리며 여러 나라로 흩어지게 하리라 하셨도다 <span class=\"verse-num\">28</span>그들이 또 브올의 바알과 연합하여 죽은 자에게 제사한 음식을 먹어서 <span class=\"verse-num\">29</span>그 행위로 주를 격노하게 함으로써 재앙이 그들 중에 크게 유행하였도다 <span class=\"verse-num\">30</span>그 때에 비느하스가 일어서서 중재하니 이에 재앙이 그쳤도다 <span class=\"verse-num\">31</span>이 일이 그의 의로 인정되었으니 대대로 영원까지로다 <span class=\"verse-num\">32</span>그들이 또 므리바 물에서 여호와를 노하시게 하였으므로 그들 때문에 재난이 모세에게 이르렀나니 <span class=\"verse-num\">33</span>이는 그들이 그의 뜻을 거역함으로 말미암아 모세가 그의 입술로 망령되이 말하였음이로다 <span class=\"verse-num\">34</span>그들은 여호와께서 멸하라고 말씀하신 그 이방 민족들을 멸하지 아니하고 <span class=\"verse-num\">35</span>그 이방 나라들과 섞여서 그들의 행위를 배우며 <span class=\"verse-num\">36</span>그들의 우상들을 섬기므로 그것들이 그들에게 올무가 되었도다 <span class=\"verse-num\">37</span>그들이 그들의 자녀를 악귀들에게 희생제물로 바쳤도다 <span class=\"verse-num\">38</span>무죄한 피 곧 그들의 자녀의 피를 흘려 가나안의 우상들에게 제사하므로 그 땅이 피로 더러워졌도다 <span class=\"verse-num\">39</span>그들은 그들의 행위로 더러워지니 그들의 행동이 음탕하도다 <span class=\"verse-num\">40</span>그러므로 여호와께서 자기 백성에게 맹렬히 노하시며 자기의 유업을 미워하사 <span class=\"verse-num\">41</span>그들을 이방 나라의 손에 넘기시매 그들을 미워하는 자들이 그들을 다스렸도다 <span class=\"verse-num\">42</span>그들이 원수들의 압박을 받고 그들의 수하에 복종하게 되었도다 <span class=\"verse-num\">43</span>여호와께서 여러 번 그들을 건지시나 그들은 교묘하게 거역하며 자기 죄악으로 말미암아 낮아짐을 당하였도다 <span class=\"verse-num\">44</span>그러나 여호와께서 그들의 부르짖음을 들으실 때에 그들의 고통을 돌보시며 <span class=\"verse-num\">45</span>그들을 위하여 그의 언약을 기억하시고 그 크신 인자하심을 따라 뜻을 돌이키사 <span class=\"verse-num\">46</span>그들을 사로잡은 모든 자에게서 긍휼히 여김을 받게 하셨도다 <span class=\"verse-num\">47</span>여호와 우리 하나님이여 우리를 구원하사 여러 나라로부터 모으시고 우리가 주의 거룩하신 이름을 감사하며 주의 영예를 찬양하게 하소서 <span class=\"verse-num\">48</span>여호와 이스라엘의 하나님을 영원부터 영원까지 찬양할지어다 모든 백성들아 아멘 할지어다 할렐루야", "exposition": "106편 후반부는 인간의 타락이 얼마나 깊어질 수 있는지 보여 줍니다. 이스라엘은 약속의 땅을 눈앞에 두고도 하나님의 말씀을 믿지 않았고, 가나안에 들어가서는 이방 민족과 섞여 그들의 가증한 우상 숭배를 본받았습니다. 자녀를 우상에게 제물로 바치는 참혹한 죄는 하나님의 진노를 극에 달하게 했습니다.\n\n놀라운 것은 백성이 도저히 용서받을 수 없는 자리에 있을 때도, 하나님은 그들이 부르짖는 소리를 외면하지 않으셨다는 사실입니다. 그들과 맺으신 언약을 기억하셨고, 그분의 인자하심을 따라 심판의 뜻을 돌이키셨습니다. 나의 허물보다 크신 주님의 사랑을 의지하며, 다시금 주님을 찬송하는 자리로 나아갑시다.", "question": "십자가의 놀라운 은혜를 받았음에도 불구하고 교묘하게 세상과 타협하며 반복적으로 넘어지는 죄의 영역이 있다면 무엇입니까?", "prayer": [{"ref": "35~36절", "verse": "그 이방 나라들과 섞여서 그들의 행위를 배우며 그들의 우상들을 섬기므로 그것들이 그들에게 올무가 되었도다", "body": "회개의 영을 부어 주소서. 이 땅에 영적 대각성이 일어나게 하소서. 예배의 부흥과 성도의 성결한 삶을 통해 세상에 하나님의 통치가 임하게 하소서."}, {"ref": "44~45절", "verse": "그러나 여호와께서 그들의 부르짖음을 들으실 때에 그들의 고통을 돌보시며 그들을 위하여 그의 언약을 기억하시고 그 크신 인자하심을 따라 뜻을 돌이키사", "body": "북한의 인권 탄압이 속히 사라지고, 북한 주민들이 온전한 자유를 누리게 하소서. 남북한의 다음 세대에게 통일을 향한 하나님의 비전을 부어 주시고, 그들이 통일을 위해 구체적으로 기도하며 준비하게 하소서."}]}, "2026-07-17": {"book": "미가", "chapter": "1장", "range": "미가 1장 1~16절", "subtitle": "심판이 아닌 애통으로 서라", "theme": "애통하는 선지자", "hymn": {"no": "찬송 272장 · 고통의 멍에 벗으려고", "title": "보소서 주님(주님 마음 내게 주소서)"}, "maek": "미가 선지자는 사마리아와 예루살렘의 우상 숭배에 대한 하나님의 준엄한 심판을 선포합니다. 여호와 하나님이 성소에서 나와 산들을 녹이시고 골짜기를 가르시는 장엄한 위엄으로 임하십니다. 죄의 파괴적인 결과를 목격한 선지자는 벌거벗은 몸으로 들개같이 울부짖으며 애통해합니다.", "amsung": {"ref": "미 1:3", "text": "여호와께서 그의 처소에서 나오시고 강림하사 땅의 높은 곳을 밟으실 것이라"}, "passage": "<span class=\"verse-num\">1</span>유다의 왕들 요담과 아하스와 히스기야 시대에 모레셋 사람 미가에게 임한 여호와의 말씀 곧 사마리아와 예루살렘에 관한 묵시라\n\n<span class=\"verse-num\">2</span>백성들아 너희는 다 들을지어다 땅과 거기에 있는 모든 것들아 자세히 들을지어다 주 여호와께서 너희에게 대하여 증언하시되 곧 주께서 성전에서 그리하실 것이니라 <span class=\"verse-num\">3</span>여호와께서 그의 처소에서 나오시고 강림하사 땅의 높은 곳을 밟으실 것이라 <span class=\"verse-num\">4</span>그 아래에서 산들이 녹고 골짜기들이 갈라지기를 불 앞의 밀초 같고 비탈로 쏟아지는 물 같을 것이니 <span class=\"verse-num\">5</span>이는 다 야곱의 허물로 말미암음이요 이스라엘 족속의 죄로 말미암음이라 야곱의 허물이 무엇이냐 사마리아가 아니냐 유다의 산당이 무엇이냐 예루살렘이 아니냐 <span class=\"verse-num\">6</span>이러므로 내가 사마리아를 들의 무더기 같게 하고 포도 심을 동산 같게 하며 또 그 돌들을 골짜기에 쏟아내리고 그 기초를 드러내며 <span class=\"verse-num\">7</span>그 새긴 우상들은 다 부서지고 그 음행의 값은 다 불살라지며 내가 그 목상들을 다 깨뜨리리니 그가 기생의 값으로 모았은즉 그것이 기생의 값으로 돌아가리라\n\n<span class=\"verse-num\">8</span>이러므로 내가 애통하며 애곡하고 벌거벗은 몸으로 행하며 들개 같이 애곡하고 타조 같이 애통하리니 <span class=\"verse-num\">9</span>이는 그 상처는 고칠 수 없고 그것이 유다까지도 이르고 내 백성의 성문 곧 예루살렘에도 미쳤음이니라 <span class=\"verse-num\">10</span>가드에 알리지 말며 도무지 울지 말지어다 내가 베들레아브라에서 티끌에 굴렀도다 <span class=\"verse-num\">11</span>사빌 주민아 너는 벗은 몸에 수치를 무릅쓰고 나갈지어다 사아난 주민은 나오지 못하고 벧에셀이 애곡하여 너희에게 의지할 곳이 없게 하리라 <span class=\"verse-num\">12</span>마롯 주민이 근심 중에 복을 바라니 이는 재앙이 여호와께로 말미암아 예루살렘 성문에 임함이니라 <span class=\"verse-num\">13</span>라기스 주민아 너는 준마에 병거를 메울지어다 라기스는 딸 시온의 죄의 근본이니 이는 이스라엘의 허물이 네게서 보였음이니라 <span class=\"verse-num\">14</span>이러므로 너는 가드모레셋에 작별하는 예물을 줄지어다 악십의 집들이 이스라엘 왕들을 속이리라 <span class=\"verse-num\">15</span>마레사 주민아 내가 장차 너를 소유할 자로 네게 이르게 하리니 이스라엘의 영광이 아둘람까지 이를 것이라 <span class=\"verse-num\">16</span>너는 네 기뻐하는 자식으로 인하여 네 머리털을 깎아 대머리 같게 할지어다 네 머리가 크게 벗어지게 하기를 독수리 같게 할지어다 이는 그들이 사로잡혀 너를 떠났음이라", "exposition": "미가가 선포하는 심판의 이유는 명확합니다. “이는 야곱의 허물로 말미암음이요 이스라엘 족속의 죄로 말미암음이라”(5절). 그 허물의 중심에 사마리아와 예루살렘이 있습니다. 정치의 중심과 신앙의 중심이 모두 죄의 진원지가 된 것입니다. 우상의 산당이 세워지고, 재물과 권력이 하나님의 자리를 차지했습니다. 하나님은 이 상황을 가만히 두고 보지 않으십니다 여호와께서 그의 처소에서 나오시고 강림하사 땅의 높은 곳을 밟으실 것이라” (3절). 그동안 하나님이 침묵하셨지만 때가 되어 심판이 임할 것입니다. 그런데 이 심판의 말씀을 전하는 미가의 모습이 인상적입니다. 들개처럼 울부짖으며, 벌거벗은 몸으로 애통해합니다(8절). 참된 예언자는 심판을 선포하면서 동시에 그 심판 앞에서 함께 울며 마음 아파합니다. 자기 백성의 상처가 낫지 못할 것을 슬퍼하는 목자의 마음이 우리에게도 필요합니다.", "question": "이 시대의 죄악 앞에서 나는 정죄하는 자입니까, 아니면 함께 애통하며 기도하는 자입니까?", "prayer": [{"ref": "2절", "verse": "백성들아 너희는 다 들을지어다 땅과 거기에 있는 모든 것들아 자세히 들을지어다 주 여호와께서 너희에게 대하여 증언하시되 곧 주께서 성전에서 그리하실 것이니라", "body": "“다 들을지어다, 자세히 들을지어다”라고 말씀하시는 주님의 음성에 귀를 열게 하소서. 주님의 공의를 인정하게 하소서. 세상의 소란한 소리에 마음을 빼앗기지 않고, 오직 성소에서 들려오는 주님의 말씀에 귀를 기울이며 주님 앞에 나아가게 하소서."}, {"ref": "8절", "verse": "이러므로 내가 애통하며 애곡하고 벌거벗은 몸으로 행하며 들개 같이 애곡하고 타조 같이 애통하리니", "body": "이 땅의 황무함을 보소서. 세계 곳곳에서 벌어지고 있는 복수와 보복, 죄악과 고통의 악순환이 끊어지고, 십자가 사랑으로 온 열방이 회복되게 하소서. 이 시대를 보며 미가 선지자처럼 함께 애통해하며 울 수 있는 긍휼의 마음을 주소서."}]}, "2026-07-18": {"book": "미가", "chapter": "2장", "range": "미가 2장 1~13절", "subtitle": "탐욕이 공동체를 삼킬 때 길을 여시는 하나님", "theme": "길을 여시는 하나님", "hymn": {"no": "찬송 218장 · 네 맘과 정성을 다하여서", "title": "주님 다시 오실 때까지"}, "maek": "권력자들이 밤새 악을 꾀하고 날이 밝으면 남의 밭과 집을 강탈하는 탐욕의 죄를 하나님이 고발하십니다. 백성은 미가의 심판 예언을 거부하며 “예언하지 말라”라고 외치고, 오히려 풍요와 즐거움을 말하는 거짓 선지자를 환영합니다. 하나님은 그들에게 심판을 선언하신 뒤, 남은 자들과 앞서가는 왕의 환상을 보여 주시며 회복의 소망을 허락하십니다.", "amsung": {"ref": "미 2:13", "text": "길을 여는 자가 그들 앞에 올라가고 그들은 길을 열어 성문에 이르러서는 그리로 나갈 것이며 그들의 왕이 앞서 가며 여호와께서는 선두로 가시리라"}, "passage": "<span class=\"verse-num\">1</span>그들이 침상에서 죄를 꾀하며 악을 꾸미고 날이 밝으면 그 손에 힘이 있으므로 그것을 행하는 자는 화 있을진저 <span class=\"verse-num\">2</span>밭들을 탐하여 빼앗고 집들을 탐하여 차지하니 그들이 남자와 그의 집과 사람과 그의 산업을 강탈하도다 <span class=\"verse-num\">3</span>그러므로 여호와의 말씀에 내가 이 족속에게 재앙을 계획하나니 너희의 목이 이에서 벗어나지 못할 것이요 또한 교만하게 다니지 못할 것이라 이는 재앙의 때임이라 하셨느니라 <span class=\"verse-num\">4</span>그 때에 너희를 조롱하는 시를 지으며 슬픈 노래를 불러 이르기를 우리가 온전히 망하게 되었도다 그가 내 백성의 산업을 옮겨 내게서 떠나게 하시며 우리 밭을 나누어 패역자에게 주시는도다 하리니 <span class=\"verse-num\">5</span>그러므로 여호와의 회중에서 분깃에 줄을 댈 자가 너희 중에 하나도 없으리라 <span class=\"verse-num\">6</span>그들이 말하기를 너희는 예언하지 말라 이것은 예언할 것이 아니거늘 욕하는 말을 그치지 아니한다 하는도다 <span class=\"verse-num\">7</span>너희 야곱의 족속아 어찌 이르기를 여호와의 영이 성급하시다 하겠느냐 그의 행위가 이러하시다 하겠느냐 나의 말이 정직하게 행하는 자에게 유익하지 아니하냐 <span class=\"verse-num\">8</span>근래에 내 백성이 원수 같이 일어나서 전쟁을 피하여 평안히 지나가는 자들의 의복에서 겉옷을 벗기며 <span class=\"verse-num\">9</span>내 백성의 부녀들을 그들의 즐거운 집에서 쫓아내고 그들의 어린 자녀에게서 나의 영광을 영원히 빼앗는도다 <span class=\"verse-num\">10</span>이것은 너희가 쉴 곳이 아니니 일어나 떠날지어다 이는 그것이 이미 더러워졌음이니라 그런즉 반드시 멸하리니 그 멸망이 크리라 <span class=\"verse-num\">11</span>사람이 만일 허망하게 행하며 거짓말로 이르기를 내가 포도주와 독주에 대하여 네게 예언하리라 할 것 같으면 그 사람이 이 백성의 선지자가 되리로다 <span class=\"verse-num\">12</span>야곱아 내가 반드시 너희 무리를 다 모으며 내가 반드시 이스라엘의 남은 자를 모으고 그들을 한 처소에 두기를 보스라의 양 떼 같이 하며 초장의 양 떼 같이 하리니 사람들이 크게 떠들 것이며 <span class=\"verse-num\">13</span>길을 여는 자가 그들 앞에 올라가고 그들은 길을 열어 성문에 이르러서는 그리로 나갈 것이며 그들의 왕이 앞서 가며 여호와께서는 선두로 가시리라", "exposition": "2장은 은밀한 침상에서부터 시작된 인간의 탐욕이 공동체를 어떻게 파괴하는지 생생하게 묘사합니다. 권력자들은 밤에 악을 계획하고 낮에 그것을 실행하며 가난한 이들의 밭과 집을 강탈했습니다. 하나님 앞에서 다루어지지 않는 죄는 없습니다. 하나님은 그들에게 ‘재앙’을 계획하심으로써 심은 대로 거두게 하십니다.\n\n그럼에도 불구하고 하나님은 심판을 선언하신 뒤 ‘길을 여는 자’로 등장하십니다. 주님은 흩어진 남은 자들을 모으시고, 어떤 장애물도 뚫고 나가는 통로가 되셔서 자기 백성을 영광의 길로 이끄십니다.", "question": "나의 유익을 위해 다른 사람의 아픔을 외면하거나, 듣기 좋은 말에만 귀를 기울이며 하나님의 말씀을 외면하는 모습이 내게 없는지 살펴봅시다.", "prayer": [{"ref": "6절", "verse": "그들이 말하기를 너희는 예언하지 말라 이것은 예언할 것이 아니거늘 욕하는 말을 그치지 아니한다 하는도다", "body": "듣기 좋은 달콤한 위로에만 귀를 기울이는 영적 나태함에서 벗어나게 하소서. 나의 죄와 어리석음을 정당화하려는 고집을 꺾어 주시고, 오직 겸비한 마음으로 주님의 모든 말씀에 반응하며 돌이키는 은혜를 허락하소서."}, {"ref": "13절", "verse": "길을 여는 자가 그들 앞에 올라가고 그들은 길을  하소서."}, {"ref": "6~7절", "verse": "여호와께서 말씀하시되 그 날에는 내가 저는 자를 모으며 쫓겨난 자와 내가 환난 받게 한 자를 모아 발을 저는 자는 남은 백성이 되게 하며 멀리 쫓겨났던 자들이 강한 나라가 되게 하고 나 여호와가 시온 산에서 이제부터 영원까지 그들을 다스리리라 하셨나니", "body": "한반도에 하나님이 통치하시는 그리스도의 계절이 속히 오게 하소서. 이 땅에 전쟁의 위협이 사라지고, 복음 통일이 속히 이루어지게 하소서. 북한에 있는 주민들이 꿈속에서라도 주님을 만나게 하시고, 그들을 굶주림과 병든 마음에서 건지시고 고쳐 주소서."}]}, "2026-07-22": {"book": "미가", "chapter": "5장", "range": "미가 5장 1~15절", "subtitle": "가장 작은 곳에서 시작되는 하나님의 구원", "theme": "작은 곳에서 시작되는 구원", "hymn": {"no": "찬송 419장 · 주 날개 밑 내가 편안히 쉬네", "title": "왕이신 나의 하나님"}, "maek": "현재의 굴욕과 포위 속에서 베들레헴에서 나실 새로운 통치자를 통해 임할 완전한 회복이 선포됩니다. 이 통치자는 자기 양 떼를 먹이며, 이방의 압제로부터 백성을 건져 냅니다. 하나님은 정결하게 된 남은 자들을 통해 온 세상을 새롭게 하시며, 모든 우상과 군사력을 폐하고 오직 주님만이 만왕의 왕이심을 선포합니다.", "amsung": {"ref": "미 5:2", "text": "베들레헴 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라 그의 근본은 상고에, 영원에 있느니라"}, "passage": "<span class=\"verse-num\">1</span>딸 군대여 너는 떼를 모을지어다 그들이 우리를 에워쌌으니 막대기로 이스라엘 재판자의 뺨을 치리로다\n\n<span class=\"verse-num\">2</span>베들레헴 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라 그의 근본은 상고에, 영원에 있느니라 <span class=\"verse-num\">3</span>그러므로 여인이 해산하기까지 그들을 붙여 두시겠고 그 후에는 그의 형제 가운데에 남은 자가 이스라엘 자손에게로 돌아오리니 <span class=\"verse-num\">4</span>그가 여호와의 능력과 그의 하나님 여호와의 이름의 위엄을 의지하고 서서 목축하니 그들이 거주할 것이라 이제 그가 창대하여 땅 끝까지 미치리라 <span class=\"verse-num\">5</span>이 사람은 평강이 될 것이라 앗수르 사람이 우리 땅에 들어와서 우리 궁들을 밟을 때에는 우리가 일곱 목자와 여덟 군왕을 일으켜 그를 치리니 <span class=\"verse-num\">6</span>그들이 칼로 앗수르 땅을 황폐하게 하며 니므롯 땅 어귀를 황폐하게 하리라 앗수르 사람이 우리 땅에 들어와서 우리 지경을 밟을 때에는 그가 우리를 그에게서 건져내리라 <span class=\"verse-num\">7</span>야곱의 남은 자는 많은 백성 가운데 있으리니 그들은 여호와께로부터 내리는 이슬 같고 풀 위에 내리는 단비 같아서 사람을 기다리지 아니하며 인생을 기다리지 아니할 것이며 <span class=\"verse-num\">8</span>야곱의 남은 자는 여러 나라 가운데와 많은 백성 가운데에 있으리니 그들은 수풀의 짐승들 중의 사자 같고 양 떼 중의 젊은 사자 같아서 만일 그가 지나간즉 밟고 찢으리니 능히 구원할 자가 없을 것이라 <span class=\"verse-num\">9</span>네 손이 네 대적들 위에 들려서 네 모든 원수를 진멸하기를 바라노라\n\n<span class=\"verse-num\">10</span>여호와께서 이르시되 그 날에 이르러는 내가 네 군마를 네 가운데에서 멸절하며 네 병거를 부수며 <span class=\"verse-num\">11</span>네 땅의 성읍들을 멸하며 네 모든 견고한 성을 무너뜨릴 것이며 <span class=\"verse-num\">12</span>내가 또 복술을 네 손에서 끊으리니 네게 다시는 점쟁이가 없게 될 것이며 <span class=\"verse-num\">13</span>내가 네가 새긴 우상과 주상을 너희 가운데에서 멸절하리니 네가 네 손으로 만든 것을 다시는 섬기지 아니하리라 <span class=\"verse-num\">14</span>내가 또 네 아세라 목상을 너희 가운데에서 빼버리고 네 성읍들을 멸할 것이며 <span class=\"verse-num\">15</span>내가 또 진노와 분노로 순종하지 아니한 나라에 갚으리라 하셨느니라", "exposition": "1절에서 이스라엘의 재판자가 막대기로 뺨을 맞는 장면은 하나님 백성의 가장 깊은 수치를 보여 줍니다. 왕이 뺨을 맞는다는 것은 나라 전체가 무력하게 짓밟히고 있다는 뜻입니다. 그런데 미가는 바로 이 절망의 한복판에서 베들레헴을 부릅니다. 유다 족속 중 가장 작고 보잘것없는 성읍, 그곳에서 이스라엘을 다스릴 자가 나올 것이라고 선언합니다.\n\n하나님은 예루살렘 왕궁이 아니라 작은 시골 마을을 택하셨습니다. 이것이 하나님의 방식입니다. 세상은 크고 강한 것을 통해 역사를 만들어 가지만, 하나님은 작고 낮은 곳에서 구원의 역사를 시작하십니다. 작은 베들레헴에서 영원한 왕이 나왔듯이, 우리의 연약함은 하나님의 능력이 나타나는 통로가 됩니다.", "question": "지금 내 삶에서 작고 보잘것없이 느껴지는 자리가 있습니까? 하나님이 이를 통해 어떻게 역사하시길 바랍니까?", "prayer": [{"ref": "2절", "verse": "베들레헴 에브라다야 너는 유다 족속 중에 작을지라도 이스라엘을 다스릴 자가 네게서 내게로 나올 것이라 그의 근본은 상고에, 영원에 있느니라", "body": "세상의 눈에 작고 보잘것없는 베들레헴을 택하여 영광의 왕을 보내신 주님의 은혜를 찬양하는 삶을 살게 하소서. 내 삶의 가장 작은 자리에 주님의 통치가 임하기를 원합니다. 낮은 자를 들어 쓰시는 주님의 손길을 매 순간 신뢰하게 하소서."}, {"ref": "5절", "verse": "이 사람은 평강이 될 것이라 앗수르 사람이 우리 땅에 들어와서 우리 궁들을 밟을 때에는 우리가 일곱 목자와 여덟 군왕을 일으켜 그를 치리니", "body": "왕 되신 주님, 환난과 고통 중에도 오직 주님만을 바라볼 수 있는 믿음을 허락하소서. 세상이 주는 두려움에 압도되지 않게 하시고, 언제나 나와 함께하시고 지키시는 주님의 보호하심 아래 거하게 하소서."}]}, "2026-07-23": {"book": "미가", "chapter": "6장", "range": "미가 6장 1~16절", "subtitle": "하나님이 구하시는 한 가지", "theme": "정의·인자·겸손한 동행", "hymn": {"no": "찬송 430장 · 주와 같이 길 가는 것", "title": "주를 향한 나의 사랑을"}, "maek": "하나님은 이스라엘 백성을 애굽에서 건져 내고 발람의 저주를 축복으로 바꾸었던 은혜를 상기시키시며, 무엇이 부족해서 떠났느냐고 물으십니다. 천천의 숫양이나 맏아들도 하나님을 기쁘시게 할 수 없습니다. 하나님이 구하시는 것은 오직 공의를 행하고 인자를 사랑하며 겸손히 동행하는 삶입니다. 그러나 백성 가운데 불의와 거짓이 가득한 까닭에 심판이 선언됩니다.", "amsung": {"ref": "미 6:8", "text": "사람아 주께서 선한 것이 무엇임을 네게 보이셨나니 여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐"}, "passage": "<span class=\"verse-num\">1</span>너희는 여호와의 말씀을 들을지어다 너는 일어나서 산을 향하여 변론하여 작은 산들이 네 목소리를 듣게 하라 하셨나니 <span class=\"verse-num\">2</span>너희 산들과 땅의 견고한 지대들아 너희는 여호와의 변론을 들으라 여호와께서 자기 백성과 변론하시며 이스라엘과 변론하실 것이라 <span class=\"verse-num\">3</span>이르시기를 내 백성아 내가 무엇을 네게 행하였으며 무슨 일로 너를 괴롭게 하였느냐 너는 내게 증언하라 <span class=\"verse-num\">4</span>내가 너를 애굽 땅에서 인도해 내어 종 노릇 하는 집에서 속량하였고 모세와 아론과 미리암을 네 앞에 보냈느니라 <span class=\"verse-num\">5</span>내 백성아 너는 모압 왕 발락이 꾀한 것과 브올의 아들 발람이 그에게 대답한 것을 기억하며 싯딤에서부터 길갈까지의 일을 기억하라 그리하면 나 여호와가 공의롭게 행한 일을 알리라 하실 것이니라\n\n<span class=\"verse-num\">6</span>내가 무엇을 가지고 여호와 앞에 나아가며 높으신 하나님께 경배할까 내가 번제물로 일 년 된 송아지를 가지고 그 앞에 나아갈까 <span class=\"verse-num\">7</span>여호와께서 천천의 숫양이나 만만의 강물 같은 기름을 기뻐하실까 내 허물을 위하여 내 맏아들을, 내 영혼의 죄로 말미암아 내 몸의 열매를 드릴까 <span class=\"verse-num\">8</span>사람아 주께서 선한 것이 무엇임을 네게 보이셨나니 여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐 <span class=\"verse-num\">9</span>여호와께서 성읍을 향하여 외쳐 부르시나니 지혜는 주의 이름을 경외함이니라 너희는 매가 예비되었나니 그것을 정하신 이가 누구인지 들을지니라 <span class=\"verse-num\">10</span>악인의 집에 아직도 불의한 재물이 있느냐 축소시킨 가증한 에바가 있느냐 <span class=\"verse-num\">11</span>내가 만일 부정한 저울을 썼거나 주머니에 거짓 저울추를 두었으면 깨끗하겠느냐 <span class=\"verse-num\">12</span>그 부자들은 강포가 가득하였고 그 주민들은 거짓을 말하니 그 혀가 입에서 거짓되도다 <span class=\"verse-num\">13</span>그러므로 나도 너를 쳐서 병들게 하였으며 네 죄로 말미암아 너를 황폐하게 하였나니 <span class=\"verse-num\">14</span>네가 먹어도 배부르지 못하고 항상 속이 빌 것이며 네가 감추어도 보존되지 못하겠고 보존된 것은 내가 칼에 붙일 것이며 <span class=\"verse-num\">15</span>네가 씨를 뿌려도 추수하지 못할 것이며 감람 열매를 밟아도 기름을 네 몸에 바르지 못할 것이며 포도를 밟아도 술을 마시지 못하리라 <span class=\"verse-num\">16</span>너희가 오므리의 율례와 아합 집의 모든 예법을 지키고 그들의 전통을 따르니 내가 너희를 황폐하게 하며 그의 주민을 사람의 조소거리로 만들리라 너희가 내 백성의 수욕을 담당하리라", "exposition": "6장은 법정의 한 장면처럼 시작합니다. 하나님이 원고가 되시고, 이스라엘이 피고석에 서며, 산들과 땅의 견고한 지대가 배심원으로 초청됩니다. 하나님의 첫마디는 놀랍게도 고발이 아니라 호소입니다. “내 백성아 내가 무엇을 네게 행하였으며 무슨 일로 너를 괴롭게 하였느냐”(3절). 이 한마디에는 하나님의 마음이 얼마나 깊이 상했는지가 고스란히 담겨 있습니다.\n\n하나님의 질문에 이스라엘은 더 많은 제물을 드리겠다고 말합니다. 그러나 하나님이 원하시는 것은 천천의 숫양도, 맏아들의 희생도 아닙니다. “여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐”(8절). 하나님이 원하시는 것은 화려한 종교적 행위가 아니라, 일상 속에서 매일 한 걸음씩 함께 나아가는 동행입니다.", "question": "내 삶의 초점을 어디에 맞추고 있습니까? 일상에서 겸손히 주님과 동행하기 위해 삶의 우선순위를 점검해야 할 부분이 있다면 무엇입니까?", "prayer": [{"ref": "3절", "verse": "이르시기를 내 백성아 내가 무엇을 네게 행하였으며 무슨 일로 너를 괴롭게 하였느냐 너는 내게 증언하라", "body": "반복적으로 넘어지는 죄의 문제를 가볍게 여기지 않게 하소서. 회개의 영을 부어 주시고, 형식적인 신앙을 넘어 일상에서 공의와 인자를 실천하게 하소서."}, {"ref": "8절", "verse": "사람아 주께서 선한 것이 무엇임을 네게 보이셨나니 여호와께서 네게 구하시는 것은 오직 정의를 행하며 인자를 사랑하며 겸손하게 네 하나님과 함께 행하는 것이 아니냐", "body": "한국 교회에 부흥을 허락하소서. 목회자들이 강단에서 전하는 말씀 그대로 살아내며, 말씀의 증인으로 살게 하소서. 각 교회에 다음 세대를 말씀과 기도로 양육하고 무장시킬 지혜를 부어 주소서."}]}, "2026-07-24": {"book": "미가", "chapter": "7장", "range": "미가 7장 1~20절", "subtitle": "엎드러져도 다시 일어나는 믿음", "theme": "다시 일어나는 믿음", "hymn": {"no": "찬송 279장 · 인애하신 구세주여", "title": "주님 내가 주의 장막을(소원)"}, "maek": "본문은 사회의 도덕적 타락이 극에 달해 가장 가까운 가족조차 믿을 수 없는 비참한 현실을 고발하며 시작됩니다. 그러나 미가는 이 절망의 상황에서도 눈을 들어 오직 구원의 하나님을 바라보겠다고 선포합니다. 하나님은 백성의 죄를 징계하시지만, 결국 그 죄를 깊은 바다에 던지시고 조상들에게 약속하신 인애를 베푸십니다.", "amsung": {"ref": "미 7:18", "text": "주와 같은 신이 어디 있으리이까 주께서는 죄악과 그 기업에 남은 자의 허물을 사유하시며 인애를 기뻐하시므로 진노를 오래 품지 아니하시나이다"}, "passage": "<span class=\"verse-num\">1</span>재앙이로다 나여 나는 여름 과일을 딴 후와 포도를 거둔 후 같아서 먹을 포도송이가 없으며 내 마음에 사모하는 처음 익은 무화과가 없도다 <span class=\"verse-num\">2</span>경건한 자가 세상에서 끊어졌고 정직한 자가 사람들 가운데 없도다 무리가 다 피를 흘리려고 매복하며 각기 그물로 형제를 잡으려 하고 <span class=\"verse-num\">3</span>두 손으로 악을 부지런히 행하는도다 그 지도자와 재판관은 뇌물을 구하며 권세자는 자기 마음의 욕심을 말하며 그들이 서로 결합하니 <span class=\"verse-num\">4</span>그들의 가장 선한 자라도 가시 같고 가장 정직한 자라도 찔레 울타리보다 더하도다 그들의 파수꾼들의 날 곧 그들 가운데에 형벌의 날이 임하였으니 이제는 그들이 요란하리로다 <span class=\"verse-num\">5</span>너희는 이웃을 믿지 말며 친구를 의지하지 말며 네 품에 누운 여인에게라도 네 입의 문을 지킬지어다 <span class=\"verse-num\">6</span>아들이 아버지를 멸시하며 딸이 어머니를 대적하며 며느리가 시어머니를 대적하리니 사람의 원수가 곧 자기의 집안 사람이리로다\n\n<span class=\"verse-num\">7</span>오직 나는 여호와를 우러러보며 나를 구원하시는 하나님을 바라보나니 나의 하나님이 나에게 귀를 기울이시리로다 <span class=\"verse-num\">8</span>나의 대적이여 나로 말미암아 기뻐하지 말지어다 나는 엎드러질지라도 일어날 것이요 어두운 데에 앉을지라도 여호와께서 나의 빛이 되실 것임이로다 <span class=\"verse-num\">9</span>내가 여호와께 범죄하였으니 그의 진노를 당하려니와 마침내 주께서 나를 위하여 논쟁하시고 심판하시며 주께서 나를 인도하사 광명에 이르게 하시리니 내가 그의 공의를 보리로다 <span class=\"verse-num\">10</span>나의 대적이 이것을 보고 부끄러워하리니 그는 전에 내게 말하기를 네 하나님 여호와가 어디 있느냐 하던 자라 그가 거리의 진흙 같이 밟히리니 그것을 내가 보리로다 <span class=\"verse-num\">11</span>네 성벽을 건축하는 날 곧 그 날에는 지경이 넓혀질 것이라 <span class=\"verse-num\">12</span>그 날에는 앗수르에서 애굽 성읍들에까지, 애굽에서 강까지, 이 바다에서 저 바다까지, 이 산에서 저 산까지의 사람들이 네게로 돌아올 것이나 <span class=\"verse-num\">13</span>그 땅은 그 주민의 행위의 열매로 말미암아 황폐하리로다\n\n<span class=\"verse-num\">14</span>원하건대 주는 주의 지팡이로 주의 백성 곧 갈멜 속 삼림에 홀로 거주하는 주의 기업의 양 떼를 먹이시되 그들을 옛날 같이 바산과 길르앗에서 먹이시옵소서 <span class=\"verse-num\">15</span>이르시되 네가 애굽 땅에서 나오던 날과 같이 내가 그들에게 이적을 보이리라 하셨느니라 <span class=\"verse-num\">16</span>이르되 여러 나라가 보고 자기의 세력을 부끄러워하여 손으로 그 입을 막을 것이요 귀는 막힐 것이며 <span class=\"verse-num\">17</span>그들이 뱀처럼 티끌을 핥으며 땅에 기는 벌레처럼 떨며 그 좁은 구멍에서 나와서 두려워하며 우리 하나님 여호와께로 돌아와서 주로 말미암아 두려워하리이다 <span class=\"verse-num\">18</span>주와 같은 신이 어디 있으리이까 주께서는 죄악과 그 기업에 남은 자의 허물을 사유하시며 인애를 기뻐하시므로 진노를 오래 품지 아니하시나이다 <span class=\"verse-num\">19</span>다시 우리를 불쌍히 여기셔서 우리의 죄악을 발로 밟으시고 우리의 모든 죄를 깊은 바다에 던지시리이다 <span class=\"verse-num\">20</span>주께서 옛적에 우리 조상들에게 맹세하신 대로 야곱에게 성실을 베푸시며 아브라함에게 인애를 더하시리이다", "exposition": "당시 유다는 수확 후 남은 과일이 하나도 없는 나무처럼 정직한 사람을 단 한 명도 찾기 어려운 영적 기근 상태였습니다. 선한 사람도 가시 같고, 정직한 자는 찔레 울타리처럼 타인에게 상처를 주는 시대였습니다. 부부와 부모 자식 간의 신뢰마저 무너진 ‘무서운 타락’의 시대였습니다.\n\n하지만 미가는 이 암울한 현실에 매몰되지 않고 “오직 나는 여호와를 우러러보며”(7절)라고 선포합니다. 하나님은 어둠 속에 앉은 자에게 빛이 되시며, 징계의 시간을 통과하는 백성을 인도해 광명에 이르게 하실 것입니다. 미가는 마지막으로 진노를 오래 품지 않으시는 하나님을 찬양합니다(18절). 이는 아브라함과 야곱에게 약속하신 언약을 끝까지 지키시는 하나님의 인애가 거둔 승리입니다.", "question": "어두운 현실 속에서 나는 무엇을 붙들며 소망합니까? 나의 빛이 되신 하나님께 시선을 고정하며, 하나님의 때를 온전히 신뢰하고 있습니까?", "prayer": [{"ref": "7절", "verse": "오직 나는 여호와를 우러러보며 나를 구원하시는 하나님을 바라보나니 나의 하나님이 나에게 귀를 기울이시리로다", "body": "눈을 들어 구원의 주님만 바라보게 하소서. 인생의 어두운 골짜기를 지날지라도 주님이 친히 나의 빛 되심을 믿으며 인내하게 하소서. 세상의 소리에 휘둘리지 않고, 주님의 신실하심만 신뢰하며 살게 하소서."}, {"ref": "18~19절", "verse": "주와 같은 신이 어디 있으리이까 주께서는 죄악과 그 기업에 남은 자의 허물을 사유하시며 인애를 기뻐하시므로 진노를 오래 품지 아니하시나이다 다시 우리를 불쌍히 여기셔서 우리의 죄악을 발로 밟으시고 우리의 모든 죄를 깊은 바다에 던지시리이다", "body": "반복적으로 넘어지는 죄의 습성을 주님의 보혈로 덮으시고, 모든 수치와 과거의 죄들을 깊은 바다에 던져 주소서. 주님이 기뻐하시는 인애를 이웃에게 기쁨으로 나누는 복된 삶을 살도록 인도해 주소서."}]}, "2026-07-25": {"book verse-num\">5</span>그가 그의 존귀한 자들을 생각해 내니 그들이 엎드러질 듯이 달려서 급히 성에 이르러 막을 것을 준비하도다 <span class=\"verse-num\">6</span>강들의 수문이 열리고 왕궁이 소멸되며 <span class=\"verse-num\">7</span>정한 대로 왕후가 벌거벗은 몸으로 끌려가니 그 모든 시녀들이 가슴을 치며 비둘기 같이 슬피 우는도다 <span class=\"verse-num\">8</span>니느웨는 예로부터 물이 모인 못 같더니 이제 모두 도망하니 서라 서라 하나 돌아보는 자가 없도다 <span class=\"verse-num\">9</span>은을 노략하라 금을 노략하라 그 저축한 것이 무한하고 아름다운 기구가 풍부함이니라 <span class=\"verse-num\">10</span>니느웨가 공허하였고 황폐하였도다 주민이 낙담하여 그 무릎이 서로 부딪히며 모든 허리가 아프게 되며 모든 낯이 빛을 잃도다 <span class=\"verse-num\">11</span>이제 사자의 굴이 어디냐 젊은 사자가 먹을 곳이 어디냐 전에는 수사자 암사자가 그 새끼 사자와 함께 거기서 다니되 그것들을 두렵게 할 자가 없었으며 <span class=\"verse-num\">12</span>수사자가 그 새끼를 위하여 먹이를 충분히 찢고 그의 암사자들을 위하여 움켜 사냥한 것으로 그 굴을 채웠고 찢은 것으로 그 구멍을 채웠었도다 <span class=\"verse-num\">13</span>만군의 여호와의 말씀에 내가 네 대적이 되어 네 병거들을 불살라 연기가 되게 하고 네 젊은 사자들을 칼로 멸할 것이며 내가 또 네 노략한 것을 땅에서 끊으리니 네 파견자의 목소리가 다시는 들리지 아니하리라 하셨느니라", "exposition": "니느웨 함락 모습이 마치 눈앞에 펼쳐지듯 생생하게 묘사됩니다. 방패는 붉고, 병거는 거리를 달리며, 성문은 열리고, 왕궁은 무너집니다. 그런데 이 모든 전쟁의 소용돌이 한가운데서 하나님이 “내가 야곱의 영광을 회복하리라”라고 말씀하십니다(2절). 심판의 장면 한복판에 회복의 선언이 놓여 있는 것입니다.\n\n니느웨의 멸망은 단순한 역사 속 우연이 아닙니다. 자기 백성을 위한 하나님의 언약적 개입입니다. 우리 삶에도 이 원리는 동일하게 적용됩니다. 때로는 상황이 통제 불능처럼 느껴지고, 사방에서 무언가 무너지는 소리가 들릴 때가 있습니다. 그러나 그 혼돈의 한가운데서도 하나님은 자녀를 향한 회복의 계획을 멈추지 않으십니다. 오늘 내 삶에서 무너지고 있는 것이 있습니까? 그 자리에서 하나님의 회복 선언을 붙드십시오.", "question": "지금 내 삶에서 무너지는 듯 느껴지는 것이 있습니까? 무너짐 가운데서 내가 선포할 하나님의 회복 선언은 무엇입니까?", "prayer": [{"ref": "2절", "verse": "여호와께서 야곱의 영광을 회복하시되 이스라엘의 영광 같게 하시나니 이는 약탈자들이 약탈하였고 또 그들의 포도나무 가지를 없이 하였음이라", "body": "삶의 무너진 자리를 회복시키시는 주님, 전쟁과 자연재해로 고통당하는 이들을 불쌍히 여겨 주소서. 실제적인 도움의 손길이 일어나게 하시고, 고통당하는 이들에게 하나님의 돌보심과 회복이 임하게 하소서."}, {"ref": "6절", "verse": "강들의 수문이 열리고 왕궁이 소멸되며", "body": "인간의 힘으로 세운 화려하고 견고한 성읍들도 주님의 손길 한 번에 무너질 수 있음을 고백합니다. 하나님보다 더 의지하는 세상의 능력과 힘이 영원할 것이라 착각하지 않게 하소서. 모든 주권이 하나님께 있음을 고백하게 하소서."}]}, "2026-07-28": {"book": "나훔", "chapter": "3장", "range": "나훔 3장 1~19절", "subtitle": "무너지는 성벽: 영원한 요새는 세상에 없다", "theme": "무너지는 요새", "hymn": {"no": "찬송 585장 · 내 주는 강한 성이요", "title": "시작됐네 우리 주님의 능력이(은혜로다)"}, "maek": "3장은 니느웨가 멸망할 수밖에 없는 이유, 곧 그들의 구체적인 죄악(강포, 거짓, 음행, 마술)을 고발합니다. 하나님은 과거 난공불락이라 믿었던 애굽의 ‘노아몬’(테베)이 허무하게 무너졌던 역사를 상기시키며, 니느웨 역시 같은 운명을 맞이할 것임을 선포합니다. 그들의 멸망 소식에 온 세상이 기뻐할 것입니다.", "amsung": {"ref": "나 3:19", "text": "네 상처는 고칠 수 없고 네 부상은 중하도다 네 소식을 듣는 자가 다 너를 보고 손뼉을 치나니 이는 그들이 항상 네게 행패를 당하였음이 아니더냐 하시니라"}, "passage": "<span class=\"verse-num\">1</span>화 있을진저 피의 성이여 그 안에는 거짓이 가득하고 포악이 가득하며 탈취가 떠나지 아니하는도다 <span class=\"verse-num\">2</span>휙휙 하는 채찍 소리, 윙윙 하는 병거 바퀴 소리, 뛰는 말, 달리는 병거, <span class=\"verse-num\">3</span>충돌하는 기병, 번쩍이는 칼, 번개 같은 창, 죽임 당한 자의 떼, 주검의 큰 무더기, 무수한 시체여 사람이 그 시체에 걸려 넘어지니 <span class=\"verse-num\">4</span>이는 마술에 능숙한 미모의 음녀가 많은 음행을 함이라 그가 그의 음행으로 여러 나라를 미혹하고 그의 마술로 여러 족속을 미혹하느니라 <span class=\"verse-num\">5</span>보라 내가 네게 말하노니 만군의 여호와의 말씀에 네 치마를 걷어 올려 네 얼굴에 이르게 하고 네 벌거벗은 것을 나라들에게 보이며 네 부끄러운 곳을 뭇 민족에게 보일 것이요 <span class=\"verse-num\">6</span>내가 또 가증하고 더러운 것들을 네 위에 던져 능욕하여 너를 구경거리가 되게 하리니 <span class=\"verse-num\">7</span>그 때에 너를 보는 자가 다 네게서 도망하며 이르기를 니느웨가 황폐하였도다 누가 그것을 위하여 애곡하며 내가 어디서 너를 위로할 자를 구하리요 하리라 <span class=\"verse-num\">8</span>네가 어찌 노아몬보다 낫겠느냐 그는 강들 사이에 있으므로 물이 둘렸으니 바다가 성루가 되었고 바다가 방어벽이 되었으며 <span class=\"verse-num\">9</span>구스와 애굽은 그의 힘이 강하여 끝이 없었고 붓과 루빔이 그를 돕는 자가 되었으나 <span class=\"verse-num\">10</span>그가 포로가 되어 사로잡혀 갔고 그의 어린 아이들은 길 모퉁이 모퉁이에 메어침을 당하여 부서졌으며 그의 존귀한 자들은 제비 뽑혀 나뉘었고 그의 모든 권세자들은 사슬에 결박되었나니 <span class=\"verse-num\">11</span>너도 술에 취하여 숨으리라 너도 원수들 때문에 피난처를 찾으리라 <span class=\"verse-num\">12</span>네 모든 산성은 무화과나무의 처음 익은 열매가 흔들기만 하면 먹는 자의 입에 떨어짐과 같으리라 <span class=\"verse-num\">13</span>네 가운데 장정들은 여인 같고 네 땅의 성문들은 네 원수 앞에 넓게 열리고 빗장들은 불에 타도다 <span class=\"verse-num\">14</span>너는 물을 길어 에워싸일 것을 대비하며 너의 산성들을 견고하게 하며 진흙에 들어가서 흙을 밟아 벽돌 가마를 수리하라 <span class=\"verse-num\">15</span>거기서 불이 너를 삼키며 칼이 너를 베기를 느치가 먹는 것 같이 하리라 네가 느치 같이 스스로 많게 할지어다 네가 메뚜기 같이 스스로 많게 할지어다 <span class=\"verse-num\">16</span>네가 네 상인을 하늘의 별보다 많게 하였으나 느치가 날개를 펴서 날아감과 같고 <span class=\"verse-num\">17</span>네 방백은 메뚜기 같고 너의 장수들은 큰 메뚜기 떼가 추운 날에는 울타리에 깃들였다가 해가 뜨면 날아감과 같으니 그 있는 곳을 알 수 없도다 <span class=\"verse-num\">18</span>앗수르 왕이여 네 목자가 자고 네 귀족은 누워 쉬며 네 백성은 산들에 흩어지나 그들을 모을 사람이 없도다 <span class=\"verse-num\">19</span>네 상처는 고칠 수 없고 네 부상은 중하도다 네 소식을 듣는 자가 다 너를 보고 손뼉을 치나니 이는 그들이 항상 네게 행패를 당하였음이 아니더냐 하시니라", "exposition": "‘피의 성’ 니느웨를 향한 하나님의 준엄한 심판이 선포됩니다. 니느웨는 막강한 군사력과 견고한 성벽, 수많은 동맹국을 자랑하며 스스로 난공불락이라 여겼습니다. 그러나 하나님은 선지자를 통해 냉정하게 물으십니다. “네가 어찌 노아몬보다 낫겠느냐”(8절). 나일강이 성루가 되고, 구스와 애굽이 동맹을 맺었던 강대한 노아몬도 포로가 되어 끌려갔습니다. 니느웨 역시 다르지 않습니다.\n\n결국 니느웨는 ‘고칠 수 없는 상처’(19절)로 끝을 맞이할 것입니다. 이 심판 선언은 니느웨의 멸망에 대한 예언이자, 오랫동안 니느웨의 압제 아래 신음하던 자들에게는 ‘고칠 수 없는 고통’이 마침내 끝났다는 해방의 선포입니다. 하나님의 공의로운 심판은 강자의 위협을 끝내는 것인 동시에 약한 자를 향한 영원한 위로입니다.", "question": "지금 내가 하나님보다 더 의지하고 있는 나만의 성벽은 무엇인지 돌아봅시다.", "prayer": [{"ref": "4절", "verse": "이는 마술에 능숙한 미모의 음녀가 많은 음행을 함이라 그가 그의 음행으로 여러 나라를 미혹하고 그의 마술로 여러 족속을 미혹하느니라", "body": "눈앞의 유혹을 보면서 치열한 영적 전쟁이 계속되고 있음을 자각하게 하소서. 늘 영적으로 깨어서, 승리하신 주님의 십자가를 붙들고 승리하게 하소서."}, {"ref": "8절", "verse": "네가 어찌 노아몬보다 낫겠느냐 그는 강들 사이에 있으므로 물이 둘렸으니 바다가 성루가 되었고 바다가 방어벽이 되었으며", "body": "난공불락이라 믿었던 애굽의 노아몬도 무너졌습니다. 다음 세대가 세상이 말하는 견고한 성벽인 물질과 권력, 세상적 배경을 인생의 방어벽으로 삼지 않게 하소서. 부모 세대가 삶의 모든 현장에서 주님과 동행하는 삶을 살게 하소서."}]}, "2026-07-29": {"book": "하박국", "chapter": "1장", "range": "하박국 1장 1~17절", "subtitle": "하나님, 어째서 침묵하십니까?", "theme": "침묵 속에 일하시는 하나님", "hymn": {"no": "찬송 545장 · 이 눈에 아무 증거 아니 뵈어도", "title": "하나님은 우리의 피난처가 되시며"}, "maek": "하박국 선지자는 유다 내부의 도덕적 타락과 불의를 보며 하나님께 ‘어느 때까지 방관하실 것이냐’고 탄식합니다. 이에 하나님은 갈대아(바벨론) 사람들을 일으켜 유다를 심판하겠다고 대답하십니다. 선지자는 더 큰 악인인 바벨론을 통해 유다를 치시는 하나님의 방법이 공의로운지 다시금 질문하며, 거룩하신 하나님의 침묵 앞에 고통스러운 변론을 이어 갑니다.", "amsung": {"ref": "합 1:2", "text": "여호와여 내가 부르짖어도 주께서 듣지 아니하시니 어느 때까지리이까 내가 강포로 말미암아 외쳐도 주께서 구원하지 아니하시나이다"}, "passage": "<span class=\"verse-num\">1</span>선지자 하박국이 묵시로 받은 경고라\n\n<span class=\"verse-num\">2</span>여호와여 내가 부르짖어도 주께서 듣지 아니하시니 어느 때까지리이까 내가 강포로 말미암아 외쳐도 주께서 구원하지 아니하시나이다 <span class=\"verse-num\">3</span>어찌하여 내게 죄악을 보게 하시며 패역을 눈으로 보게 하시나이까 겁탈과 강포가 내 앞에 있고 변론과 분쟁이 일어났나이다 <span class=\"verse-num\">4</span>이러므로 율법이 해이하고 정의가 전혀 시행되지 못하오니 이는 악인이 의인을 에워쌌으므로 정의가 굽게 행하여짐이니이다\n\n<span class=\"verse-num\">5</span>여호와께서 이르시되 너희는 여러 나라를 보고 또 보고 놀라고 또 놀랄지어다 너희의 생전에 내가 한 가지 일을 행할 것이라 누가 너희에게 말할지라도 너희가 믿지 아니하리라 <span class=\"verse-num\">6</span>보라 내가 사납고 성급한 백성 곧 땅이 넓은 곳으로 다니며 자기의 소유가 아닌 거처들을 점령하는 갈대아 사람을 일으켰나니 <span class=\"verse-num\">7</span>그들은 두렵고 무서우며 당당함과 위엄이 자기들에게서 나오며 <span class=\"verse-num\">8</span>그들의 군마는 표범보다 빠르고 저녁 이리보다 사나우며 그들의 마병은 먼 곳에서부터 빨리 달려오는 마병이라 마치 먹이를 움키려 하는 독수리의 날음과 같으니라 <span class=\"verse-num\">9</span>그들은 다 강포를 행하러 오는데 앞을 향하여 나아가며 사람을 사로잡아 모으기를 모래 같이 많이 할 것이요 <span class=\"verse-num\">10</span>왕들을 멸시하며 방백을 조소하며 모든 견고한 성들을 비웃고 흉벽을 쌓아 그것을 점령할 것이라 <span class=\"verse-num\">11</span>그들은 자기들의 힘을 자기들의 신으로 삼는 자들이라 이에 바람 같이 급히 몰아 지나치게 행하여 범죄하리라\n\n<span class=\"verse-num\">12</span>선지자가 이르되 여호와 나의 하나님, 나의 거룩한 이시여 주께서는 만세 전부터 계시지 아니하시니이까 우리가 사망에 이르지 아니하리이다 여호와여 주께서 심판하기 위하여 그들을 두셨나이다 반석이시여 주께서 경계하기 위하여 그들을 세우셨나이다 <span class=\"verse-num\">13</span>주께서는 눈이 정결하시므로 악을 차마 보지 못하시며 패역을 차마 보지 못하시거늘 어찌하여 거짓된 자들을 방관하시며 악인이 자기보다 의로운 사람을 삼키는데도 잠잠하시나이까 <span class=\"verse-num\">14</span>주께서 어찌하여 사람을 바다의 고기 같게 하시며 다스리는 자 없는 벌레 같게 하시나이까 <span class=\"verse-num\">15</span>그가 낚시로 모두 낚으며 그물로 잡으며 투망으로 모으고 그리고는 기뻐하고 즐거워하여 <span class=\"verse-num\">16</span>그물에 제사하며 투망 앞에 분향하오니 이는 그것을 힘입어 소득이 풍부하고 먹을 것이 풍성하게 됨이니이다 <span class=\"verse-num\">17</span>그가 그물을 떨고는 계속하여 여러 나라를 무자비하게 멸망시키는 것이 옳으니이까", "exposition": "하박국은 매우 솔직한 선지자 중 한 명입니다. 그는 “어찌하여 내가 부르짖어도 주께서 듣지 아니하시나이까”라고 탄식합니다(2절). 믿음 좋은 사람이라면 이런 말을 해서는 안 된다고 생각할 수 있습니다. 그러나 하나님은 이 탄식을 외면하지 않으십니다. 오히려 하박국서 전체가 이 질문에서 시작됩니다.\n\n하나님은 침묵하신 것이 아니라, 하박국이 이해하지 못하는 방식으로 이미 일하고 계셨습니다. “너희의 생전에 내가 한 가지 일을 행할 것이라 누가 너희에게 말할지라도 너희가 믿지 아니하리라”(5절). 하나님의 역사는 우리의 이해 범주를 초월합니다. 고통 가운데서 하나님이 침묵하신다고 느낄 때, 사실 그분은 우리가 상상하지 못한 방식으로 역사하고 계십니다.", "question": "하나님이 침묵하시는 것처럼 느껴질 때도 솔직한 마음으로 하나님께 나아가고 있습니까? 아니면 멀어지고 있습니까?", "prayer": [{"ref": "2절", "verse": "여호와여 내가 부르짖어도 주께서 듣지 아니하시니 어느 때까지리이까 내가 강포로 말미암아 외쳐도 주께서 구원하지 아니하시나이다", "body": "만왕의 왕이신 주님만 신뢰하게 하소서. 주님이 침묵하시는 것 같아 답답하고 외로울 때 민족들이 불탈 것으로 수고하는 것과 나라들이 헛된 일로 피곤하게 되는 것이 만군의 여호와께로 말미암음이 아니냐 <span class=\"verse-num\">14</span>이는 물이 바다를 덮음 같이 여호와의 영광을 인정하는 것이 세상에 가득함이니라 <span class=\"verse-num\">15</span>이웃에게 술을 마시게 하되 자기의 분노를 더하여 그에게 취하게 하고 그 하체를 드러내려 하는 자에게 화 있을진저 <span class=\"verse-num\">16</span>네게 영광이 아니요 수치가 가득한즉 너도 마시고 너의 할례 받지 아니한 것을 드러내라 여호와의 오른손의 잔이 네게로 돌아올 것이라 더러운 욕이 네 영광을 가리리라 <span class=\"verse-num\">17</span>이는 네가 레바논에 강포를 행한 것과 짐승을 죽인 것 곧 사람의 피를 흘리며 땅과 성읍과 그 안의 모든 주민에게 강포를 행한 것이 네게로 돌아오리라 <span class=\"verse-num\">18</span>새긴 우상은 그 새겨 만든 자에게 무엇이 유익하겠느냐 부어 만든 우상은 거짓 스승이라 만든 자가 이 말하지 못하는 우상을 의지하니 무엇이 유익하겠느냐 <span class=\"verse-num\">19</span>나무에게 깨라 하며 말하지 못하는 돌에게 일어나라 하는 자에게 화 있을진저 그것이 교훈을 베풀겠느냐 보라 이는 금과 은으로 입힌 것인즉 그 속에는 생기가 도무지 없느니라 <span class=\"verse-num\">20</span>오직 여호와는 그 성전에 계시니 온 땅은 그 앞에서 잠잠할지니라 하시니라", "exposition": "하박국은 탄식을 쏟아 낸 후 망대 위에 올라가 하나님의 응답을 기다립니다. 이 장면이 놀라운 이유는 그가 포기하거나 하나님을 떠난 것이 아니라, 더 높은 곳에 올라가 더 간절히 하나님께 귀를 기울였기 때문입니다. 그때 하나님이 응답하십니다. “이 묵시를 기록하여 판에 명백히 새기되 달려가면서도 읽을 수 있게 하라”(2절).\n\n하나님의 말씀은 반드시 때가 있습니다. 따라서 더딜지라도 기다려야 합니다. 그리고 믿음으로 선포해야 합니다. “의인은 그의 믿음으로 말미암아 살리라”(4절). 믿음으로 산다는 것은 모든 것이 해결된 후에 믿음으로 사는 것이 아닙니다. 아직 아무것도 보이지 않는 상황에서 하나님의 말씀만 붙들고 살아가는 것입니다.", "question": "오늘 하루, 내 계획보다 정확한 하나님의 ‘때’를 신뢰하며 믿음으로 붙들 일은 무엇입니까?", "prayer": [{"ref": "3절", "verse": "이 묵시는 정한 때가 있나니 그 종말이 속히 이르겠고 결코 거짓되지 아니하리라 비록 더딜지라도 기다리라 지체되지 않고 반드시 응하리라", "body": "주님의 응답이 비록 더디게 느껴지더라도 약속의 말씀을 붙들고 인내하게 하소서. 주님의 인도하심을 끝까지 신뢰하며 나아가게 하소서."}, {"ref": "4절", "verse": "보라 그의 마음은 교만하며 그 속에서 정직하지 못하나 의인은 그의 믿음으로 말미암아 살리라", "body": "흔들리는 세상 속에서 모든 주권이 하나님께 있음을 기억하며 하나님의 통치 아래 살아가도록 믿음을 허락하소서. 상황에 따라 일희일비하지 않고 끝까지 주님의 선하심을 붙드는 의인의 삶을 살게 하소서."}]}, "2026-07-31": {"book": "하박국", "chapter": "3장", "range": "하박국 3장 1~19절", "subtitle": "구원의 하나님으로 기뻐하리라!", "theme": "구원의 하나님으로 기뻐하라", "hymn": {"no": "찬송 429장 · 세상 모든 풍파 너를 흔들어", "title": "주 여호와는 광대하시도다"}, "maek": "3장은 선지자의 간절한 기도로 시작해 기쁨의 노래로 끝을 맺습니다. 과거 이스라엘 역사 속에서 하나님의 위대한 구원 사건(출애굽과 시내산 현현)을 회상하며, 그 권능을 다시 나타내시길 간구합니다. 눈앞의 현실은 여전히 황폐하고 바벨론의 침공이 임박 function ensureSubmissionSeed(){
  const all=_read(STORAGE_KEYS.columnsCustom,null);
  if(all===null){ _write(STORAGE_KEYS.columnsCustom, JSON.parse(JSON.stringify(COLUMN_SUBMISSIONS_SEED))); }
}
function allColumns(){ return _read(STORAGE_KEYS.columnsCustom,{}); }
function listSubmissions(){
  const all=allColumns();
  return Object.keys(all).map(k=>all[k]).filter(c=>c&&!c._deleted&&(c.status==='review'||c.status==='rejected')).sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
}
function listPublished(){
  const custom=allColumns(); const merged=[];
  COLUMNS_SEED.forEach(c=>{ const o=custom[c.id]; if(o&&o._deleted)return; merged.push(o?Object.assign({},c,o):c); });
  Object.keys(custom).forEach(id=>{ const c=custom[id]; if(c&&!c._deleted&&parseInt(id,10)>1000&&c.status==='published') merged.push(c); });
  return merged.filter(c=>!c.draft&&c.status!=='review'&&c.status!=='rejected');
}
function approveColumn(id){ const all=allColumns(); if(all[id]){all[id].status='published';all[id].draft=false;delete all[id].rejectReason;all[id].date=new Date().toLocaleDateString('ko-KR');_write(STORAGE_KEYS.columnsCustom,all);} }
function rejectColumn(id,reason){ const all=allColumns(); if(all[id]){all[id].status='rejected';all[id].draft=true;all[id].rejectReason=reason||'';_write(STORAGE_KEYS.columnsCustom,all);} }
function deleteSubmission(id){ const all=allColumns(); if(all[id]){all[id]._deleted=true;_write(STORAGE_KEYS.columnsCustom,all);} }
function addColumn(data){ const all=allColumns(); let id=1001; while(all[id])id++; all[id]=Object.assign({id,likes:0,reads:0,comments:[],draft:false,status:'published',date:new Date().toLocaleDateString('ko-KR'),pastor:'담임목사',role:'담임목사',church:getChurchName()},data); _write(STORAGE_KEYS.columnsCustom,all); }

function rawPrayers(){ ensurePrayerSeed(); return _read(STORAGE_KEYS.prayers, PRAYERS_SEED)||[]; }
function listPrayers(){
  return rawPrayers().slice().sort((a,b)=>{ if(a.urgent&&!b.urgent)return -1; if(!a.urgent&&b.urgent)return 1; return (b.time||0)-(a.time||0); });
}
function hiddenPrayers(){ return _read(STORAGE_KEYS.prayersHidden,[]); }

function addPrayer({who,scope,body,urgent,committee,district,grove,cell}){
  const all=rawPrayers(); const newId=Math.max(0,...all.map(p=>p.id||0))+1;
  all.unshift({ id:newId, scope:urgent?'urgent':(scope||'church'), _origScope:scope||'church', who:who||'관리자', avatar:(who||'관').charAt(0), time:Date.now(), body:body||'', count:0, urgent:!!urgent, district:district||null, grove:grove||null, cell:cell||null, committee:committee||null });

}

function buildNav(){
  const el=document.getElementById('sideNav'); let h='';
  NAV.forEach(n=>{
    if(n.group){ h+=`<div class="side-group-label en">${n.group}</div>`; return; }
    const b=n.badge?n.badge():0;
    h+=`<div class="side-item" data-view="${n.id}" onclick="go('${n.id}')">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">${n.icon}</svg>
      <span>${n.name}</span>${b>0?`<span class="side-badge en">${b}</span>`:''}</div>`;
  });
  el.innerHTML=h;
}
const RENDERERS={};
let current='dashboard';
function go(id){
  current=id;
  document.querySelectorAll('.side-item').forEach(e=>e.classList.toggle('active',e.dataset.view===id));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  const n=NAV.find(x=>x.id===id);
  document.getElementById('pageTitle').innerHTML=`${n.name} <small class="en">${n.en}</small>`;
  if(RENDERERS[id]) RENDERERS[id]();
  buildNav(); document.querySelectorAll('.side-item').forEach(e=>e.classList.toggle('active',e.dataset.view===id));
}

  const f = input.files && input.files[0];
  if(!f) return;
  const rd = new FileReader();
  rd.onload = function(e){
    const img = new Image();
    img.onload = function(){
      /* 긴 변 1080px로 축소 + JPEG 압축 → localStorage 용량 보호 */
      const MAX = 1080;
      const scale = Math.min(1, MAX/Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.max(1, Math.round(img.width*scale));
      cv.height = Math.max(1, Math.round(img.height*scale));
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      let data;
      try{ data = cv.toDataURL('image/jpeg', 0.82); }catch(err){ data = e.target.result; }
      try{
        _write(STORAGE_KEYS.homePhoto, { img:data, name:f.name, updatedAt:Date.now() });
        toast('사진이 저장되었습니다 — 사용자 앱 홈에 즉시 반영됩니다');
      }catch(err){
        alert('사진 저장에 실패했습니다. 더 작은 사진으로 다시 시도해 주세요.');
      }
      RENDERERS.dashboard();
    };
    img.onerror = function(){ alert('이미지 파일을 읽을 수 없습니다.'); };
    img.src = e.target.result;
  };
  rd.readAsDataURL(f);
}

  urgent:{ title:"캐나다 ‘메가 산불’에 전역 비상..북미를 뒤덮은 주황빛 재앙", team:'관리자', date:'2026.07.19', body:"극심한 폭염 속 900여 건 동시다발 발생… 소실 면적 남한 4분의 1 넘어서\n독성 연기 남하로 토론토·뉴욕 등 북미 대도시 대기질 ‘최악’ 기록\n\n캐나다 전역이 기후변화가 초래한 역대급 대형 산불로 거대한 화염과 연기에 휩싸였다. 2026년 7월 중순 현재, 알버타와 브리티시컬럼비아(BC) 등 서부 지역부터 온타리오, 퀘벡 등 동부 지역에 이르기까지 캐나다 전역에서 약 900건의 산불이 동시다발적으로 타오르고 있다.\n\n올해 누적 소실 면적은 이미 250만 헥타르(ha)를 돌파했다. 이는 대한민국 전체 면적의 25%를 넘어서는 대규모다. 특히 온타리오주 북서부에서 발생한 ‘썬더베이 36’ 화재는 주변 불씨를 집어삼키며 단일 화재로만 35만 헥타르 이상을 태우는 등 통제 불능의 메가 산불로 돌변했다.\n\n문제는 화재 피해에 그치지 않는다. 강한 기류를 타고 남하한 거대한 산불 연기가 북미 대륙 전체의 일상을 마비시키고 있다. 지난 15일을 기점으로 캐나다 최대 도시 토론토의 하늘은 온통 주황색 독성 안개로 뒤덮였다. 토론토는 한때 ‘세계에서 대기질이 가장 나쁜 도시 1위’에 오르는 불명예를 안았으며, 공공 실외 행사와 체육시설이 전면 폐쇄됐다.\n\n이 재앙적인 연기는 국경을 넘어 미국 중서부와 북동부 20개 주까지 침투했다. 뉴욕, 시카고, 디트로이트 등 미 주요 대도시 주민들은 \"매캐한 플라스틱 탄 냄새가 진동한다\"며 고통을 호소했고, 미 당국은 수천만 명의 시민에게 대기질 경보를 발령했다. 병원 응급실에는 천식 등 호흡기 질환을 호소하는 환자들의 발길이 급증하고 있다.\n\n기후 전문가들은 이번 사태가 6월 말부터 이어진 이례적인 폭염과 장기 가뭄이 맞물린 결과라고 분석했다. 현장에서는 수천 명의 소방대원이 사투를 벌이고 있으나, 워낙 광범위한 지역에서 불길이 치솟아 진화에 난항을 겪고 있다. 기상청 관계자는 \"하늘에서 충분한 양의 비가 내리지 않는 한, 북미를 강타한 주황색 연기 공포는 당분간 지속될 것\"이라고 암울한 전망을 내놓았다.\n< 출처 : kbs뉴스, 연합뉴스>\n\n기도제목\n\n1. 주님. 캐나다 전역 번지고 있는 산불을 막아주소서. 900건의 산불을 사람의 힘으로 멈출 수 없습니다. 통제 불능의 메가 산불 뒤에 있는 강한 바람과 건조한 기후를 다스려 주시고, 오직 전능하신 주님의 손길로 불길을 막아 멈추어 주소서.\n\n2. 모든 불을 꺼뜨릴 비를 내려 주소서. 진화 인력의 손길이 닿지 못하는 깊은 오지와 산맥 구석구석까지 주님의 시원한 단비가 임하여, 타오르는 불길이 소멸하게 하소서.\n\n3. 캐나다 토론토부터 미국의 뉴욕, 시카고에 이르기까지 북미 전역을 뒤덮은 주황빛 독성 연기로 고통받는 수천만 명의 주민들을 살펴 주소서. 하루아침에 삶의 터전을 잃고 대피한 이재민들에게 속히 따뜻한 도움의 손길과 위로가 닿게 하소서.\n\n4. 산불을 진화하고 있는 소방관들의 안전을 지키시고 보호하여 주소서. 유독가스와 뜨거운 열기 속에서 목숨을 걸고 방어선을 구축하고 있는 모든 소방관과 자원봉사자들의 안전을 눈동자처럼 지켜 주소서.\n\n5. 이 거대한 자연의 위기 앞에서 인간의 교만을 내려놓고, 창조주 하나님만을 바라보며 두렵고 떨림으로 경외하게 하소서. 어려움을 지날 때 인간의 무력함을 깨닫고, 주님의 위대하심을 고백하게 하소서.\n\n6. 위기 앞에서 모든 나라가 연대하며 하나되게 하소서. 자국의 이기주의로 어려움에 있는 캐나다에 고통이 더하지 않게 하소서. 이웃을 사랑하며 도움의 손길을 더하는 위로의 시간이 되게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
