/* ── 목장방 상세 (피드) ─────────────────────────────────────── */
async function openRoom(id){
  state.currentRoom = id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view = document.getElementById('view-room-detail');
  view.classList.add('active');
  document.getElementById('viewContainer').scrollTop = 0;
  document.getElementById('writeFab').style.display = 'none';
  view.innerHTML = `<div style="margin:20px 16px"><div class="skeleton" style="height:160px;border-radius:22px"></div></div>`;
  await renderRoomDetail(id);
}

async function renderRoomDetail(id){
  const view = document.getElementById('view-room-detail');
  const [room, posts] = await Promise.all([api.getRoom(id), api.listRoomPosts(id)]);
  if(!room){ switchTab('pray'); return; }
  if(!state.user){ try{ state.user = await api.getUser(); }catch(e){} }
  const myName = (state.user && (state.user.nickname || state.user.name)) || '나';

  // 이번 주 묵상 나눔 현황 — 최근 7일 내 묵상 나눔 여부
  const weekAgo = Date.now() - 86400000*7;
  const sharedWho = {};
  posts.forEach(p=>{ if(p.kind==='lectio' && p.time>weekAgo) sharedWho[p.who]=true; });
  const memberRow = (room.members||[]).slice(0,6).map(m=>{
    const done = !!sharedWho[m];
    const label = (m===myName) ? '나' : m.split(' ')[0];
    return `<div class="rd-week-member ${done?'done':''}">
      <div class="av">${done?'✓':escapeHtml(m.charAt(0))}</div>
      <div class="nm">${escapeHtml(label)}</div>
    </div>`;
  }).join('');

  const feed = posts.length
    ? posts.map(p=>renderRoomPost(p)).join('')
    : `<div class="rd-feed-empty">
        <div class="ill">${ILLUST.empty}</div>
        아직 나눔이 없어요.<br/>오늘의 묵상이나 기도제목으로<br/>첫 나눔을 시작해 보세요.
      </div>`;

  view.innerHTML = `
    <div class="rd-header">
      <button class="rd-back" onclick="closeRoom()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        우리 ${tierLabel('cell')||'목장'}
      </button>
      <div class="rd-title-row">
        <div class="rd-emoji">${room.emoji||'🌿'}</div>
        <div style="flex:1;min-width:0">
          <div class="rd-name">${escapeHtml(room.name)}</div>
          <div class="rd-sub">${escapeHtml(room.desc||'')} · 식구 ${(room.members||[]).length}명</div>
        </div>
      </div>
      <div class="rd-tools">
        <button class="rd-tool primary" onclick="openShareModal(null, '${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          묵상 나누기
        </button>
        <button class="rd-tool" onclick="openRoomPrayerModal('${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="2.2"/></svg>
          기도제목
        </button>
        <button class="rd-tool" onclick="openRoomInfoModal('${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          식구·초대
        </button>
      </div>
    </div>

    <div class="rd-week">
      <div class="rd-week-title">이번 주 묵상 나눔 🌱</div>
      <div class="rd-week-row">${memberRow}</div>

const ROOM_PART_LABELS = { grace:'받은 은혜', oratio:'말씀기도', oneThing:'One Thing · 오늘의 순종', thanks:'세 가지 감사', record:'말씀기록 · 순종과 감사' };

function renderRoomPost(p){
  let partsHtml = '';
  if(p.kind==='lectio' && p.parts){
    if(p.parts.grace) partsHtml += `<div class="rpost-part grace"><span class="pp-label">${ROOM_PART_LABELS.grace}</span>${escapeHtml(p.parts.grace)}</div>`;
    if(p.parts.oratio) partsHtml += `<div class="rpost-part pray-part"><span class="pp-label">${ROOM_PART_LABELS.oratio}</span>${escapeHtml(p.parts.oratio)}</div>`;
    if(p.parts.oneThing) partsHtml += `<div class="rpost-part"><span class="pp-label">${ROOM_PART_LABELS.oneThing}</span>${escapeHtml(p.parts.oneThing)}</div>`;
    if(p.parts.record) partsHtml += `<div class="rpost-part"><span class="pp-label">${ROOM_PART_LABELS.record}</span>${escapeHtml(p.parts.record).replace(/\n/g,'<br/>')}</div>`;
    if(p.parts.thanks && p.parts.thanks.length){
      partsHtml += `<div class="rpost-part"><span class="pp-label">${ROOM_PART_LABELS.thanks}</span>${p.parts.thanks.filter(t=>(t||'').trim()).map((t,i)=>`${i+1}. ${escapeHtml(t)}`).join('<br/>')}</div>`;
    }
  }
  // v1.6 — 비공개 저장: 기록했다는 표시만
  if(p.kind==='lectio' && p.private){
    partsHtml = `<div class="rpost-private">🔒 오늘의 묵상을 기록했습니다 · 내용은 비공개입니다</div>`;
  }
  const dateRef = (p.kind==='lectio' && p.dateKey && WORD_DATA[p.dateKey])
    ? `<span class="rpost-date-ref">${WORD_DATA[p.dateKey].range || p.dateKey}</span>` : '';
  const comments = (p.comments||[]).map(c=>`
    <div class="rpost-comment">
      <div class="cav">${escapeHtml((c.name||'?').charAt(0))}</div>
      <div class="ctxt"><strong>${escapeHtml(c.name||'')}</strong>${escapeHtml(c.text||'')}</div>
    </div>`).join('');

  return `
  <div class="rpost ${p.kind}" id="rpost-${p.id}">
    <div class="rpost-head">
      <div class="rpost-avatar">${escapeHtml(p.avatar||'성')}</div>
      <div>
        <div class="rpost-name">${escapeHtml(p.who)}</div>
        <div class="rpost-time">${formatRelTime(p.time)}</div>
      </div>
      <span class="rpost-kind">${p.kind==='lectio'?'🌿 묵상 나눔':'🙏 기도제목'}</span>
    </div>
    ${dateRef}
    ${p.body ? `<div class="rpost-body">${escapeHtml(p.body)}</div>` : ''}
    ${partsHtml}
    <div class="rpost-actions">
      <button class="amen-btn ${p.amened?'on':''}" onclick="toggleRoomAmen('${p.id}')">
        ${p.kind==='lectio' ? (p.amened?'🌿 아멘':'아멘') : (p.amened?'🙏 기도했어요':'함께 기도하기')}
      </button>
      <span class="amen-count">${p.amens>0 ? `${p.amens}명` : ''}</span>
      <button class="rpost-comment-btn" onclick="toggleRoomCommentForm('${p.id}')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        댓글 ${(p.comments||[]).length||''}
      </button>
    </div>
    <div class="rpost-comments">${comments}</div>
    <div class="rpost-comment-form" id="rcf-${p.id}" style="display:none">
      <input type="text" id="rci-${p.id}" placeholder="따뜻한 한 마디를 남겨 주세요" onkeydown="if(event.key==='Enter')submitRoomComment('${p.id}')"/>
      <button onclick="submitRoomComment('${p.id}')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>
  </div>`;
}

async function toggleRoomAmen(postId){
  const res = await api.toggleAmen(postId);
  if(res.ok && state.currentRoom){
    if(res.amened) toast('함께해 주셔서 감사합니다 🙏');
    keepScroll(()=>renderRoomDetail(state.currentRoom));
  }
}

function toggleRoomCommentForm(postId){
  const f = document.getElementById('rcf-'+postId);
  if(!f) return;
  const show = f.style.display==='none';
  f.style.display = show ? 'flex' : 'none';
  if(show){ const i = document.getElementById('rci-'+postId); if(i) i.focus(); }
}

async function submitRoomComment(postId){
  const inp = document.getElementById('rci-'+postId);
  const txt = inp ? inp.value.trim() : '';
  if(!txt){ toast('댓글을 입력해 주세요'); return; }
  await api.addRoomComment(postId, txt);
  toast('댓글을 남겼습니다');
  if(state.currentRoom) keepScroll(()=>renderRoomDetail(state.currentRoom));
}

  const members = (room.members||[]).map(m=>`

    <div style="padding:4px 2px">

      <p style="font-size:0.7812rem;color:var(--ink-3);margin-bottom:14px">식구 ${(room.members||[]).length}명 · ${room.type==='cell'?('내 '+(tierLabel('cell')||'목장')+' 방'):'소그룹 방'}</p>
      <div class="invite-code-box">
        <div class="code">${escapeHtml(room.code||'')}</div>
        <div class="hint">이 초대코드를 알려 주면 누구나 함께할 수 있어요</div>
        <button class="btn btn-secondary" style="margin-top:12px" onclick="copyInviteCode('${escapeHtml(room.code||'')}')">코드 복사</button>
      </div>
      <div style="font-size:0.7812rem;font-weight:700;color:var(--ink-3);margin:18px 0 4px">함께하는 식구들</div>
      ${members}
      ${room.type==='group' ? `<button class="btn btn-block btn-secondary" style="margin-top:16px;color:#A8412F" onclick="leaveRoomNow('${room.id}')">방 나가기</button>` : ''}
    </div>
  `;
  openModal();
}

function copyInviteCode(code){
  try{
    navigator.clipboard.writeText(code).then(
      ()=>toast('초대코드가 복사되었습니다'),
      ()=>toast('코드: '+code)
    );
  }catch(e){ toast('코드: '+code); }
}

async function leaveRoomNow(roomId){
  if(!confirm('이 방에서 나가시겠어요?\n(나눔 기록은 방에 남아 있습니다)')) return;
  await api.leaveRoom(roomId);
  closeModal();
  toast('방에서 나왔습니다');
  closeRoom();
}

/* ── 묵상 '목장에 나누기' — 선택 공유 ───────────────────────── */
async function openShareModal(dateKey, preRoomId){
  dateKey = dateKey || formatDateKey(state.currentDate);
  const [lectio, rooms] = await Promise.all([api.getLectio(dateKey), api.listMyRooms()]);
  if(!rooms.length){
    toast('먼저 목장을 등록하거나 소그룹 방에 참여해 주세요');
    return;
  }
  const d = WORD_DATA[dateKey] || {};
  const parts = [
    { key:'grace',    label:'받은 은혜 한 줄',          value:(lectio.meditatio3||'').trim() },
    { key:'oratio',   label:'말씀기도',                  value:(lectio.oratio||'').trim() },
    { key:'oneThing', label:'One Thing · 오늘의 순종',   value:(lectio.contemplatio||'').trim() },
    { key:'record',   label:'말씀기록 · 순종과 감사',    value:scriboText(lectio).trim() },
  ];
  const hasAny = parts.some(p=>p.value);

  document.getElementById('modalContent').innerHTML = `
    <div class="write-form">
      <h3>${tierLabel('cell')||'목장'}에 나누기</h3>
      <p class="h-sub">${escapeHtml(d.range || dateKey)} 묵상 중 <strong>나누고 싶은 부분만</strong> 선택해 주세요.<br/>선택하지 않은 기록은 나에게만 남습니다.</p>
      ${hasAny ? `
        <div class="share-pick">
          ${parts.map(p=>`
            <label class="share-pick-item ${p.value?'on':'empty'}">
              <input type="checkbox" data-share="${p.key}" ${p.value?'checked':'disabled'} onchange="this.parentNode.classList.toggle('on', this.checked)"/>
              <div style="flex:1;min-width:0">
                <div class="sp-label">${p.label}</div>
                <div class="sp-preview">${p.value ? escapeHtml(p.value) : '아직 기록하지 않았어요'}</div>
              </div>
            </label>
          `).join('')}
        </div>
        <label>나눌 방</label>
        <select id="share-room">
          ${rooms.map(r=>`<option value="${r.id}" ${r.id===preRoomId?'selected':''}>${escapeHtml(r.name)} (${r.type==='cell'?('내 '+(tierLabel('cell')||'목장')):'소그룹'})</option>`).join('')}
        </select>
        <label>한 마디 덧붙이기 <span class="lbl-aside">선택</span></label>
        <textarea id="share-note" rows="2" placeholder="예) 오늘 말씀이 유난히 마음에 머물렀어요."></textarea>
        <button class="btn btn-block" style="margin-top:16px" onclick="submitShare('${dateKey}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          선택한 내용 나누기
        </button>
      ` : `
        <div style="padding:22px 14px;text-align:center;color:var(--ink-3);font-size:0.8125rem;line-height:1.8;background:var(--bg-soft);border-radius:16px;margin-top:8px">
          이 날의 묵상 기록이 아직 없어요.<br/>먼저 말씀 탭에서 오늘의 묵상을 기록해 주세요.
        </div>
        <button class="btn btn-block" style="margin-top:14px" onclick="closeModal();goToDay('${dateKey}')">묵상 기록하러 가기</button>
      `}
    </div>
  `;
  openModal();
  // 미리보기 데이터 보관
  openShareModal._cache = { lectio, dateKey };
}

async function submitShare(dateKey){
  const cache = openShareModal._cache || {};
  const lectio = cache.lectio || await api.getLectio(dateKey);
  const checked = Array.from(document.querySelectorAll('input[data-share]:checked')).map(i=>i.dataset.share);
  if(!checked.length){ toast('나눌 항목을 한 가지 이상 선택해 주세요'); return; }
  const roomId = document.getElementById('share-room').value;
  const note = document.getElementById('share-note').value.trim();
  const parts = {};
  if(checked.includes('grace'))    parts.grace = (lectio.meditatio3||'').trim();
  if(checked.includes('oratio'))   parts.oratio = (lectio.oratio||'').trim();
  if(checked.includes('oneThing')) parts.oneThing = (lectio.contemplatio||'').trim();
  if(checked.includes('record'))   parts.record = scriboText(lectio).trim();
  await api.createRoomPost({ roomId, kind:'lectio', body:note, parts, dateKey });
  closeModal();
  toast('목장에 나눴습니다 🌿');
  if(state.currentRoom===roomId){ renderRoomDetail(roomId); }
  else{
    state.togetherTab = 'rooms';
    switchTab('pray');
    setTimeout(()=>openRoom(roomId), 200);
  }
}

  urgent:{ title:"캐나다 ‘메가 산불’에 전역 비상..북미를 뒤덮은 주황빛 재앙", team:'관리자', date:'2026.07.19', body:"극심한 폭염 속 900여 건 동시다발 발생… 소실 면적 남한 4분의 1 넘어서\n독성 연기 남하로 토론토·뉴욕 등 북미 대도시 대기질 ‘최악’ 기록\n\n캐나다 전역이 기후변화가 초래한 역대급 대형 산불로 거대한 화염과 연기에 휩싸였다. 2026년 7월 중순 현재, 알버타와 브리티시컬럼비아(BC) 등 서부 지역부터 온타리오, 퀘벡 등 동부 지역에 이르기까지 캐나다 전역에서 약 900건의 산불이 동시다발적으로 타오르고 있다.\n\n올해 누적 소실 면적은 이미 250만 헥타르(ha)를 돌파했다. 이는 대한민국 전체 면적의 25%를 넘어서는 대규모다. 특히 온타리오주 북서부에서 발생한 ‘썬더베이 36’ 화재는 주변 불씨를 집어삼키며 단일 화재로만 35만 헥타르 이상을 태우는 등 통제 불능의 메가 산불로 돌변했다.\n\n문제는 화재 피해에 그치지 않는다. 강한 기류를 타고 남하한 거대한 산불 연기가 북미 대륙 전체의 일상을 마비시키고 있다. 지난 15일을 기점으로 캐나다 최대 도시 토론토의 하늘은 온통 주황색 독성 안개로 뒤덮였다. 토론토는 한때 ‘세계에서 대기질이 가장 나쁜 도시 1위’에 오르는 불명예를 안았으며, 공공 실외 행사와 체육시설이 전면 폐쇄됐다.\n\n이 재앙적인 연기는 국경을 넘어 미국 중서부와 북동부 20개 주까지 침투했다. 뉴욕, 시카고, 디트로이트 등 미 주요 대도시 주민들은 \"매캐한 플라스틱 탄 냄새가 진동한다\"며 고통을 호소했고, 미 당국은 수천만 명의 시민에게 대기질 경보를 발령했다. 병원 응급실에는 천식 등 호흡기 질환을 호소하는 환자들의 발길이 급증하고 있다.\n\n기후 전문가들은 이번 사태가 6월 말부터 이어진 이례적인 폭염과 장기 가뭄이 맞물린 결과라고 분석했다. 현장에서는 수천 명의 소방대원이 사투를 벌이고 있으나, 워낙 광범위한 지역에서 불길이 치솟아 진화에 난항을 겪고 있다. 기상청 관계자는 \"하늘에서 충분한 양의 비가 내리지 않는 한, 북미를 강타한 주황색 연기 공포는 당분간 지속될 것\"이라고 암울한 전망을 내놓았다.\n< 출처 : kbs뉴스, 연합뉴스>\n\n기도제목\n\n1. 주님. 캐나다 전역 번지고 있는 산불을 막아주소서. 900건의 산불을 사람의 힘으로 멈출 수 없습니다. 통제 불능의 메가 산불 뒤에 있는 강한 바람과 건조한 기후를 다스려 주시고, 오직 전능하신 주님의 손길로 불길을 막아 멈추어 주소서.\n\n2. 모든 불을 꺼뜨릴 비를 내려 주소서. 진화 인력의 손길이 닿지 못하는 깊은 오지와 산맥 구석구석까지 주님의 시원한 단비가 임하여, 타오르는 불길이 소멸하게 하소서.\n\n3. 캐나다 토론토부터 미국의 뉴욕, 시카고에 이르기까지 북미 전역을 뒤덮은 주황빛 독성 연기로 고통받는 수천만 명의 주민들을 살펴 주소서. 하루아침에 삶의 터전을 잃고 대피한 이재민들에게 속히 따뜻한 도움의 손길과 위로가 닿게 하소서.\n\n4. 산불을 진화하고 있는 소방관들의 안전을 지키시고 보호하여 주소서. 유독가스와 뜨거운 열기 속에서 목숨을 걸고 방어선을 구축하고 있는 모든 소방관과 자원봉사자들의 안전을 눈동자처럼 지켜 주소서.\n\n5. 이 거대한 자연의 위기 앞에서 인간의 교만을 내려놓고, 창조주 하나님만을 바라보며 두렵고 떨림으로 경외하게 하소서. 어려움을 지날 때 인간의 무력함을 깨닫고, 주님의 위대하심을 고백하게 하소서.\n\n6. 위기 앞에서 모든 나라가 연대하며 하나되게 하소서. 자국의 이기주의로 어려움에 있는 캐나다에 고통이 더하지 않게 하소서. 이웃을 사랑하며 도움의 손길을 더하는 위로의 시간이 되게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
  korea:[
    { title:"대통령 낙태약 허용 검토 지시, 태아 생명 보호를 위한 바른법 제정 기도", team:"바른법제정팀", date:"2026.07.19", body:"◇ 대통령 낙태약 허용 검토 지시… 교계, 강력 반발\n\n이재명 대통령이 최근 모자보건법 개정 전이라도 경구용 유산 유도 의약품인 ‘미프진’ 처방의 허용 방안을 검토하라고 지시한 것을 두고 태아 생명보호 운동 단체들이 우려를 제기했다. 위기 임신부에게 약물을 주며 책임을 회피할 것이 아니라 아이를 낳고 기를 수 있는 실질적인 국가 책임 지원 체계를 마련해야 한다는 취지다.\n\n태아 생명보호 운동 연합체인 행동하는프로라이프(상임대표 이봉화)는 16일 성명을 내고 “대통령의 말 한마디로 낙태약을 허용할 수는 없다”며 관련 검토 지시 철회를 촉구했다.\n\n이 대통령은 지난 14일 국무회의에서 낙태 허용 기준이 되는 임신 주수를 둘러싼 입법 논의가 장기간 이어지고 있는 점을 언급하며 “문제가 해결되기 전이라도 의사가 재량으로 판단하게 허용한다든지, 주요 쟁점이 정리되기 전이라도 약품 판매를 허용할 수도 있는 것 아닌가”라고 말했다.\n\n행동하는프로라이프는 이에 대해 “충분한 법적·의료적 안전장치 없이 의사의 재량만으로 약물 사용을 허용하는 것은 태아의 생명과 여성의 안전 모두를 위협하는 선례가 될 수 있다”며 “모든 의료적·법적 책임을 여성 개인에게 떠넘길 우려가 있다”고 지적했다. 이어 “약물 낙태는 자궁외임신 여부 확인과 출혈·감염 관리, 불완전 유산 여부 확인 등 고도의 의료적 관리가 필요한 의료행위”라고 부연했다.\n\n교계와 생명운동 단체들은 미프진 문제를 단순히 의약품 허가 사안으로만 접근해서는 안 된다고 목소리를 높인다. 약물 낙태를 둘러싼 의료적 안전성과 함께 태아 생명 보호, 사회적 책임까지 종합적으로 논의해야 한다는 의견이다.\n\n전문가들은 생명권과 여성의 자기결정권 가운데 어느 한 가치만을 앞세우기보다 태아의 생명 보호와 여성 건강권을 함께 보장할 수 있는 사회적 합의를 마련해야 한다고 조언한다. 아울러 위기 임신부에 대한 상담과 돌봄, 실질적인 출산·양육 지원 확대와 함께 2019년 헌법재판소의 헌법불합치 결정 이후 이어진 낙태 관련 입법 공백을 해소하는 논의도 병행될 필요가 있다고 강조한다.\n\n이봉화 대표는 “헌법재판소 결정은 태아의 생명권과 여성의 자기결정권을 함께 고려하는 새로운 입법 체계를 마련하라는 취지”라며 “입법 공백을 이유로 또 행정적 판단만으로 약물 사용을 허용하는 것은 신중해야 한다”고 말했다.\n\n◇ \"부작용 심각한 고위험성 의약품 검증 없이 풀겠다는 것…중단해야\"\n\n국민의힘 윤용근 의원은 15일 \"어제 이재명 대통령이 법 개정 전이라도 낙태약 '미프진'을 판매 허용하라고 지시했다는 소식에 경악을 금치 못한다\"며 \"가장 약한 태아의 생명권을 유린하고 여성의 건강을 위협하는 졸속 '약물 낙태' 허용 시도를 강력히 규탄한다\"고 밝혔다.\n\n윤 의원은 이날 국회에서 장지영 이화여자대학교 부속 서울병원 교수와 가톨릭생명윤리연구소장 박은호 신부, 시민단체 태아·여성보호국민연합과 기자회견을 열고 \"헌법이 부여한 국가의 생명 수호 의무를 저버린 초법적 발상이자 국민의 생명을 담보로 벌이는 위험천만한 도박\"이라며 이같이 밝혔다.\n\n그는 \"가장 존엄해야 할 생명기본권을 존중하는 양심이 털끝만큼이라도 과연 있나\"라며 \"'해외 직구 사고 방지'라는 기만적인 핑계를 대고 있지만, 부작용이 심각한 고위험성 의약품을 검증과 안전 규정도 없이 풀겠다는 것은 여성의 건강을 해치는 위험한 발상\"이라고 했다.\n\n그러면서 \"정부는 법치를 파괴하는 위험천만한 약물 허용 시도를 즉각 중단하라. 태아의 생명권과 임신한 여성의 건강권을 지킬 실질적이고 근본적인 대책부터 내놓으라\"고 덧붙였다.\n\n아울러 윤 의원은 조만간 임신부 지원 및 태아 생명 보호를 위한 '태아생명 기본법'을 발의하겠다고 했다.\n\n앞서 이 대통령은 전날 주재한 국무회의에서 임신 중지 약물인 미프진 사용과 관련해 \"우리나라에선 허용이 안 돼 여성들이 해외에서 직구해 복용하는 모양\"이라며 \"의사의 양심과 재량에 맡기는 것도 하나의 방법으로, 이걸 방치해 처방 없이 해외에서 막 사서 투약하는 것보다 낫다\"고 말했다.\n\n◇ 李대통령 낙태약 언급에 정은경 보건복지부 장관 \"허가시 안전 기준 마련\"\n\n이 대통령이 최근 인공임신중절 의약품인 '미프진'의 적정 복용이 필요하다고 언급하면서 실제 도입 여부에 관심이 높아지고 있다. 정은경 보건복지부 장관은 \"(약을) 도입할 경우 안전 사용에 대한 기준 마련을 준비하고 있다\"고 밝혔다.\n\n정 장관은 지난 15일 복지부 정부세종청사에서 열린 하반기 업무보고 사전브리핑에서 '미프진' 관련 질문에 \"임신중지 약물 관련 낙태에 관한 헌법불합치 판정이 있었고 개선 입법을 하라는 요청이 있었는데 아직 입법이 미비한 부분에 대해 정부로서 책임감을 갖고 있다\"며 \"모자보건법 개정 등 필요한 부분을 국회와 논의하면서 진행하겠다\"고 밝혔다.\n\n이어 \"약제가 허가돼 도입할 경우 안전하게 사용할 수 있도록 의료계와 임상진료 지침 등 안전한 사용에 대한 기준을 마련하는 걸 준비하고 있다\"고 덧붙였다.\n\n◇ “저출산 극복해야 할 상황에 의사 재량으로 낙태약을?”\n\n한국교회연합(대표회장 천환 목사, 이하 한교연)이 이재명 대통령의 낙태약물 관련 발언을 비판하며 발언 취소를 촉구했다.\n\n한교연은 16일 발표한 성명에서 “낙태 약물 도입을 의사의 양심과 재량에 맡기자는 대통령의 무책임한 발언을 취소해야 한다”며 “국민의 생명과 안전에 대한 무책임한 회피일 뿐 아니라 생명 보호 최일선에 서 있는 대통령으로서 헌법적 의무를 방기한 매우 위험한 발언”이라고 주장했다.\n\n아울러 우리나라가 저출산으로 인한 인구 감소 위기에 직면한 상황을 언급하며 “정부와 종교계, 사회단체를 비롯해 온 국민이 국가의 앞날을 걱정하며 저출산 극복을 위해 지혜를 모으고 있는 상황에서 대통령이 곧 태어날 생명을 마음대로 없애도록 의사에게 재량권을 주자는 말을 해서는 안 된다”고 주장했다.\n\n그러면서 “태아는 작고 약하지만 반드시 보호받아야 할 귀중한 생명”이라며 “그 생명이 완전한 인격체로 성장하기까지 국가는 모든 책임을 다해야 한다”고 강조했다.\n<출처 : 뉴시스, 연합뉴스, 국민일보, 기독일보 종합>\n\n기도제목\n\n1. 주님, 생명의 주권이 오직 하나님께 있음을 고백합니다.\n우리나라와 열방 가운데 태아의 생명을 보호하는 바른 법이 세워지게 하시고, 입법부와 행정부, 사법부가 하나님의 뜻을 경외하며 생명을 존중하는 법과 제도를 이루는 도구로 쓰임받게 하소서.\n\n2. 생명의 거룩함이 무너져가는 이 시대를 긍휼히 여겨주소서.\n낙태죄 헌법불합치 결정 이후 입법 공백이 길어지는 가운데 태아의 생명이 방치되지 않게 하시고, 낙태약 도입과 관련된 모든 시도가 주님의 뜻 가운데 바로 서게 하소서. 상업적 이익과 편의의 논리가 아니라 생명을 보호하는 방향으로 법과 정책이 세워지게 하시고, 태아를 주님의 눈동자와 같이 지켜주소서.\n\n3. 생명을 인간의 선택 아래 둔 우리의 죄를 용서하여 주소서.\n편리와 선택이라는 이름으로 생명을 가볍게 여긴 죄를 긍휼히 여기시고, 태아를 ‘선택의 대상’이 아닌 ‘하나님의 형상’으로 바라보는 성경적 가치가 이 땅의 법과 정책 가운데 온전히 반영되게 하소서. 또한 생명을 포기하도록 내모는 사회 구조적 문제들도 주님께서 바로잡아 주소서.\n\n4. 임산부 지원 및 태아 생명 보호를 위한 ‘태아생명 기본법’이 주님의 뜻 가운데 세워지게 하소서.\n태중의 생명 또한 하나님께서 지으신 존귀한 존재임을 기억하게 하시고, 법적으로도 분명히 보호받게 하소서. 태아의 생명권과 임신한 여성의 건강권이 함께 존중받을 수 있도록, 실질적이고 근본적인 보호가 이루어지는 지혜로운 제도와 환경이 마련되게 하소서.\n\n5. 입법부와 행정부, 사법부 위에 하나님의 공의와 생명 존중의 정신이 굳게 서게 하소서.\n모든 공직자들이 사람의 눈이 아닌 하나님의 뜻을 두려워하며 판단하고 결정하게 하시고, 법과 정책이 태아의 생명권을 분명히 지키는 방향으로 바로 서게 하소서. 낙태를 정당화하고 확산시키려는 흐름을 막아주시고, 생명 보호를 우선하는 공의로운 법질서가 세워지게 하소서.\n\n6. 만군의 여호와의 말씀을 의지하여 기도합니다.\n이는 힘으로 되지 아니하며 능력으로 되지 아니하고 오직 주님의 영으로 이루어짐을 믿습니다. “내 백성”이라 부르시며 애통하시는 주님의 마음을 본받아, 이 땅의 입법부와 행정부와 사법부를 위하여 우리가 겸손히 주님을 구하게 하소서.\n여호와의 이름으로 일컫는 하나님의 백성들이 악한 길에서 떠나 스스로 낮추고 기도하며 여호와의 얼굴을 구하게 하소서. 주께서 이 땅을 고쳐주실 것을 믿음으로 끝까지 합심하여, 우리 한 몸 된 공동체를 위한 기도가 불일 듯 일어나게 하소서.\n\n예수님 이름으로 기도합니다. 아멘" },
    { title:"한국교회가 하나님의 사랑과 존중의 언어로 말하며 가르치게 하시고 기도하게 하소서", team:"한국교회팀", date:"2026.07.19", body:"혐오·조롱이 놀이가 된 교실…\"교회가 먼저 존중의 언어 가르쳐야\"\n\n고교 야구장에서 나온 조롱성 응원 구호가 징계와 경찰 수사로까지 이어지면서 학교 현장에 퍼진 조롱 문화가 수면 위로 드러났다. 온라인 유행어와 혐오 표현이 놀이처럼 소비되는 가운데, 다음세대에게 존중의 언어를 가르치는 교육이 절실하다는 목소리가 커지고 있다.\n\n논란은 지난달 29일 서울 목동구장에서 열린 제81회 청룡기 전국고교야구선수권대회 배재고와 광주제일고의 경기에서 불거졌다. 당시 배재고 야구부 일부 학생들은 광주와 5·18민주화운동을 조롱하는 응원 구호를 외쳤다. 사건이 알려지자 대한야구소프트볼협회는 배재고 야구부에 전국대회 출전정지 6개월의 징계를 내렸다.\n\n배재고 야구부 학생과 지도자, 학부모, 교직원 등 86명은 지난 6일 광주일고를 찾아 공식 사과했다. 야구부 주장과 감독은 광주일고 학생과 학부모, 광주시민에게 사과의 뜻을 전하며 재발 방지를 약속했다.\n\n하지만 이번 일을 특정 학교 학생들의 일탈로만 볼 수 없다는 지적이 나온다. 외모와 장애, 출신 지역 등을 희화화하는 표현이 온라인에서 '밈'과 유행어로 소비되면서 학교 현장까지 자연스럽게 스며들고 있기 때문이다.\n\n무엇보다 교회가 다음세대에게 존중의 언어와 공감의 가치를 먼저 가르쳐야 한다는 주문도 나온다. 혐오 표현을 단순히 금지하는 데 그치지 않고, 학생들이 일상에서 접하는 언어와 온라인 문화를 성경적 가치관으로 분별하도록 돕는 교육이 필요하다는 것이다.\n\n기독교학교교육연구소 소장은 \"교회학교는 성경 지식을 전달하는 데 그치지 말고 학생들이 사용하는 언어와 온라인 콘텐츠, 또래문화를 함께 살펴야 한다\"며 \"유행하는 표현을 무분별하게 따라 하지 않고, 그 말이 끼칠 영향력을 판단하는 힘을 길러줘야 한다\"고 말했다. 또한 \"경쟁 중심 사회에서 쌓인 스트레스가 조롱과 공격적인 언어로 표출되지 않도록 근본적인 교육이 필요하다\"며 \"이번 사건이 우리 사회의 언어문화를 성찰하는 계기가 돼야 한다\"고 강조했다. <출처 : 데일리굿뉴스>\n\n기도제목\n\n1. 세상의 물질만능주의와 성공지향주의에 휩쓸려 내가 왕이 되려고 나를 보호하고 방어해야 한다고 합리화하며 내 마음대로 판단하고 평가했던 교만함과 언어의 습관들을 용서하여 주소서. 하나님을 먼저 믿은 어른인 우리가 하나님이 나의 주인되시며 하나님의 통치하심에 순종하지 못해 무너져버린 삶의 기준과 진리가 하나님 앞에 다시 무릎 꿇게 하셔서 말씀 안에서 회복되고 바로 세워지게 하셔서 오직 하나님의 자녀로 하나님을 닮은 마음과 입술과 행실로 살아가게 하소서.\n\n2. 가정에서부터 먼저 다음세대를 영육이 강건한 하나님의 생명을 담은 빛의 세대로 양육하게 하소서.\n부모들이 오직 하나님께 받은 사랑으로 자녀의 마음과 정서를 세심히 살피며 신뢰와 존중으로 양육하며 말하게 하소서.\n특별히 부모들이 자녀들의 이야기를 진심으로 경청하며 공감하게 하시고, 사랑과 안정감을 누리게 하셔서 다음세대들이 타인의 아픔에 공감할 줄 아는 건강하고 성숙한 인격으로 자라나게 하소서.\n\n3. 학교에서의 교육이 성적과 성공만을 추구하는 세상의 교육이 아닌 하나님의 생명의 가치와 인성을 자라게 하는 참된 교육으로 뿌리 내리게 하소서.\n하나님을 경외하는 선생님들이 되게 하시고 선생님들을 위해 기도하는 부모들이 되게 하소서. 선생님을 공경함으로 권위가 세워지게 하시고, 학생을 존귀히 여기는 서로를 사랑하는 배움터가 되게 하소서.\n하나님이 각자에게 심어주신 달란트들이 발견되고 발전될 수 있도록 서로를 격려하며 너그럽게 품어주게 하셔서 협력하여 선을 이루며 함께 자라가는 교육현장이 되게 하소서.\n\n4. 인터넷과 미디어를 통해 확산되는 혐오와 조롱, 폭력과 생명 경시 문화가 무너지게 하소서. 특별히 아동·청소년을 대상으로 한 미디어 콘텐츠가 보호의 원칙과 사회적 책임성을 회복하게 하소서. 끊임없이 우리들의 마음과 생각을 지배하려는 세상의 교묘한 계략에 담대히 맞설 수 있도록 모든 세대가 깨어 하나님께 기도하게 하시고, 영적으로 분별할 지혜와 입술의 파수꾼을 세워주셔서 예수님의 생명을 담은 언어로 말하게 하여 주소서.\n\n5. 한국교회의 교회학교 사역자들과 교사들이 예배와 셀모임을 통해 말씀을 전하는 것과 더불어 다음세대들에게 교회 밖의 일상에서 접하는 언어와 온라인 문화를 성경적 가치관으로 분별할 수 있도록 시대를 분별하는 통찰과 성경적 기준에 근거하여 가르칠 수 있도록 하나님의 지혜를 허락하소서.\n\n예수님의 이름으로 기도합니다 아멘." },
    { title:"한국·우크라이나 양 정상회담에 관한 기도", team:"복음통일팀", date:"2026.07.16", body:"\"북한군 포로 의사 존중, 국제법 따라 해결\" 李대통령, 젤렌스키와 회담\n\n나토(NATO·북대서양조약기구) 정상회의 참석차 튀르키예 앙카라를 방문한 이재명 대통령이 8일(현지 시각) 볼로디미르 젤렌스키 우크라이나 대통령과 정상회담을 했다. 이 대통령이 젤렌스키 대통령과 회담한 것은 취임 후 이번이 처음이다.\n\n청와대는 이날 회담에서 양 정상이 \"우크라이나 내 북한군 포로 문제는 당사자들의 자유의사를 존중하여 국제법과 인도주의 원칙에 부합하는 방식으로 해결해 나가기로 뜻을 모았다\"고 밝혔다. 한국 귀순 의사를 밝힌 북한군 포로들의 의사를 존중하며, 당사자의 의사에 반해 고문·처형의 우려가 있는 곳으로 보내지 않는다는 국제법상의 강제 송환 금지 원칙을 준수하겠다는 취지다. 양국 정상이 이런 원칙에 합의한 만큼, 지난해 1월 러시아 쿠르스크에서 우크라이나군에 체포된 후 19개월째 억류돼 있는 북한군 포로 2명의 한국행이 조만간 성사될지 주목된다.\n\n이 대통령과 젤렌스키 대통령은 이날 앙카라 시내 한 호텔에서 만나 43분간 회담을 가졌다. 강유정 청와대 수석대변인은 회담 뒤 서면 브리핑을 통해 \"이 대통령은 우크라이나 국민들이 필요로 하는 인도적 지원을 지속하면서 우크라이나 복구·재건을 위한 국제사회의 노력에도 지속 동참해 나갈 것이라고 강조했다\"고 전했다. 젤렌스키 대통령은 우리 정부의 지원에 감사의 뜻을 전하며, 우크라이나의 재건 과정에서 한국 정부와 기업들의 지속적인 관심과 참여를 기대한다고 밝혔다.\n\n이와 관련, 우리 정부는 전날 이번 나토 정상회의를 계기로 우크라이나에 대한 인도적 지원과 국제적 재건·복구 프로젝트 참여를 포함해 1억달러(약 1500억원) 규모 포괄적 지원을 약속했다고 밝혔다. 다만 살상무기는 지원하지 않는다.\n\n당초 30분을 예정하고 시작된 회담은 낮 12시부터 43분간 이어졌다. 청와대는 두 정상이 \"한반도 및 우크라이나 정세와 관련 폭넓은 의견을 교환하고, 양국 관계의 발전을 위해 앞으로도 긴밀한 소통을 이어가기로 했다\"고 밝혔다. 한국의 1억달러 포괄적 지원과 북한군 포로 문제 외에 우크라이나 전쟁의 전황, 북·러 군사 협력의 실태, 우크라이나 재건 문제 등이 논의된 것으로 보인다. <출처 : 조선일보>\n\n기도제목\n\n1. 지난 2월, 우크라이나 내 북한군 포로 백평강과 리강은 두 청년의 기사를 보게 하시고 강제 북송을 막고 안전한 이송을 위해 생명 살리는 간절한 기도를 하게 하셨습니다.\n나토 정상회의 참석 중 8일, 이재명 대통령과 젤렌스키 우크라이나 대통령이 정상회담을 갖고 양 정상이 우크라이나 내 북한군 포로 문제를 국제법과 인도주의 원칙에 부합하는 방식으로 해결해 나가기로 합의하였습니다. 이는 갇힌 자의 탄식과 생명 살리는 중보기도를 들으사 가장 선한 하나님의 때에 하나님의 방법으로 포로된 자를 자유케 하시는 하나님의 역사이시기에 감사와 찬양을 올려드립니다.\n\n2. 19개월째 우크라이나에 억류되어있는 두 북한군 포로에게 생명의 위협을 받는 강제 북송을 막아주시고 두 북한군 포로의 자유의사가 존중되어 조속히 남한으로 안전하게 이송되게 하소서.\n한국과 우크라이나 정부가 국제인권법과 국제난민법과 헌법의 원칙에 기반한 즉각적이고 적극적으로 책임있는 실제적인 조치를 하게 하소서. 또한 중국과 북한에 있는 모든 갇힌 자들이 공포와 통제 가운데서 벗어나 자유하게 하시고 원하는 곳으로 풀려나게 하소서.\n\n3. 두 북한군 청년이 한국에 와서 잘 정착할 때까지 그리스도인들의 돕는 손길과 기도가 멈추지 않게 하소서.\n두 청년이 하나님을 깊이 만나며 주님의 은혜와 사랑과 평강을 누리게 하시며 복음통일에 귀하게 쓰임 받는 사역자가 되게 하소서. 자유와 복음이 북한 곳곳마다 전해지게 하시며 김씨 일가 우상숭배와 주체사상이 무너지고 마음껏 예배드리는 복음통일을 이루게 하소서.\n\n4. 한국과 우크라이나의 양 정상회담을 통해 한국의 1억 달러 포괄적 지원과 북한군 포로 문제 외에 우크라이나 전쟁의 전황, 북러 군사 협력의 실태, 우크라이나 재건 문제 등이 논의되게 하심을 감사드립니다.\n이 논의가 정치, 경제, 외교의 변수에 흔들림 없이 진행되게 하시고, 굳건히 지켜지며 실현되게 하소서. 한국 정부가 시대적 대변화의 흐름을 바르게 파악하고 복잡한 국제정세에서 현명한 외교적 입장을 취할 수 있기를 구합니다. 특히 북·중·러와 미·일과의 관계를 바르게 맺게 하소서.\n\n5. 적대적 두 국가론을 취하며 핵과 무기 개발로 끊임없이 남한을 위협하는 북한으로 인해 군사적 위협이 높아지고 있습니다.\n우리 정부가 북한의 군사적 위협을 넉넉히 방비할 안보 능력을 갖추도록 준비하게 하소서. 한국과 우크라이나 관계가 우크라이나의 최신 드론 기술과 전쟁 노하우를 전수 받는 협력관계로 진척되게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
    { title:"한국교회의 모든 성도가 삶의 일상 가운데 예수님을 전하는 선교사로 살아가게 하소서", team:"한국교회팀", date:"2026.07.12", body:"\"직업이 곧 선교지\"…일상 속 보냄 받은 교회를 말하다\n\n교회의 선교 본질을 회복하고, '선교적 교회'를 확장해나가기 위한 운동(Movement) 차원에서 매년 진행되는 '2026 프레시콘퍼런스(FRESH Conference)'가 지난 6월 29일부터 7월 1일까지 열렸으며 '선교적 교회'로의 체질 개선이 한국교회의 희망임을 강조했다.\n\n'교회의 존재 이유는 더 많은 사람을 교회 안으로 모으는 데 있는 것이 아니라, 성도들을 세상으로 파송하는 데 있다'는 '선교적 교회'의 관점이 한국교회 내에 확산되고 있다.\n\n교회가 세상 속으로 보냄 받은 공동체라면, 성도의 일상과 직업도 복음을 살아내는 선교의 현장이다. '선교적 교회'로서의 선교 핵심은, 성도라면 누구나 선교사이며, 특별한 해외 선교지가 아닌 내가 속한 곳에서, 나와 일상적 관계를 맺는 이들 속에서 먼저 복음에 합당한 삶을 살아냄으로써 하나님의 나라를 경험하게 하고, 예수 그리스도를 증거하는 삶을 살아내는 것이다.\n\n발제자로 나선 북미 선교적 교회 운동 전문가는 \"선교적 교회 운동의 핵심은 예수를 따른다고 말하는 사람들이 실제 삶과 일상 속에서 예수를 따르고 있는가에 있다\"며 \"선교적 삶은 결국 부르심에 응답해 살아가는 삶\"이며 성도는 부르심을 받은 존재일 뿐 아니라 세상 속으로 보냄 받은 존재라고 설명했다. 특히 선교적 삶의 출발점은 특별한 사역이나 해외 선교지가 아니라, 이미 주어진 삶의 자리라고 짚었다.\n\n또한 성도의 직업과 일터를 선교의 현장으로 해석했다. \"여러분은 그곳에서 사람들을 만나고, 축복하며, 함께 살아갈 수 있다\"며 \"선교는 몇몇 파송 선교사만의 일이 아니라 교회 전체가 함께 감당해야 할 사명\"이라고 밝혔다.\n\n선교적 삶을 위한 실제적 태도로는 직업과 삶의 자리 재해석, 하나님께 자신을 내어드리는 태도, 의도성을 가진 시간 사용을 제안했다. \"어디를 가든 그곳이 선교지고, 만나는 사람들이 우리에게 맡겨진 사람들\"이라며 \"여러분이 성장하기 원하는 곳에 시간을 투자해야 한다\"고 권면했다.\n\n선택 강의에서는 비즈니스와 선교를 연결하는 실제적 논의도 이어졌다. \"선교는 타문화나 타지역에서 이뤄지는 종교적 활동만이 아니라, 우리가 보냄 받은 현장을 선교지로 인식하는 데서 시작된다\"고 전했다. <출처 : 아이굿뉴스>\n\n기도제목\n\n1. 우리 모두가 예수님의 십자가 사랑으로 구원받은 자임을 감사하게 하소서. 허락하신 삶의 모든 자리가 하나님의 사랑을 전하는 선교지임을 기억하게 하셔서 오직 예수님을 닮은 십자가의 사랑으로 사랑하게 하시고 우리의 삶이 예배가 되게 하소서.\n\n2. 공동체와 직장 안에서 화평케하는 자, 경청하는 자, 인내하는 자로 우리의 말과 행동과 삶을 통해 그리스도인의 정체성이 드러나게 하셔서 그리스도인의 참된 사명을 감당하게 하소서. 불평이 많은 세상 속에서 감사의 언어를 선택하게 하시고, 경쟁이 치열한 세상 속에서 나눔의 삶을 실천하게 하소서. 사랑받기를 기다리기보다 먼저 다가가 사랑을 전하는 성도가 되게 하소서. 예수님이 만나게 해주신 서로를 믿음의 동역자로 존귀히 여기며 서로에게 언제나 온유와 겸손으로 예수님께 하듯 하게 하소서.\n\n3. 예수님을 믿는 모든 가정이 예수님이 주인 되시는 가정으로 살게 하소서. 믿음의 제사장 남편과 돕는 배필의 아내와 믿음의 동역자인 자녀들 사이에 사랑과 존중이 깊어지게 하셔서 자녀들에게 믿음의 유산이 잘 전해지게 하시고, 믿음의 가정으로 그리스도인의 선한 영향력을 흘려보내게 하소서. 온 세대가 성령의 능력으로 한반도를 넘어 온 열방을 향해 나아가 복음을 전파하는 부흥의 세대로 일어나게 하시고, 예수님께서 맡겨주신 \"가서 제자 삼으라\"는 위대한 명령을 끝까지 감당하게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘." },
    { title:"내년 최저임금 노사격차 '990원' 심의촉진구간 제시 전망", team:"정경사문팀", date:"2026.07.11", body:"내년도 최저임금 수준을 협상하고 있는 노동계와 경영계의 요구 격차가 '990원'까지 좁혀졌지만 여전히 간극이 커 9일 회의에서 공익위원들이 '심의 촉진구간'을 제시할 전망이다. 최저임금위원회는 이날 오후 3시 정부세종청사에서 제13차 전원회의를 연다.\n\n최저임금은 근로자·사용자·공익위원 9명씩 총 27명이 모여 매년 결정한다. 노사가 최초 요구안을 제시한 뒤 수정안을 거듭하며 격차를 좁히는 방식이다.\n\n앞서 노동계는 최저임금 최초 요구안으로 올해(1만320원)보다 16.3% 오른 시급 1만2천원을 제시했고, 경영계는 동결을 첫 제시안으로 꺼냈다. 지난 회의에서 6차 수정안으로 노동계와 경영계는 각각 시간당 1만1천450원과 1만460원을 제시했다. 양측의 격차가 990원으로 줄어든 것이다.\n\n노사의 견해차가 여전한 데다 확정 고시 시한이 임박해 공익위원들이 상한선과 하한선인 '심의 촉진구간'을 제시해 합의 또는 표결을 유도할 가능성이 있다. 최저임금 법정 심의 시한은 올해의 경우 지난달 29일까지로 이미 지났다.\n\n최종 시한을 넘겼다고 해도 최저임금위는 남은 행정절차 등을 고려해 7월 중순까지는 최저임금안을 고용노동부 장관에게 제출해야 한다. 이후 노동부 장관은 8월 5일까지 최저임금을 확정해 고시해야 한다. 효력은 내년 1월 1일부터 발생한다.\n\n이런 일정을 감안해 최종 타결은 오는 14일 이뤄질 것이란 관측이 지배적이다. <출처 : 데일리굿뉴스>\n\n기도제목\n\n1. 노사에게 인자와 정의의 마음을 주셔서 노사협정이 잘 이루어지도록. 양측 모두에게 가장 감사한 금액으로 결정되게 하여 주소서.\n\n2. 노동계 경영계 있는 자들이 나라의 충성된 자로 서게 하소서. 거짓을 행하지 않고, 악이 아니라 선을 택하는 자들이 되게 하소서. 개인의 이익이 아닌 모두를 위한 결정이 내려지게 하소서.\n\n3. 협상을 하는 리더들에게 굳건한 마음을 주소서. 개인의 사리사욕을 채울 수 있는 악의 유혹 앞에서 흔들리지 않는 용기를 주소서. 다윗처럼 온전한 길을 쫓는 마음을 주소서.\n\n4. 이 나라가 주님이 통치하는 나라임을 고백합니다. 완전한 길인 하나님만 주목하고, 하나님의 통치가 우리나라에 온전히 서게 될 것을 기대하게 하소서.\n\n5. 국민 한사람 한사람이 양심과 신앙에서 가정과 사회 모든 영역에서 완전한 자로 서게 하소서. 믿음의 자들이 아는 만큼 살아내고, 하나님께 소망을 두고 쉬지않고 기도하게 하소서.\n\n예수님의 이름으로 기도합니다. 아멘" }

function getPwj(){
  const c = _read(STORAGE_KEYS.pwj, null);
  return (c && c.urgent && Array.isArray(c.korea) && c.korea.length) ? c : PWJ_SEED;
}
function togglePwj(k){
  state.pwjExpanded = state.pwjExpanded || {};
  state.pwjExpanded[k] = !state.pwjExpanded[k];
  const inp = document.getElementById('mypInput');
  const keep = inp ? inp.value : '';
  const el = document.getElementById('pwjSection');
  if(el){ el.innerHTML = renderPwjSection(); const i2=document.getElementById('mypInput'); if(i2) i2.value = keep; }
}
function getMyPrayerItems(){ return _read(STORAGE_KEYS.myPrayerItems, []); }
function addMyPrayerItem(){
  const inp = document.getElementById('mypInput');
  const text = (inp && inp.value || '').trim();
  if(!text){ toast('기도제목을 적어 주세요'); return; }
  const items = getMyPrayerItems();
  items.unshift({ id:'mp_'+Date.now(), text:text, time:Date.now() });
  _write(STORAGE_KEYS.myPrayerItems, items);
  const el = document.getElementById('pwjSection');
  if(el) el.innerHTML = renderPwjSection();
  toast('나의 기도제목에 담았습니다 🙏');
}
function delMyPrayerItem(id){
  _write(STORAGE_KEYS.myPrayerItems, getMyPrayerItems().filter(function(m){ return m.id!==id; }));
  const el = document.getElementById('pwjSection');
  if(el) el.innerHTML = renderPwjSection();
}
function renderPwjSection(){
  const d = getPwj();
  const u = d.urgent || {};
  const items = d.korea || [];
  const my = getMyPrayerItems();
  const exp = state.pwjExpanded || {};
  const chev = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
  return `
    <div class="pwj-card pwj-urgent">
      <div class="pwj-head">
        <span class="pwj-badge urgent">🔥 긴급기도제목</span>
        <a class="pwj-src" href="${PWJ_LINKS.urgent}" target="_blank" rel="noopener">예수동행기도 ↗</a>
      </div>
      <div class="pwj-title">${escapeHtml(u.title||'')}</div>
      <div class="pwj-meta">${escapeHtml(u.date||'')} · 예수동행기도 긴급기도</div>
      <div class="pwj-body ${exp.u?'':'clamp'}">${escapeHtml(u.body||'').replace(/\n/g,'<br/>')}</div>
      <button class="pwj-more" onclick="togglePwj('u')">${exp.u?'접기 ↑':'전체 보기 ↓'}</button>
    </div>

    <div class="pwj-card">
      <div class="pwj-head">
        <span class="pwj-badge">대한민국을 위한 기도</span>
        <a class="pwj-src" href="${PWJ_LINKS.korea}" target="_blank" rel="noopener">예수동행기도 ↗</a>
      </div>
      ${items.map(function(it,i){
        const on = !!exp['k'+i];
        return `
        <div class="pwj-item ${on?'open':''}">
          <button class="pwj-item-head" onclick="togglePwj('k${i}')">
            <span class="pwj-item-num">${i+1}</span>
            <span class="pwj-item-main">
              <span class="pwj-item-title">${escapeHtml(it.title||'')}</span>
              <span class="pwj-item-meta">${escapeHtml(it.team||'')} · ${escapeHtml(it.date||'')}</span>
            </span>
            <span class="pwj-chev">${chev}</span>
          </button>
          ${on ? `<div class="pwj-item-body">${escapeHtml(it.body||'').replace(/\n/g,'<br/>')}</div>` : ''}
        </div>`;
      }).join('')}
    </div>

    <div class="pwj-card">
      <div class="pwj-head">
        <span class="pwj-badge my">🙏 나의 기도제목</span>
        <span class="pwj-src">내 기기에만 저장</span>
      </div>
      <div class="myp-row">
        <input type="text" id="mypInput" placeholder="기도제목을 적고 추가를 누르세요" maxlength="200" onkeydown="if(event.key==='Enter')addMyPrayerItem()"/>
        <button class="myp-add" onclick="addMyPrayerItem()">추가</button>
      </div>
      ${my.length
        ? my.map(function(m){ return `<div class="myp-item"><span class="myp-text">${escapeHtml(m.text)}</span><button class="myp-del" onclick="delMyPrayerItem('${m.id}')" aria-label="삭제">×</button></div>`; }).join('')
        : '<div class="myp-empty">아직 기도제목이 없어요. 첫 기도제목을 적어 보세요.</div>'}
    </div>`;
}

/* ── 기존 중보기도 화면 (함께 탭 내부) ───────────────────────── */
async function renderPrayBody(){
  const view = document.getElementById('togetherContent');
  if(!view) return;
  view.innerHTML = `
    <div id="pwjSection">${renderPwjSection()}</div>
    <div id="trackPanel"></div>
    <div class="track-divider">함께 올려드리는 기도</div>
    <div class="pray-header">
      <div class="pray-h-title">중보기도 나눔</div>

      <div class="pray-counts" id="prayCounts">
        <div class="pray-count-card"><div class="pcc-num">···</div><div class="pcc-lbl">전체</div></div>
        <div class="pray-count-card"><div class="pcc-num">···</div><div class="pcc-lbl">긴급</div></div>
        <div class="pray-count-card"><div class="pcc-num">···</div><div class="pcc-lbl">내 중보</div></div>
        <div class="pray-count-card"><div class="pcc-num">···</div><div class="pcc-lbl">공동체</div></div>
      </div>
    </div>
    <div id="urgentSection"></div>
    <div id="prayList">
      ${Array.from({length:3}).map(()=>`<div style="margin:0 16px 10px"><div class="skeleton" style="height:140px;border-radius:16px"></div></div>`).join('')}
    </div>
  `;

  renderTrackPanel();

  const [counts, prayers, urgentAll] = await Promise.all([
    api.getPrayerCounts(),
    api.listPrayers(state.prayerScope),
    api.listPrayers('urgent'),
  ]);

  // v1.6 — 중보기도 화면을 열면 긴급 기도를 '확인함' 처리 → 홈 버블 숫자 해제
  try{ _write(STORAGE_KEYS.urgentSeen, urgentAll.map(p=>p.id)); }catch(e){}

  document.getElementById('prayCounts').innerHTML = `
    <div class="pray-count-card"><div class="pcc-num">${counts.total}</div><div class="pcc-lbl">전체</div></div>
    <div class="pray-count-card"><div class="pcc-num" style="color:#A45A3F">${counts.urgent}</div><div class="pcc-lbl">긴급</div></div>
    <div class="pray-count-card"><div class="pcc-num" style="color:var(--sage)">${counts.myPrayed}</div><div class="pcc-lbl">내 중보</div></div>
    <div class="pray-count-card"><div class="pcc-num">${counts.community}</div><div class="pcc-lbl">공동체</div></div>
  `;

  // 긴급 기도 전용 상단 섹션 — 필터와 무관하게 항상 노출(긴급 탭 제외)
  const showUrgentSec = urgentAll.length>0 && state.prayerScope!=='urgent';
  const usEl = document.getElementById('urgentSection');
  if(usEl){
    usEl.innerHTML = showUrgentSec ? `
      <div class="urgent-section">
        <div class="urgent-sec-head">
          <span class="urgent-sec-title">🔥 긴급 화살기도 요청</span>
          <span class="urgent-sec-count">${urgentAll.length}건</span>
        </div>
        ${urgentAll.map(p=>prayerCardHTML(p)).join('')}
      </div>` : '';
  }

  // 전체 탭에서는 긴급 항목을 상단 섹션으로 분리하여 명단에서 제외
  const mainPrayers = state.prayerScope==='all' ? prayers.filter(p=>!p.urgent) : prayers;

  if(mainPrayers.length===0){
    document.getElementById('prayList').innerHTML = showUrgentSec ? '' : `
      <div style="margin:24px 16px;padding:32px 20px;text-align:center;color:var(--ink-3);background:var(--bg-card);border:1px solid var(--line);border-radius:16px">
        <p style="font-size:0.8125rem;line-height:1.7">이 영역의 기도제목이 아직 없습니다.<br/>+ 버튼으로 첫 번째 기도제목을 나눠 보세요.</p>
      </div>
    `;
    return;
  }

  document.getElementById('prayList').innerHTML = mainPrayers.map(p=>prayerCardHTML(p)).join('');
}

function prayerCardHTML(p){
  return `
    <div class="prayer-card ${p.urgent?'urgent':(p.prayed?'prayed':'')}">
      <div class="pcard-head">
        <div class="pcard-who">
          <div class="pcard-avatar">${p.avatar}</div>
          <div>
            <div class="pcard-name">${p.who}</div>
            <div class="pcard-time">${formatRelTime(p.time)}</div>
          </div>
        </div>
        <span class="pcard-scope ${p.scope}">${
          p.urgent?'🔥 긴급':
          p.scope==='church'?'교회':
          p.scope==='zone'?(p.district||tierLabel('zone')||'교구'):
          p.scope==='grove'?(p.grove||tierLabel('grove')||'초원'):
          p.scope==='cell'?(p.cell||tierLabel('cell')||'목장'):
          p.scope==='team'?(p.team||tierLabel('team')||'팀'):
          p.scope==='committee'?(p.committee||'위원회'):
          '나'
        }</span>
      </div>
      <div class="pcard-body">${escapeHtml(p.body)}</div>
      <div class="pcard-actions">
        <div class="pcard-meta">${p.count}명 함께 기도 중</div>
        <button class="pcard-pray-btn ${p.prayed?'on':''}" onclick="togglePrayed(${p.id})">
          ${p.prayed
            ? `<svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/></svg> 기도했어요`
            : `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/></svg> 함께 기도하기`
          }
        </button>
      </div>
    </div>
  `;
}

function setPrayerScope(s){

}

async function togglePrayed(id){

async function submitPrayer(){
  const who = document.getElementById('wf-who').value.trim() || '익명의 성도';
  const scope = document.querySelector('input[name="wf-scope"]:checked').value;
  const urgent = document.getElementById('wf-urgent').checked;
  const body = document.getElementById('wf-body').value.trim();
  if(!body){ toast('기도 내용을 적어 주세요'); return; }
  await api.createPrayer({ scope, who, body, urgent, committee:null });
  closeModal();
  toast('기도제목이 공유되었습니다 🙏');
  state.prayerScope = scope==='self' ? 'self' : 'all';
  renderPray();
}

async function submitColumnForm(){
  const title=(document.getElementById('cs-title').value||'').trim();
  const body=(document.getElementById('cs-body').value||'').trim();
  const author=(document.getElementById('cs-author').value||'').trim();
  if(!title){ toast('제목을 입력해 주세요'); return; }
  if(!body){ toast('본문을 입력해 주세요'); return; }
  if(!author){ toast('작성자 이름을 입력해 주세요'); return; }
  const roleSel = document.getElementById('cs-role').value;
  await api.submitColumn({
    title, body, author,
    category: document.getElementById('cs-cat').value,
    role: roleSel,
    church: (document.getElementById('cs-church').value||'').trim()
  });
  closeModal();
  toast(roleSel==='담임목사'
    ? '우리 교회 성도에게 공개되었습니다. 검수 승인 시 전체 게시됩니다 ✍️'

  renderColumn();
}

async function rejectSubmission(id){

    </div>
    ${renderFamilyWorshipSection(year, month)}
  `;

  const prog = await api.getMonthProgress(year, month);
  const today = state.currentDate;
  const todayKey = formatDateKey(today);

  // 통계
  const dayKeys = Object.keys(prog);
  const completed = dayKeys.filter(k=>prog[k].total===5).length;
  const started = dayKeys.filter(k=>prog[k].total>0).length;
  const avgStage = started ? (dayKeys.reduce((s,k)=>s+prog[k].total,0)/started).toFixed(1) : '0';

  document.getElementById('calStats').innerHTML = `
    <div class="cal-stat-card"><div class="cal-stat-num">${started}</div><div class="cal-stat-lbl">묵상한 날</div></div>
    <div class="cal-stat-card"><div class="cal-stat-num">${completed}</div><div class="cal-stat-lbl">5단계 완주</div></div>
    <div class="cal-stat-card"><div class="cal-stat-num">${avgStage}</div><div class="cal-stat-lbl">평균 단계</div></div>
  `;

  // 그리드
  const firstDay = new Date(year, month-1, 1);
  const lastDay = new Date(year, month, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const prevMonthLast = new Date(year, month-1, 0).getDate();

  const cells = [];
  // 앞 빈칸 (이전 달)
  for(let i=startDow-1; i>=0; i--){
    cells.push({ d:prevMonthLast - i, outside:true });
  }
  // 현재 달
  for(let d=1; d<=daysInMonth; d++){
    const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const p = prog[key];
    cells.push({ d, key, prog:p, dow:new Date(year, month-1, d).getDay() });
  }
  // 뒤 빈칸
  while(cells.length % 7 !== 0){
    cells.push({ d:cells.length - (startDow + daysInMonth) + 1, outside:true });
  }

  document.getElementById('calGrid').innerHTML = `

      <div class="cal-dow">금</div>
      <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid">
      ${cells.map(function(c){
        if(c.outside){
          return '<div class="cal-cell outside"><div class="cal-cell-inner"><span>'+c.d+'</span><div class="cal-dots"><span class="ct"></span><span class="ct"></span><span class="ct"></span><span class="ct"></span></div></div></div>';
        }
        var isToday = c.key===todayKey;
        var isSun = c.dow===0;
        var p = c.prog;
        var total = p ? p.total : 0;
        var cls = '';
        if(isToday) cls = 'today';
        else if(total>0) cls = 'complete';   /* v1.6 — 하나라도 저장하면 '묵상한 날' */
        if(isSun && !isToday && !cls) cls = 'sunday';
        var dots = '';
        for(var i=1;i<=4;i++){
          dots += '<span class="ct '+(p && p['s'+i]===1?'on':'')+'"></span>';
        }
        return '<div class="cal-cell '+cls+'" onclick="goToDay(\''+c.key+'\')"><div class="cal-cell-inner"><span>'+c.d+'</span><div class="cal-dots">'+dots+'</div></div></div>';
      }).join('')}
    </div>
  `;
}

/* ============================================================================
   애플풍 스크롤 등장 애니메이션 엔진
   - IntersectionObserver 로 화면에 들어오는 블록을 부드럽게 떠오르게 함
   - MutationObserver 로 각 화면이 다시 그려질 때마다 자동으로 재적용
   ============================================================================ */
var _revealIO = null;

function _collectRevealTargets(view){
  // 화면(view)의 최상위 블록들을 대상으로 하되,
  // 묵상 4단계 폼(.lectio-wrap)은 그 안의 단계 박스를 개별 애니메이션한다.
  var out = [];
  Array.prototype.forEach.call(view.children, function(child){
    if(child.classList && child.classList.contains('lectio-wrap')){
      Array.prototype.forEach.call(child.children, function(c){ out.push(c); });
    }else{
      out.push(child);
    }
  });
  return out;
}

function applyReveal(view){
  if(!_revealIO || !view) return;
  var targets = _collectRevealTargets(view);
  targets.forEach(function(el, i){
    if(!el || el.nodeType !== 1) return;
    if(el.classList.contains('skeleton')) return;     // 스켈레톤은 제외
    if(el.dataset && el.dataset.reveal) return;        // 이미 처리됨
    if(el.querySelector && el.querySelector('.skeleton')) return; // 로딩중 블록 제외
    el.dataset.reveal = '1';
    el.classList.add('reveal');
    el.style.transitionDelay = Math.min(i * 55, 280) + 'ms';
    _revealIO.observe(el);
  });
}

function initRevealEngine(){
  // 기능 미지원 또는 모션 최소화 선호 시: 애니메이션 비활성 (콘텐츠는 그대로 노출)
  if(!('IntersectionObserver' in window)) return;
  try{
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  }catch(e){}

  document.documentElement.classList.add('js-reveal');

  var container = document.getElementById('viewContainer');
  _revealIO = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('reveal-in');
        e.target.style.transitionDelay = '';   // 1회성 — 지연 초기화
        _revealIO.unobserve(e.target);
      }
    });
  }, { root: container, rootMargin: '0px 0px -6% 0px', threshold: 0.05 });

  // 각 화면이 새로 그려질 때마다(innerHTML 교체 → childList 변경) 재적용
  document.querySelectorAll('.view').forEach(function(view){
    var mo = new MutationObserver(function(){ applyReveal(view); });
    mo.observe(view, { childList: true });
    applyReveal(view);
  });
}

function onDistrictChange(){
  const sel = document.getElementById('pf-district');
  const dist = ORG_DATA.districts.find(function(d){ return d.name===sel.value; });
  const groveSel = document.getElementById('pf-grove');
  const cellSel  = document.getElementById('pf-cell');
  if(!dist){
    groveSel.innerHTML = '<option value="">교구를 먼저 선택</option>';
    groveSel.disabled = true;
    cellSel.innerHTML = '<option value="">초원을 먼저 선택</option>';
    cellSel.disabled = true;
    return;
  }
  if(!dist.groves.length){
    groveSel.innerHTML = '<option value="">초원 정보 준비 중</option>';
    groveSel.disabled = true;
    cellSel.innerHTML = '<option value="">목장 정보 준비 중</option>';
    cellSel.disabled = true;
    return;
  }
  groveSel.disabled = false;
  groveSel.innerHTML = '<option value="">선택해 주세요</option>' + dist.groves.map(function(g){
    return '<option value="'+escapeHtml(g.name)+'">'+escapeHtml(g.name)+'</option>';
  }).join('');

function onGroveChange(){

  const gsel = document.getElementById('pf-grove');
  const cellSel = document.getElementById('pf-cell');
  const dist = ORG_DATA.districts.find(function(d){ return d.name===dsel.value; });

  if(!grove){
    cellSel.innerHTML = '<option value="">초원을 먼저 선택</option>';
    cellSel.disabled = true;
    return;

  cellSel.disabled = false;
  cellSel.innerHTML = '<option value="">선택해 주세요</option>' + grove.cells.map(function(c){
    return '<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>';
  }).join('');

/* ─────────────────────────────────────────────────────────────
   주소 검색 — 카카오(다음) 우편번호 서비스
   · 주소/우편번호 입력란 터치 → 검색 레이어 → 도로명/지번 검색
   · 항목 선택 시 우편번호+기본주소 자동 입력 후 상세주소로 포커스
   · 스크립트 로드 실패(오프라인 등) 시 직접 입력으로 폴백
   ───────────────────────────────────────────────────────────── */
var _postcodeLoading = null;
function _loadPostcodeScript(){
  if(window.daum && window.daum.Postcode) return Promise.resolve();
  if(_postcodeLoading) return _postcodeLoading;
  _postcodeLoading = new Promise(function(resolve, reject){
    var sc = document.createElement('script');
    sc.src = 'https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
    sc.onload = function(){ resolve(); };
    sc.onerror = function(){ _postcodeLoading = null; reject(new Error('postcode load fail')); };
    document.head.appendChild(sc);
  });
  return _postcodeLoading;
}
function _ensureAddrLayer(){
  var layer = document.getElementById('addrLayer');
  if(layer) return layer;
  layer = document.createElement('div');
  layer.id = 'addrLayer';
  layer.className = 'addr-layer';
  var fileNote = (location.protocol === 'file:')
    ? '<div class="addr-note">로컬 파일로 열면 브라우저 보안 정책 때문에 검색 결과 선택이 전달되지 않을 수 있습니다. 배포된 앱(https)에서는 정상 동작하며, 여기서는 아래 \'직접 입력\'을 이용해 주세요.</div>'
    : '';
  layer.innerHTML = '<div class="addr-box">' +
    '<div class="addr-head"><span class="ttl">주소 검색</span>' +
    '<span style="display:flex;gap:6px;align-items:center">' +
    '<button type="button" class="addr-manual" onclick="useManualAddress()">직접 입력</button>' +
    '<button type="button" class="addr-close" onclick="closeAddressSearch()">×</button></span></div>' +
    fileNote +
    '<div class="addr-embed" id="addrEmbed"></div></div>';
  layer.addEventListener('click', function(e){ if(e.target === layer) closeAddressSearch(); });
  document.body.appendChild(layer);
  return layer;
}
function openAddressSearch(){
  var layer = _ensureAddrLayer();
  var embed = document.getElementById('addrEmbed');
  layer.classList.add('show');
  _loadPostcodeScript().then(function(){
    embed.innerHTML = '';
    new daum.Postcode({
      oncomplete: function(data){
        var addr = data.userSelectedType === 'J' ? data.jibunAddress : data.roadAddress;
        if(!addr) addr = data.roadAddress || data.jibunAddress || data.address || '';
        var extra = '';
        if(data.userSelectedType !== 'J'){
          if(data.bname && /[동|로|가]$/.test(data.bname)) extra += data.bname;
          if(data.buildingName && data.apartment === 'Y') extra += (extra ? ', ' : '') + data.buildingName;
          if(extra) addr += ' (' + extra + ')';
        }
        var zipEl = document.getElementById('pf-zip');
        var addrEl = document.getElementById('pf-address');
        if(zipEl) zipEl.value = data.zonecode || '';
        if(addrEl) addrEl.value = addr;
        closeAddressSearch();
        var detailEl = document.getElementById('pf-address-detail');
        if(detailEl){ detailEl.focus(); }
      },
      onclose: function(state){ if(state === 'FORCE_CLOSE') closeAddressSearch(); }
    }).embed(embed, { autoClose: false });
  }).catch(function(){
    // 오프라인/차단 폴백 — 직접 입력 허용
    useManualAddress();
    toast('주소 검색을 불러올 수 없어 직접 입력으로 전환합니다');
  });
}
function useManualAddress(){
  closeAddressSearch();
  var zipEl = document.getElementById('pf-zip');
  var addrEl = document.getElementById('pf-address');
  if(zipEl){ zipEl.removeAttribute('readonly'); zipEl.removeAttribute('onclick'); zipEl.onclick=null; zipEl.placeholder = '우편번호 직접 입력'; }
  if(addrEl){ addrEl.removeAttribute('readonly'); addrEl.removeAttribute('onclick'); addrEl.onclick=null; addrEl.placeholder = '주소를 직접 입력해 주세요'; addrEl.focus(); }
}
function closeAddressSearch(){
  var layer = document.getElementById('addrLayer');
  if(layer){ layer.classList.remove('show'); var e=document.getElementById('addrEmbed'); if(e) e.innerHTML=''; }
}

async function saveProfileEditor(){
  const nickname = document.getElementById('pf-nickname').value.trim();
  const district = document.getElementById('pf-district').value;
  const grove    = document.getElementById('pf-grove').value;

  const phone   = document.getElementById('pf-phone').value.trim();
  const zip     = document.getElementById('pf-zip').value.trim();

/* ============================================================================
   카톡 인앱 브라우저 감지 + 외부 브라우저 유도
   ============================================================================ */
function isKakaoInApp(){
  try{
    var ua = (navigator && navigator.userAgent) ? navigator.userAgent : '';
    return /KAKAOTALK/i.test(ua);
  }catch(e){ return false; }
}

function openExternal(){
  try{
    var url = location.href;
    var ua = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    if(isAndroid){
      // 카톡 안드로이드 인앱 → 크롬 인텐트
      location.href = 'intent://' + url.replace(/^https?:\/\//,'') + '#Intent;scheme=https;package=com.android.chrome;end';
    }else{
      // 카톡 iOS 인앱 → 사파리로 빠지는 트릭 (사용자가 우측 상단 ··· → Safari로 열기를 누르도록 안내)
      alert('우측 상단 ··· 메뉴 → "Safari로 열기"를 선택해 주세요.\n\n(또는 URL을 길게 눌러 복사한 뒤 Safari 주소창에 붙여넣기)');
    }
  }catch(e){
    alert('URL을 복사한 뒤 Safari/Chrome에서 열어 주세요.');
  }
}

function dismissKakaoBanner(){
  var b = document.getElementById('kakaoBanner');
  if(b) b.className = 'kakao-banner';
}

function checkBrowser(){
  if(!isKakaoInApp()) return;          // 카톡 인앱이 아니면 배너 없음
  var b   = document.getElementById('kakaoBanner');
  var msg = document.getElementById('kakaoBannerMsg');
  if(!b || !msg) return;

  if(safeStore.available){
    // 카톡 인앱에서도 정상 동작 → 안심 안내만 (닫기 가능)
    msg.textContent = '카카오톡에서 바로 열렸습니다. 그대로 이용하셔도 됩니다.';
    b.className = 'kakao-banner show';
    // 정상 동작 시 5초 후 자동으로 닫아 화면을 가리지 않음
    setTimeout(dismissKakaoBanner, 5000);
  }else{
    // 저장소가 막힌 환경 → 기록 유지 안내
    msg.textContent = '이 화면에서도 사용 가능하지만, 작성한 기록을 안전하게 저장하려면 외부 브라우저를 권장합니다.';
    b.className = 'kakao-banner show';
  }
}

/* ============================================================================
   초기화 — 카톡 인앱 브라우저에서도 동작하도록 견고화
   ============================================================================ */
function init(){
  migratePrayersSeed();
  checkBrowser();
  try{ bindEdgeBack(); }catch(e){}
  try{ initRevealEngine(); }catch(e){}
  showSync(true);
  // API 호출이 실패해도 UI는 무조건 렌더
  var done = 0, total = 2;
  function step(){
    done++;
    if(done >= total){
      try{ applyFontSize(); }catch(e){}
      try{ showSync(false); }catch(e){}
      try{ render(); }catch(e){
        // render 자체가 실패해도 기본 UI는 보이도록 폴백
        try{
          var v = document.getElementById('view-today');
          if(v) v.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--ink-3)"><p style="font-size:0.875rem;line-height:1.7">화면을 그리는 중 문제가 발생했습니다.<br/>외부 브라우저(Safari/Chrome)에서 열어 주세요.</p><button class="btn" style="margin-top:14px" onclick="openExternal()">외부 브라우저로 열기</button></div>';
        }catch(e2){}
      }
    }
  }
  try{
    api.getUser().then(function(u){ state.user = u; step(); }, function(){ step(); });
  }catch(e){ step(); }
  try{
    api.getPrefs().then(function(p){ state.fontSize = (p && p.fontSize) || 'm'; step(); }, function(){ step(); });
  }catch(e){ step(); }
}

/* DOMContentLoaded가 이미 발생한 뒤 스크립트가 평가될 수도 있으므로 안전하게 분기 */
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
}else{
  init();
}
