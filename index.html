<style id="responsive-v096">
/* ════════════════════════════════════════════════════════════════
   v0.96 — 웹반응형: 폰 목업 제거 → 모바일 풀블리드 / 데스크톱 좌측 사이드바
   (이 블록은 모든 CSS 뒤에 위치하여 기존 480px 폰 프레임 규칙을 덮어씀)
   ════════════════════════════════════════════════════════════════ */

/* 데스크톱용 사이드바 브랜드 — 기본 숨김(모바일 하단탭) */
.tabbar-brand{ display:none; }

/* ── 480px↑ : 폰 목업 프레임 제거 + 풀블리드(고정 뷰포트, 하단 탭바 고정) ──
   주의: height:auto / overflow:visible 로 두면 페이지 전체가 스크롤되어
   하단 탭바가 함께 밀려 올라간다. 뷰포트 높이를 고정하고 본문만 내부
   스크롤시켜 상단바·하단 탭바가 항상 떠 있도록 한다. */
@media (min-width:480px){
  html, body{ height:100%; height:100dvh; min-height:0; overflow:hidden; background:var(--bg); }
  body{ padding:0; align-items:stretch; justify-content:flex-start; }
  .device-shell{
    width:100%; max-width:none; height:100vh; height:100dvh; min-height:0;
    flex:1; border:none; border-radius:0; box-shadow:none; overflow:hidden;
  }
  .write-btn{ right:28px; bottom:28px; }
}

/* ── 880px↑ : 좌측 사이드바 웹앱 레이아웃 + 중앙 독서폭 ── */
@media (min-width:880px){
  html, body{ height:100vh; height:100dvh; overflow:hidden; background:var(--paper-2, var(--bg-soft)); }
  body{ padding:0; }
  .device-shell{
    width:100%; max-width:none; height:100vh; height:100dvh; min-height:0;
    overflow:hidden; background:var(--bg);
    display:grid;
    grid-template-columns:252px minmax(0,1fr);
    grid-template-rows:auto minmax(0,1fr);
    grid-template-areas:"side appbar" "side content";
  }

  /* 상단 앱바 → 콘텐츠 열의 가로 헤더 */
  .appbar{
    grid-area:appbar; border-bottom:1px solid var(--line);
    padding:16px 32px; background:var(--bg); justify-content:flex-end;
  }
  .appbar .brand{ display:none; }   /* 사이드바에 브랜드 존재 */

  /* 콘텐츠 — 중앙 정렬 + 독서폭 */
  .view-container{ grid-area:content; display:flex; justify-content:center; }
  .view-container > .view{ width:100%; }
  .view-container > .view.active{ width:100%; max-width:720px; }

  /* 하단 탭바 → 좌측 세로 사이드바 */
  .tabbar{
    grid-area:side; flex-direction:column; align-items:stretch;
    justify-content:flex-start; gap:4px;
    border-top:none; border-right:1px solid var(--line);
    padding:20px 14px; box-shadow:none; background:var(--bg-card);
    overflow-y:auto;
  }
  .tabbar-brand{
    display:flex; align-items:center; gap:9px;
    padding:6px 12px 18px; cursor:pointer; margin-bottom:6px;
    border-bottom:1px solid var(--line-soft);
  }
  .tabbar-brand .brand-mark{ width:30px; height:30px; }
  .tabbar-brand .tb-name{
    font-family:var(--serif, var(--sans)); font-weight:700; font-size:17px;
    color:var(--ink); letter-spacing:-0.4px;
  }
  .tab-btn{
    flex:none; flex-direction:row; justify-content:flex-start;
    gap:13px; padding:12px 14px; border-radius:12px; color:var(--ink-2);
    transition:background .15s, color .15s;
  }
  .tab-btn svg{ width:21px; height:21px; }
  .tab-btn .tab-label{ font-size:14px; font-weight:600; letter-spacing:-0.2px; }
  .tab-btn:hover{ background:var(--bg-soft); }
  .tab-btn.active{ background:var(--sage-pale); }
  .tab-btn.active .tab-label{ font-weight:700; }

  /* FAB — 콘텐츠 우하단 고정 */
  .write-btn{ right:40px; bottom:40px; }

  /* 모달 — 화면 중앙 카드 */
  .modal-overlay{ align-items:center; }
  .modal-sheet{
    max-width:560px; border-radius:22px;
    padding:8px 0 22px; max-height:86vh;
    transform:translateY(16px) scale(.985);
    box-shadow:0 24px 70px rgba(26,31,29,.28);
  }
  .modal-overlay.show .modal-sheet{ transform:translateY(0) scale(1); }
  .modal-handle{ display:none; }

  /* 카카오 안내 배너 — 데스크톱 비노출 */
  .kakao-banner{ display:none !important; }
}

/* ── 1180px↑ : 더 넓은 화면에서 사이드바·여백 강화 ── */
@media (min-width:1180px){
  .device-shell{ grid-template-columns:268px minmax(0,1fr); }
  .view-container > .view.active{ max-width:760px; }
  .appbar{ padding:18px 48px; }
}
</style>

/* ============================================================================
   가짜 API 레이어 — localStorage 백업, latency 시뮬레이션
   실제 서버 연동 시: fetch('/api/...') 로 교체만 하면 됨
   ============================================================================ */

/* ── 안전 저장소 (safeStore) ──────────────────────────────────────────
   아이폰 카카오톡 인앱 브라우저, 사파리 프라이빗 모드 등 일부 환경에서는
   localStorage 접근 시 예외가 발생하거나 막혀 있다. 이런 환경에서도 앱이
   "그냥 열려서 동작"하도록, localStorage가 막히면 메모리 저장소로 자동 대체한다.
   (메모리 저장소는 세션 동안만 유지되며, 새로고침하면 초기화된다.) */
var __memStore = {};
var __lsOk = (function(){
  try{
    var k = '__mh_test__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
    return true;
  }catch(e){ return false; }
})();
var safeStore = {
  available: __lsOk,
  getItem:function(k){
    if(__lsOk){ try{ return window.localStorage.getItem(k); }catch(e){} }
    return (k in __memStore) ? __memStore[k] : null;
  },
  setItem:function(k,v){
    if(__lsOk){ try{ window.localStorage.setItem(k, v); return; }catch(e){ /* 용량 초과 등 → 메모리로 폴백 */ } }
    __memStore[k] = String(v);
  },
  removeItem:function(k){
    if(__lsOk){ try{ window.localStorage.removeItem(k); }catch(e){} }
    delete __memStore[k];
  }
};

// 시드 스키마/내용 호환을 위해 버전을 관리한다.
// 변경 시 bump → 다음 로드에 migratePrayersSeed()가 누락 ID/필드를 보강.
const PRAYERS_SEED_VERSION = 2;

function migratePrayersSeed(){
  try{
    const raw = safeStore.getItem(STORAGE_KEYS.prayers);
    if(!raw) return; // 첫 로드 — 자연스럽게 새 시드가 기록됨
    let stored;
    try{ stored = JSON.parse(raw); }catch(e){ return; }
    if(!Array.isArray(stored)) return;
    const ver = parseInt(safeStore.getItem(STORAGE_KEYS.prayersSeedVersion)||'1', 10);
    if(ver >= PRAYERS_SEED_VERSION) return;

    const byId = {};
    stored.forEach(p=>{ if(p && p.id != null) byId[p.id] = p; });
    const seedIds = {};
    const merged = PRAYERS_SEED.map(seed=>{
      seedIds[seed.id] = true;
      const existing = byId[seed.id];
      if(!existing) return Object.assign({}, seed);
      const keepUrgent = !!existing.urgent;
      const origScope = existing._origScope || (keepUrgent ? seed.scope : null);
      const scope = keepUrgent ? 'urgent' : seed.scope;
      const out = Object.assign({}, seed, {
        urgent: keepUrgent,
        scope,
        count: (typeof existing.count === 'number') ? existing.count : seed.count
      });
      if(origScope) out._origScope = origScope;
      return out;
    });
    stored.forEach(p=>{
      if(p && p.id != null && !seedIds[p.id]) merged.push(p);
    });
    safeStore.setItem(STORAGE_KEYS.prayers, JSON.stringify(merged));
    safeStore.setItem(STORAGE_KEYS.prayersSeedVersion, String(PRAYERS_SEED_VERSION));
  }catch(e){}
}

function _delay(min, max){
  const d = min + Math.random()*(max-min);
  return new Promise(r=>setTimeout(r,d));
}

function _read(key, fallback){
  try{
    const v = safeStore.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
function _write(key, val){
  try{ safeStore.setItem(key, JSON.stringify(val)); }catch(e){}
}

/* 사용자 기본 스키마 — 누락된 필드를 자동 보강 */
function _normalizeUser(u){
  if(!u) return u;
  if(!('nickname' in u))    u.nickname = '';
  if(!('district' in u))    u.district = '';
  if(!('grove' in u))       u.grove = '';
  if(!('cell' in u))        u.cell = '';
  if(!('team' in u))        u.team = '';
  if(!Array.isArray(u.committees)) u.committees = [];
  if(!('phone' in u))       u.phone = '';
  if(!('address' in u))     u.address = '';
  if(!('addressDetail' in u)) u.addressDetail = '';
  if(!('zip' in u))         u.zip = '';
  if(!('subscribed' in u))  u.subscribed = false;     // 책자 구독자(=프리미엄)
  if(!('subscribeSince' in u)) u.subscribeSince = 0;
  return u;
}

  // 중보기도 — 소속(교구/초원/목장/위원회) 기반 가시성 필터
  async listPrayers(scope='all'){
    await _delay(100,250);
    const stored = _read(STORAGE_KEYS.prayers, null);
    const base = stored || PRAYERS_SEED;
    if(!stored){
      _write(STORAGE_KEYS.prayers, PRAYERS_SEED);
      _write(STORAGE_KEYS.prayersSeedVersion, PRAYERS_SEED_VERSION);
    }
    // 관리자가 숨김 처리한 기도 제외
    const hidden = _read(STORAGE_KEYS.prayersHidden, []);
    const visible = base.filter(p=>!hidden.includes(p.id));

    // 사용자 소속 확인
    const user = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const isOwn = (p) => user && p.who && (p.who===user.name || p.who===user.nickname);

    // 1) 가시성 필터 — 사용자 소속이 일치하는 항목만
    const accessFiltered = visible.filter(p=>{
      // 교회 전체 공지 / 긴급 — 모두 노출
      if(p.scope==='church') return true;
      if(p.urgent) return true;
      // 내가 올린 기도제목은 항상 보임
      if(isOwn(p)) return true;
      // 교구 단위 — 같은 교구 소속만
      if(p.scope==='zone') return !!(user.district && p.district===user.district);
      // 초원(중간 단위) — 같은 초원 소속만
      if(p.scope==='grove') return !!(user.grove && p.grove===user.grove);
      // 목장 단위 — 같은 목장 소속만
      if(p.scope==='cell') return !!(user.cell && p.cell===user.cell);
      // 최소 단위(팀/순) — 같은 단위 소속만
      if(p.scope==='team') return !!(user.team && p.team===user.team);
      // 위원회 단위 — 해당 위원회 위원만
      if(p.scope==='committee') return !!(user.committees && user.committees.indexOf(p.committee)>=0);
      // 본인용 메모 — 자기 자신만
      if(p.scope==='self') return isOwn(p);
      return false;
    });

    // 2) 사용자가 선택한 탭(scope)으로 추가 필터
    const filtered = scope==='all' ? accessFiltered : accessFiltered.filter(p=>{
      if(scope==='self') return isOwn(p);
      if(scope==='urgent') return p.urgent;
      return p.scope===scope;
    });

    // 시간순 정렬 — 최근 먼저, 단 urgent가 항상 위
    filtered.sort((a,b)=>{
      if(a.urgent && !b.urgent) return -1;
      if(!a.urgent && b.urgent) return 1;
      return b.time - a.time;
    });
    const prayedIds = _read(STORAGE_KEYS.prayed, []);
    return filtered.map(p=>({ ...p, prayed:prayedIds.includes(p.id) }));
  },

  /* ── 기도 트래킹 ─────────────────────────────────────────────
     개인: prayerLog {YYYY-MM-DD: 분}
     공동체(7만시간): movement {totalMin, byDate} — 시드로 시작 */
  _todayKey(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  },
  _getMovement(){
    let m = _read(STORAGE_KEYS.movement, null);
    // districts 필드가 없으면(구버전) 교구별 시드로 재구성
    if(!m || !m.districts){
      const tk = this._todayKey();
      const districts = {};
      let total = 0;
      ORG_DATA.districts.forEach(d=>{ const v = _seedDistrictMin(d.name); districts[d.name] = v; total += v; });
      m = {
        totalMin: total,
        byDate: (m && m.byDate) || { [tk]: MOVEMENT_SEED_TODAY_MIN },
        districts,
      };
      _write(STORAGE_KEYS.movement, m);
    }
    return m;
  },

  async getPrayerTracking(){
    await _delay(40,100);
    const log = _read(STORAGE_KEYS.prayerLog, {});
    const tk = this._todayKey();
    const now = new Date();
    const ym = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

    // 이번 달 누적
    let monthMin = 0, totalMin = 0;
    Object.keys(log).forEach(k=>{
      const v = log[k]||0;
      totalMin += v;
      if(k.startsWith(ym)) monthMin += v;
    });

    // 연속 일수(오늘부터 거슬러 기도한 날)
    let streak = 0;
    const cur = new Date();
    for(;;){
      const k = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
      if((log[k]||0) > 0){ streak++; cur.setDate(cur.getDate()-1); }
      else break;
    }

    const mv = this._getMovement();
    const moveHours = Math.floor(mv.totalMin/60);
    const movePct = Math.min(100, mv.totalMin/60 / MOVEMENT_GOAL_HOURS * 100);
    const todayMoveHours = Math.floor((mv.byDate[tk]||0)/60);

    // 내 교구 누적
    const u = _read(STORAGE_KEYS.user, null) || {};
    const myDistrict = u.district || '';
    const myDistrictMin = myDistrict ? (mv.districts[myDistrict]||0) : 0;
    // 전체 중 내 교구 비중, 교구 순위
    const ranked = Object.keys(mv.districts).map(n=>({name:n, min:mv.districts[n]}))
                     .sort((a,b)=>b.min-a.min);
    const myRank = myDistrict ? (ranked.findIndex(r=>r.name===myDistrict)+1) : 0;
    const myShare = (myDistrict && mv.totalMin>0) ? (myDistrictMin/mv.totalMin*100) : 0;

    return {
      todayMin: log[tk]||0,
      monthMin, totalMin, streak,
      moveHours, movePct, goalHours: MOVEMENT_GOAL_HOURS,
      todayMoveHours,
      myDistrict, myDistrictMin, myShare, myRank,
      districtCount: ranked.length,
    };
  },

  async logPrayer(minutes){
    showSync(true);
    await _delay(120,260);
    const tk = this._todayKey();
    const log = _read(STORAGE_KEYS.prayerLog, {});
    log[tk] = (log[tk]||0) + minutes;
    _write(STORAGE_KEYS.prayerLog, log);
    // 공동체(7만시간) + 내 교구에도 합산
    const mv = this._getMovement();
    mv.totalMin += minutes;
    mv.byDate[tk] = (mv.byDate[tk]||0) + minutes;
    const u = _read(STORAGE_KEYS.user, null) || {};
    if(u.district){ mv.districts[u.district] = (mv.districts[u.district]||0) + minutes; }
    _write(STORAGE_KEYS.movement, mv);
    showSync(false);
    return { ok:true, todayMin: log[tk] };
  },

  // 실수로 적립한 기도 취소 (오늘 기록에서 minutes 만큼 차감)
  async unlogPrayer(minutes){
    showSync(true);
    await _delay(120,260);
    const tk = this._todayKey();
    const log = _read(STORAGE_KEYS.prayerLog, {});
    const cur = log[tk]||0;
    const dec = Math.min(minutes, cur);   // 오늘 적립분 이하로만 차감
    if(dec <= 0){ showSync(false); return { ok:false, todayMin:cur }; }
    log[tk] = cur - dec;
    if(log[tk] === 0) delete log[tk];
    _write(STORAGE_KEYS.prayerLog, log);
    const mv = this._getMovement();
    mv.totalMin = Math.max(0, mv.totalMin - dec);
    mv.byDate[tk] = Math.max(0, (mv.byDate[tk]||0) - dec);
    const u = _read(STORAGE_KEYS.user, null) || {};
    if(u.district){ mv.districts[u.district] = Math.max(0, (mv.districts[u.district]||0) - dec); }
    _write(STORAGE_KEYS.movement, mv);
    showSync(false);
    return { ok:true, todayMin: log[tk]||0 };
  },

  async listColumns(){

    // 시드 칼럼에 custom 편집을 덮어쓰고, custom 신규 칼럼은 별도 추가
    const merged = [];

      const override = customAll[c.id];
      if(override && override._deleted) return;
      merged.push(override ? Object.assign({}, c, override) : c);
    });
    Object.keys(customAll).forEach(function(id){

      if(c && !c._deleted && parseInt(id,10) > 1000){

      .map(function(c){
        const s = stateAll[c.id] || {};
        const localComments = s.comments || [];
        const baseComments = c.comments || [];
        return Object.assign({}, c, {
          likes: (c.likes||0) + (s.liked?1:0),
          reads: (c.reads||0) + (s.read?1:0),
          liked: !!s.liked,
          read: !!s.read,
          pendingReview: !!c.draft,
          role: c.role || '담임목사',
          church: c.church || getChurchName(),
          comments: baseComments.concat(localComments),
        });
      });
  },

  /* ── v0.6 목장방 / 소그룹 방 API ───────────────────────────── */
  async listMyRooms(){
    await _delay(60,150);
    const rooms = ensureRooms();
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const posts = _read(STORAGE_KEYS.roomPosts, []);
    const hidden = _read(STORAGE_KEYS.roomPostsHidden, []);
    const mine = rooms.filter(r=>{
      if(r.type==='cell') return u.cell && r.id==='cell_'+u.cell;
      return r.joined;
    });
    return mine.map(r=>{
      const rp = posts.filter(p=>p.roomId===r.id && !hidden.includes(p.id));
      const last = rp.length ? Math.max(...rp.map(p=>p.time)) : 0;
      const fresh = rp.filter(p=>Date.now()-p.time < 86400000).length;
      return { ...r, postCount:rp.length, lastTime:last, freshCount:fresh };
    });
  },

  async getRoom(id){
    await _delay(40,100);
    const rooms = ensureRooms();
    return rooms.find(r=>r.id===id) || null;
  },

  async createRoom({name, desc, emoji}){
    showSync(true);
    await _delay(250,450);
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const rooms = ensureRooms();
    const myName = u.nickname || u.name || '나';
    const room = {
      id:'g_'+Date.now(), type:'group', name, emoji:emoji||'🕊️',
      desc:desc||'', code:_roomCode(), owner:myName,
      members:[myName], joined:true, createdAt:Date.now(),
    };
    rooms.unshift(room);
    _write(STORAGE_KEYS.rooms, rooms);
    showSync(false);
    return room;
  },

  async joinRoom(code){
    showSync(true);
    await _delay(250,450);
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const rooms = ensureRooms();
    const room = rooms.find(r=>(r.code||'').toUpperCase()===(code||'').toUpperCase());
    showSync(false);
    if(!room) return { ok:false, msg:'초대코드와 일치하는 방이 없습니다.' };
    const myName = u.nickname || u.name || '나';
    if(room.joined && room.members.includes(myName)) return { ok:false, msg:'이미 함께하고 있는 방입니다.' };
    room.joined = true;
    if(!room.members.includes(myName)) room.members.push(myName);
    _write(STORAGE_KEYS.rooms, rooms);
    return { ok:true, room };
  },

  async leaveRoom(id){
    showSync(true);
    await _delay(200,350);
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const rooms = ensureRooms();
    const room = rooms.find(r=>r.id===id);
    if(room && room.type==='group'){
      room.joined = false;
      const myName = u.nickname || u.name || '나';
      room.members = room.members.filter(m=>m!==myName);
      _write(STORAGE_KEYS.rooms, rooms);
    }
    showSync(false);
    return { ok:true };
  },

  async listRoomPosts(roomId){
    await _delay(80,200);
    const posts = _read(STORAGE_KEYS.roomPosts, []);
    const hidden = _read(STORAGE_KEYS.roomPostsHidden, []);
    const amens = _read(STORAGE_KEYS.roomAmens, []);
    return posts
      .filter(p=>p.roomId===roomId && !hidden.includes(p.id))
      .sort((a,b)=>b.time-a.time)
      .map(p=>({ ...p, amened:amens.includes(p.id) }));
  },

  async createRoomPost({roomId, kind, body, parts, dateKey}){

    await _delay(250,450);
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const myName = u.nickname || u.name || '성도님';
    const posts = _read(STORAGE_KEYS.roomPosts, []);
    const post = {
      id:'rp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      roomId, kind, who:myName, avatar:myName.charAt(0),
      time:Date.now(), body:body||'', parts:parts||null, dateKey:dateKey||null,
      amens:0, comments:[],
    };
    posts.unshift(post);
    _write(STORAGE_KEYS.roomPosts, posts);
    showSync(false);
    return post;
  },

  async toggleAmen(postId){
    showSync(true);
    await _delay(120,250);
    const posts = _read(STORAGE_KEYS.roomPosts, []);
    const amens = _read(STORAGE_KEYS.roomAmens, []);
    const p = posts.find(x=>x.id===postId);
    if(!p){ showSync(false); return { ok:false }; }
    const on = amens.includes(postId);
    if(on){ amens.splice(amens.indexOf(postId),1); p.amens = Math.max(0,(p.amens||0)-1); }
    else{ amens.push(postId); p.amens = (p.amens||0)+1; }
    _write(STORAGE_KEYS.roomPosts, posts);
    _write(STORAGE_KEYS.roomAmens, amens);
    showSync(false);
    return { ok:true, amened:!on, amens:p.amens };
  },

  async addRoomComment(postId, text){
    showSync(true);
    await _delay(200,350);
    const u = _normalizeUser(_read(STORAGE_KEYS.user, null) || {});
    const posts = _read(STORAGE_KEYS.roomPosts, []);

    _write(STORAGE_KEYS.roomPosts, posts);
    showSync(false);
    return { ok:true };
  },

// ── v0.95 : 모임 단계(Tier) 일반화 — 교회별 모임 크기/단계 설정 ─────────
const GROUP_PRESETS = {
  shepherd: { label:'선한목자교회형', tiers:['교구','초원','목장'] },
  large:    { label:'대형교회형',     tiers:['교구','지역','초원','목장'] },
  parish:   { label:'구역·속회형',    tiers:['교구','구역','속회'] },
  cell2:    { label:'셀교회형',       tiers:['교구','셀'] },
  simple1:  { label:'소형교회형',     tiers:['목장'] },
};
const TIER_KEYS = ['zone','grove','cell','team'];   // 큰 단위 → 작은 단위
function getGroupTiers(){
  const p = getPrefsSync();
  let names = Array.isArray(p.groupTiers) && p.groupTiers.length
      ? p.groupTiers
      : (GROUP_PRESETS[p.groupPreset] ? GROUP_PRESETS[p.groupPreset].tiers : GROUP_PRESETS.shepherd.tiers);
  names = names.slice(0,4).map(n=>(n||'').trim()).filter(Boolean);
  if(!names.length) names = GROUP_PRESETS.shepherd.tiers.slice();
  return names.map((n,i)=>({ key:TIER_KEYS[i], name:n }));
}
function tierLabel(scopeKey){ const t=getGroupTiers().find(x=>x.key===scopeKey); return t?t.name:null; }
function setGroupPreset(id){
  const t = (GROUP_PRESETS[id]?GROUP_PRESETS[id].tiers:GROUP_PRESETS.shepherd.tiers).slice();
  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { groupPreset:id, groupTiers:t }));
  toast(`'${(GROUP_PRESETS[id]&&GROUP_PRESETS[id].label)||id}' 단계 적용`);
}
function setGroupTierCount(n){
  n=Math.max(1,Math.min(4, parseInt(n,10)||1));
  let cur=getGroupTiers().map(t=>t.name);
  const def=['교구','초원','목장','순'];
  while(cur.length<n) cur.push(def[cur.length]||('단계'+(cur.length+1)));
  cur=cur.slice(0,n);
  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { groupPreset:'custom', groupTiers:cur }));
}
function setGroupTierName(i,v){
  let cur=getGroupTiers().map(t=>t.name);
  while(cur.length<=i) cur.push('단계'+(cur.length+1));
  cur[i]=(v||'').trim()||cur[i];
  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { groupPreset:'custom', groupTiers:cur }));
}

let _syncTimer = null;
function showSync(syncing){
  const pill = document.getElementById('syncPill');
  const txt = document.getElementById('syncText');
  if(!pill) return;
  if(syncing){
    pill.classList.add('syncing');
    txt.textContent = '저장 중';
    clearTimeout(_syncTimer);
  }else{
    pill.classList.remove('syncing');
    txt.textContent = '동기화됨';
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(()=>{
      txt.textContent = '동기화됨 · 방금 전';
    }, 3000);
  }
}

function formatDateKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function formatKorDate(d){
  const dows=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${dows[d.getDay()]}요일`;
}
function formatRelTime(ts){
  const diff = (Date.now()-ts)/1000;
  if(diff<60) return '방금 전';
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  const days = Math.floor(diff/86400);
  if(days<7) return days+'일 전';
  const d = new Date(ts);
  return `${d.getMonth()+1}.${d.getDate()}`;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'), 1800);
}

    { main:'중보기도', sub:('함께 기도 '+((ctx.counts && ctx.counts.total)||0)+'건'), dark:'#A8472C', mid:'#D9785A', img:'1502082553048-f009c37129b9', icon:IC.pray, act:"switchTab('pray')" },

function setTodaySelActive(i){
  const el = document.getElementById('todaySel'); if(!el) return;
  const panels = el.querySelectorAll('.tsel-panel');
  i = Math.max(0, Math.min(i, panels.length-1));
  state.todaySel = i;
  panels.forEach(function(p){ p.classList.toggle('active', parseInt(p.dataset.idx,10)===i); });
  const dots = document.getElementById('todaySelDots');
  if(dots) Array.prototype.forEach.call(dots.children, function(d,j){ d.classList.toggle('on', j===i); });
}

function bindTodaySelector(){
  const el = document.getElementById('todaySel'); if(!el) return;
  const panels = Array.prototype.slice.call(el.querySelectorAll('.tsel-panel'));
  panels.forEach(function(p,i){ setTimeout(function(){ p.classList.add('in'); }, 90*i); });
  panels.forEach(function(p){
    p.addEventListener('click', function(){
      if(el._suppress){ el._suppress=false; return; }
      const idx = parseInt(p.dataset.idx,10);
      if(idx!==state.todaySel){ setTodaySelActive(idx); }
      else { const a=(window._todaySel&&window._todaySel.actions[idx]); if(a){ try{ (new Function(a))(); }catch(e){} } }
    });
  });
  let sx=null, sy=null, drag=false;
  function st(x,y){ sx=x; sy=y; drag=true; }
  function en(x,y){
    if(!drag||sx===null){ return; } drag=false;
    const dx=x-sx, dy=y-sy;
    if(Math.abs(dx)>38 && Math.abs(dx)>Math.abs(dy)){
      el._suppress=true;
      setTodaySelActive(dx<0 ? state.todaySel+1 : state.todaySel-1);
      setTimeout(function(){ el._suppress=false; }, 60);
    }
    sx=sy=null;
  }
  el.addEventListener('touchstart', function(e){ const t=e.touches[0]; st(t.clientX,t.clientY); }, {passive:true});
  el.addEventListener('touchend', function(e){ const t=e.changedTouches[0]; en(t.clientX,t.clientY); }, {passive:true});
  el.addEventListener('pointerdown', function(e){ if(e.pointerType==='mouse'){ st(e.clientX,e.clientY); } });
  el.addEventListener('pointerup', function(e){ if(e.pointerType==='mouse'){ en(e.clientX,e.clientY); } });
}

/* ── v0.95 : iOS식 좌측 엣지 스와이프 = 뒤로가기 ─────────────────────── */
function goBack(){
  const modal=document.getElementById('modal');
  if(modal && modal.classList.contains('show')){ closeModal(); return true; }
  const av=document.querySelector('.view.active');
  const id=av?av.id:'';
  const parent={ 'view-column-detail':'column', 'view-room-detail':'pray', 'view-settings':'mypage', 'view-calendar':'today', 'view-more':'mypage', 'view-login':'mypage' };
  if(parent[id]){ switchTab(parent[id]); return true; }
  if(id && id!=='view-today'){ switchTab('today'); return true; }
  return false;
}
function bindEdgeBack(){
  if(window._edgeBackBound) return; window._edgeBackBound=true;
  let sx=null, sy=null, st=0, edge=false;
  document.addEventListener('touchstart', function(e){
    const t=e.touches[0]; sx=t.clientX; sy=t.clientY; st=Date.now(); edge=(sx<=22);
  }, {passive:true});
  document.addEventListener('touchend', function(e){
    if(sx===null) return; const t=e.changedTouches[0];
    const dx=t.clientX-sx, dy=t.clientY-sy;
    if(edge && dx>56 && Math.abs(dx)>Math.abs(dy)*1.4 && (Date.now()-st)<650){ goBack(); }
    sx=sy=null; edge=false;
  }, {passive:true});
}

function changeDay(delta){
  const d = new Date(state.currentDate);
  d.setDate(d.getDate()+delta);
  state.currentDate = d;
  renderWord();
}
function setFontSize(s){
  state.fontSize = s;
  applyFontSize();
  api.savePrefs({ fontSize:s });
  // 사이즈 버튼만 갱신 — 다시 렌더 안 하고 직접 토글
  document.querySelectorAll('.fs-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.fs-btn.'+s).classList.add('active');
}

  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { medMethod:(m==='simple'?'simple':'lectio') }));

}

async function saveLectioNow(key){
  const data = { lectio_read:'', meditatio1:'', meditatio2:'', meditatio3:'', oratio:'', contemplatio:'', scribo_walk:'', scribo_obey:'', thanks:['','',''], diary:'' };
  document.querySelectorAll(`#view-word .lectio-input`).forEach(el=>{
    const f = el.dataset.field;
    if(f && f.startsWith('thanks')){
      const i = parseInt(f.replace('thanks',''),10);
      data.thanks[i] = el.value;
    }else if(f){
      data[f] = el.value;
    }
  });
  const rd = document.querySelector('#view-word input[name="lectioRead"]:checked');
  if(rd){ data.lectio_read = rd.value; }
  else{
    // 심플 가이드 화면 등 라디오가 없을 때는 기존 저장값 유지
    const prev = (_read(STORAGE_KEYS.lectio, {})[key]) || SEED_LECTIO[key] || {};
    data.lectio_read = prev.lectio_read || '';
  }
  const btn = document.getElementById('lectioSaveBtn');
  if(btn){ btn.disabled = true; btn.textContent = '저장 중…'; }
  const res = await api.saveLectio(key, data);
  if(btn){ btn.disabled = false; btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg> 저장됨`; }
  toast('서버에 저장되었습니다');
  // 단계 도트 갱신
  setTimeout(()=>renderWord(), 800);
}

/* 예수동행일기에 저장 (말씀기록 4단계 안의 일기) */
async function saveDiaryNow(key){
  const el = document.querySelector(`#view-word .diary-input`);
  const text = el ? el.value : '';
  const btn = document.getElementById('diarySaveBtn');
  const status = document.getElementById('diaryStatus');
  const orig = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.textContent = '저장 중…'; }
  const res = await api.saveDiary(key, text);
  if(btn){
    btn.disabled = false;
    btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg> 예수동행일기에 저장됨`;

}

function fmtMin(m){
  if(m >= 60){
    const h = Math.floor(m/60), mm = m%60;
    return mm ? `${h}<em>시간</em> ${mm}<em>분</em>` : `${h}<em>시간</em>`;
  }
  return `${m}<em>분</em>`;
}

/* 7만시간 기도운동 — 특별 행사 카드 (중보기도 페이지 최상단) */
function renderMovementCard(t, pct, pctLabel, mvHoursLabel){
      const barW = Math.max(1.2, pct);
      const distW = t.myDistrict ? Math.max(0.6, barW * (t.myShare/100)) : 0;
      const dh = Math.floor(t.myDistrictMin/60), dm = t.myDistrictMin%60;
      return `
    <div class="movement-card special" id="movementCard">
      <div class="mv-head">
        <div class="mv-title">7만시간 기도운동</div>
        <div class="mv-pct">${mvHoursLabel}</div>
      </div>
      <div class="mv-bar">
        <div class="mv-bar-fill" style="width:${barW.toFixed(2)}%"></div>
        ${distW ? `<div class="mv-bar-fill dist" style="width:${distW.toFixed(2)}%"></div>` : ''}
        ${[1,2,3,4,5,6].map(n => `<span class="mv-bar-tick" style="left:${(n/7*100).toFixed(2)}%"></span>`).join('')}
        ${[1,2,3,4,5,6,7].map(n => `<span class="mv-bar-num" style="left:${((n-0.5)/7*100).toFixed(2)}%">${n}</span>`).join('')}
      </div>
      <span class="mv-bar-unit">단위: 만시간</span>
      <div class="mv-foot">
        <div class="mv-foot-l">달성률 ${pctLabel}%</div>
        <div class="mv-foot-r">목표 ${t.goalHours.toLocaleString()}시간</div>
      </div>

      <div class="mv-stats">
        <div class="mv-stat">
          <div class="mv-stat-lbl"><span class="mv-dot blue"></span>전체 누적</div>
          <div class="mv-stat-num">${t.moveHours.toLocaleString()}<em>시간</em></div>
          <div class="mv-stat-sub blue">✨ 어제보다 +${t.todayMoveHours}시간</div>
        </div>
        ${t.myDistrict ? `
        <div class="mv-stat">
          <div class="mv-stat-lbl"><span class="mv-dot"></span>내 교구 · ${escapeHtml(t.myDistrict)}</div>
          <div class="mv-stat-num">${dh.toLocaleString()}<em>시간</em>${dm ? ` ${dm}<em>분</em>` : ''}</div>
          <div class="mv-stat-sub">전체의 ${t.myShare.toFixed(1)}% · ${t.districtCount}개 교구 중 ${t.myRank}위</div>
        </div>` : `
        <div class="mv-stat mv-nodist" style="margin-top:0" onclick="switchTab('mypage');setTimeout(openProfileEditor,300)">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>교구 등록하면 <strong>내 교구</strong>도 이 그래프에 함께 표시돼요 →</span>
        </div>`}
      </div>
    </div>`;
}

async function openMyRecord(){
  const log = await api.getPrayerLog();
  const t = await api.getPrayerTracking();
  const keys = Object.keys(log).filter(k=>log[k]>0).sort().reverse();
  const rows = keys.length
    ? keys.slice(0,14).map(k=>{
        const [y,m,d] = k.split('-').map(Number);
        const dows=['일','월','화','수','목','금','토'];
        const dow = dows[new Date(y,m-1,d).getDay()];
        const mins = log[k];
        const disp = mins>=60 ? `${Math.floor(mins/60)}시간 ${mins%60? (mins%60)+'분':''}`.trim() : `${mins}분`;
        return `<div style="display:flex;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--line-soft)">
          <span style="font-size:13.5px;color:var(--ink-2)">${m}월 ${d}일 (${dow})</span>

/* ── 목장방 상세 (피드) ─────────────────────────────────────── */
async function openRoom(id){
  state.currentRoom = id;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const view = document.getElementById('view-room-detail');
  view.classList.add('active');
  document.getElementById('viewContainer').scrollTop = 0;
  document.getElementById('writeFab').style.display = 'none';
  view.innerHTML = `<div style="margin:20px 16px"><div class="skeleton" style="height:160px;border-radius:22px"></div></div>`;
  await renderRoomDetail(id);
}

async function renderRoomDetail(id){
  const view = document.getElementById('view-room-detail');
  const [room, posts] = await Promise.all([api.getRoom(id), api.listRoomPosts(id)]);
  if(!room){ switchTab('pray'); return; }
  if(!state.user){ try{ state.user = await api.getUser(); }catch(e){} }
  const myName = (state.user && (state.user.nickname || state.user.name)) || '나';

  // 이번 주 묵상 나눔 현황 — 최근 7일 내 묵상 나눔 여부
  const weekAgo = Date.now() - 86400000*7;
  const sharedWho = {};
  posts.forEach(p=>{ if(p.kind==='lectio' && p.time>weekAgo) sharedWho[p.who]=true; });
  const memberRow = (room.members||[]).slice(0,6).map(m=>{
    const done = !!sharedWho[m];
    const label = (m===myName) ? '나' : m.split(' ')[0];
    return `<div class="rd-week-member ${done?'done':''}">
      <div class="av">${done?'✓':escapeHtml(m.charAt(0))}</div>
      <div class="nm">${escapeHtml(label)}</div>
    </div>`;
  }).join('');

  const feed = posts.length
    ? posts.map(p=>renderRoomPost(p)).join('')
    : `<div class="rd-feed-empty">
        <div class="ill">${ILLUST.empty}</div>
        아직 나눔이 없어요.<br/>오늘의 묵상이나 기도제목으로<br/>첫 나눔을 시작해 보세요.
      </div>`;

  view.innerHTML = `
    <div class="rd-header">
      <button class="rd-back" onclick="closeRoom()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        우리 ${tierLabel('cell')||'목장'}
      </button>
      <div class="rd-title-row">
        <div class="rd-emoji">${room.emoji||'🌿'}</div>
        <div style="flex:1;min-width:0">
          <div class="rd-name">${escapeHtml(room.name)}</div>
          <div class="rd-sub">${escapeHtml(room.desc||'')} · 식구 ${(room.members||[]).length}명</div>
        </div>
      </div>
      <div class="rd-tools">
        <button class="rd-tool primary" onclick="openShareModal(null, '${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          묵상 나누기
        </button>
        <button class="rd-tool" onclick="openRoomPrayerModal('${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="2.2"/></svg>
          기도제목
        </button>
        <button class="rd-tool" onclick="openRoomInfoModal('${room.id}')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          식구·초대
        </button>
      </div>
    </div>

    <div class="rd-week">
      <div class="rd-week-title">이번 주 묵상 나눔 🌱</div>
      <div class="rd-week-row">${memberRow}</div>
    </div>

    <div id="roomFeed">${feed}</div>
    <div class="breath">${BREATH_LEAF}</div>
  `;
}

function closeRoom(){
  state.currentRoom = null;
  switchTab('pray');
}

const ROOM_PART_LABELS = { grace:'받은 은혜', oratio:'말씀기도', oneThing:'One Thing · 오늘의 순종', thanks:'세 가지 감사' };

function renderRoomPost(p){
  let partsHtml = '';
  if(p.kind==='lectio' && p.parts){
    if(p.parts.grace) partsHtml += `<div class="rpost-part grace"><span class="pp-label">${ROOM_PART_LABELS.grace}</span>${escapeHtml(p.parts.grace)}</div>`;
    if(p.parts.oratio) partsHtml += `<div class="rpost-part pray-part"><span class="pp-label">${ROOM_PART_LABELS.oratio}</span>${escapeHtml(p.parts.oratio)}</div>`;
    if(p.parts.oneThing) partsHtml += `<div class="rpost-part"><span class="pp-label">${ROOM_PART_LABELS.oneThing}</span>${escapeHtml(p.parts.oneThing)}</div>`;
    if(p.parts.thanks && p.parts.thanks.length){
      partsHtml += `<div class="rpost-part"><span class="pp-label">${ROOM_PART_LABELS.thanks}</span>${p.parts.thanks.filter(t=>(t||'').trim()).map((t,i)=>`${i+1}. ${escapeHtml(t)}`).join('<br/>')}</div>`;
    }
  }
  const dateRef = (p.kind==='lectio' && p.dateKey && WORD_DATA[p.dateKey])
    ? `<span class="rpost-date-ref">${WORD_DATA[p.dateKey].range || p.dateKey}</span>` : '';
  const comments = (p.comments||[]).map(c=>`
    <div class="rpost-comment">
      <div class="cav">${escapeHtml((c.name||'?').charAt(0))}</div>
      <div class="ctxt"><strong>${escapeHtml(c.name||'')}</strong>${escapeHtml(c.text||'')}</div>
    </div>`).join('');

  return `
  <div class="rpost ${p.kind}" id="rpost-${p.id}">
    <div class="rpost-head">
      <div class="rpost-avatar">${escapeHtml(p.avatar||'성')}</div>
      <div>
        <div class="rpost-name">${escapeHtml(p.who)}</div>
        <div class="rpost-time">${formatRelTime(p.time)}</div>
      </div>
      <span class="rpost-kind">${p.kind==='lectio'?'🌿 묵상 나눔':'🙏 기도제목'}</span>
    </div>
    ${dateRef}
    ${p.body ? `<div class="rpost-body">${escapeHtml(p.body)}</div>` : ''}
    ${partsHtml}
    <div class="rpost-actions">
      <button class="amen-btn ${p.amened?'on':''}" onclick="toggleRoomAmen('${p.id}')">
        ${p.kind==='lectio' ? (p.amened?'🌿 아멘':'아멘') : (p.amened?'🙏 기도했어요':'함께 기도하기')}
      </button>
      <span class="amen-count">${p.amens>0 ? `${p.amens}명` : ''}</span>
      <button class="rpost-comment-btn" onclick="toggleRoomCommentForm('${p.id}')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        댓글 ${(p.comments||[]).length||''}
      </button>
    </div>
    <div class="rpost-comments">${comments}</div>
    <div class="rpost-comment-form" id="rcf-${p.id}" style="display:none">
      <input type="text" id="rci-${p.id}" placeholder="따뜻한 한 마디를 남겨 주세요" onkeydown="if(event.key==='Enter')submitRoomComment('${p.id}')"/>
      <button onclick="submitRoomComment('${p.id}')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>
  </div>`;
}

async function toggleRoomAmen(postId){
  const res = await api.toggleAmen(postId);
  if(res.ok && state.currentRoom){
    if(res.amened) toast('함께해 주셔서 감사합니다 🙏');
    renderRoomDetail(state.currentRoom);
  }
}

function toggleRoomCommentForm(postId){
  const f = document.getElementById('rcf-'+postId);
  if(!f) return;
  const show = f.style.display==='none';
  f.style.display = show ? 'flex' : 'none';
  if(show){ const i = document.getElementById('rci-'+postId); if(i) i.focus(); }
}

async function submitRoomComment(postId){
  const inp = document.getElementById('rci-'+postId);
  const txt = inp ? inp.value.trim() : '';
  if(!txt){ toast('댓글을 입력해 주세요'); return; }
  await api.addRoomComment(postId, txt);
  toast('댓글을 남겼습니다');
  if(state.currentRoom) renderRoomDetail(state.currentRoom);
}

/* ── 식구 · 초대코드 ───────────────────────────────────────── */
async function openRoomInfoModal(roomId){
  const room = await api.getRoom(roomId);
  if(!room) return;
  const myName = (state.user && (state.user.nickname || state.user.name)) || '나';
  const members = (room.members||[]).map(m=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line-soft)">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--sage-pale);color:var(--sage-deep);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${escapeHtml(m.charAt(0))}</div>
      <span style="font-size:13.5px;color:var(--ink)">${escapeHtml(m)}${m===myName?' <span style="color:var(--ink-4);font-size:11px">(나)</span>':''}</span>
      ${m===room.owner ? '<span style="margin-left:auto;font-size:10.5px;font-weight:700;color:var(--sage-deep);background:var(--sage-pale);border-radius:999px;padding:3px 9px">방장</span>':''}
    </div>`).join('');

  document.getElementById('modalContent').innerHTML = `
    <div style="padding:4px 2px">
      <h3 style="font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:3px">${escapeHtml(room.name)}</h3>
      <p style="font-size:12.5px;color:var(--ink-3);margin-bottom:14px">식구 ${(room.members||[]).length}명 · ${room.type==='cell'?('내 '+(tierLabel('cell')||'목장')+' 방'):'소그룹 방'}</p>
      <div class="invite-code-box">
        <div class="code">${escapeHtml(room.code||'')}</div>
        <div class="hint">이 초대코드를 알려 주면 누구나 함께할 수 있어요</div>
        <button class="btn btn-secondary" style="margin-top:12px" onclick="copyInviteCode('${escapeHtml(room.code||'')}')">코드 복사</button>
      </div>
      <div style="font-size:12.5px;font-weight:700;color:var(--ink-3);margin:18px 0 4px">함께하는 식구들</div>
      ${members}
      ${room.type==='group' ? `<button class="btn btn-block btn-secondary" style="margin-top:16px;color:#A8412F" onclick="leaveRoomNow('${room.id}')">방 나가기</button>` : ''}
    </div>
  `;
  openModal();
}

function copyInviteCode(code){
  try{
    navigator.clipboard.writeText(code).then(
      ()=>toast('초대코드가 복사되었습니다'),
      ()=>toast('코드: '+code)
    );
  }catch(e){ toast('코드: '+code); }
}

async function leaveRoomNow(roomId){
  if(!confirm('이 방에서 나가시겠어요?\n(나눔 기록은 방에 남아 있습니다)')) return;
  await api.leaveRoom(roomId);
  closeModal();
  toast('방에서 나왔습니다');
  closeRoom();
}

/* ── 소그룹 방 만들기 / 초대코드 참여 ───────────────────────── */
function openCreateRoomModal(){
  const emojis = ['🕊️','🌿','🌅','📖','🙏','💐'];
  document.getElementById('modalContent').innerHTML = `
    <div class="write-form">
      <h3>소그룹 방 만들기</h3>
      <p class="h-sub">목장 외에도 자유로운 소그룹으로 묵상과 기도를 나눌 수 있어요.</p>
      <label>방 이름</label>
      <input type="text" id="cr-name" maxlength="20" placeholder="예) 수요 성경읽기 모임"/>
      <label>한 줄 소개</label>
      <input type="text" id="cr-desc" maxlength="40" placeholder="예) 매주 수요일 저녁, 함께 말씀을 읽어요"/>
      <label>방 아이콘</label>
      <div class="scope-pick" id="crEmojiPick">
        ${emojis.map((e,i)=>`<label class="${i===0?'on':''}" data-emoji="${e}" style="min-width:46px;justify-content:center"><input type="radio" name="cr-emoji" value="${e}" ${i===0?'checked':''}><span class="lbl" style="font-size:18px">${e}</span></label>`).join('')}
      </div>
      <button class="btn btn-block" style="margin-top:16px" onclick="submitCreateRoom()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        방 만들기
      </button>
    </div>
  `;
  // 이모지 라디오 토글
  document.querySelectorAll('#crEmojiPick label').forEach(function(l){
    l.addEventListener('click', function(){
      document.querySelectorAll('#crEmojiPick label').forEach(x=>x.classList.remove('on'));
      l.classList.add('on');
      l.querySelector('input').checked = true;
    });
  });
  openModal();
}

async function submitCreateRoom(){
  const name = document.getElementById('cr-name').value.trim();
  const desc = document.getElementById('cr-desc').value.trim();
  const emojiEl = document.querySelector('input[name="cr-emoji"]:checked');
  if(!name){ toast('방 이름을 입력해 주세요'); return; }
  const room = await api.createRoom({ name, desc, emoji: emojiEl ? emojiEl.value : '🕊️' });
  closeModal();
  toast(`'${name}' 방이 열렸습니다 · 초대코드 ${room.code}`);
  renderRooms();
  setTimeout(()=>openRoomInfoModal(room.id), 600);
}

function openJoinRoomModal(){
  document.getElementById('modalContent').innerHTML = `
    <div class="write-form">
      <h3>초대코드로 참여</h3>
      <p class="h-sub">방장에게 받은 6자리 초대코드를 입력해 주세요.</p>
      <label>초대코드</label>
      <input type="text" id="jr-code" maxlength="6" placeholder="예) SM2026" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-family:var(--en);font-weight:700;font-size:18px"/>
      <div class="form-hint" style="margin-top:10px">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>

async function submitJoinRoom(){

/* ── 묵상 '목장에 나누기' — 선택 공유 ───────────────────────── */
async function openShareModal(dateKey, preRoomId){
  dateKey = dateKey || formatDateKey(state.currentDate);
  const [lectio, rooms] = await Promise.all([api.getLectio(dateKey), api.listMyRooms()]);
  if(!rooms.length){
    toast('먼저 목장을 등록하거나 소그룹 방에 참여해 주세요');
    return;
  }
  const d = WORD_DATA[dateKey] || {};
  const thanksJoined = (lectio.thanks||[]).filter(t=>(t||'').trim());
  const parts = [
    { key:'grace',    label:'받은 은혜 한 줄',          value:(lectio.meditatio3||'').trim() },
    { key:'oratio',   label:'말씀기도',                  value:(lectio.oratio||'').trim() },
    { key:'oneThing', label:'One Thing · 오늘의 순종',   value:(lectio.contemplatio||'').trim() },
    { key:'thanks',   label:'세 가지 감사',              value:thanksJoined.join(' · ') },
  ];
  const hasAny = parts.some(p=>p.value);

  document.getElementById('modalContent').innerHTML = `
    <div class="write-form">
      <h3>${tierLabel('cell')||'목장'}에 나누기</h3>
      <p class="h-sub">${escapeHtml(d.range || dateKey)} 묵상 중 <strong>나누고 싶은 부분만</strong> 선택해 주세요.<br/>선택하지 않은 기록은 나에게만 남습니다.</p>
      ${hasAny ? `
        <div class="share-pick">
          ${parts.map(p=>`
            <label class="share-pick-item ${p.value?'on':'empty'}">
              <input type="checkbox" data-share="${p.key}" ${p.value?'checked':'disabled'} onchange="this.parentNode.classList.toggle('on', this.checked)"/>
              <div style="flex:1;min-width:0">
                <div class="sp-label">${p.label}</div>
                <div class="sp-preview">${p.value ? escapeHtml(p.value) : '아직 기록하지 않았어요'}</div>
              </div>
            </label>
          `).join('')}
        </div>
        <label>나눌 방</label>
        <select id="share-room">
          ${rooms.map(r=>`<option value="${r.id}" ${r.id===preRoomId?'selected':''}>${escapeHtml(r.name)} (${r.type==='cell'?('내 '+(tierLabel('cell')||'목장')):'소그룹'})</option>`).join('')}

async function submitShare(dateKey){
  const cache = openShareModal._cache || {};
  const lectio = cache.lectio || await api.getLectio(dateKey);
  const checked = Array.from(document.querySelectorAll('input[data-share]:checked')).map(i=>i.dataset.share);
  if(!checked.length){ toast('나눌 항목을 한 가지 이상 선택해 주세요'); return; }
  const roomId = document.getElementById('share-room').value;
  const note = document.getElementById('share-note').value.trim();
  const parts = {};
  if(checked.includes('grace'))    parts.grace = (lectio.meditatio3||'').trim();
  if(checked.includes('oratio'))   parts.oratio = (lectio.oratio||'').trim();
  if(checked.includes('oneThing')) parts.oneThing = (lectio.contemplatio||'').trim();
  if(checked.includes('thanks'))   parts.thanks = (lectio.thanks||[]).filter(t=>(t||'').trim());
  await api.createRoomPost({ roomId, kind:'lectio', body:note, parts, dateKey });
  closeModal();
  toast('목장에 나눴습니다 🌿');
  if(state.currentRoom===roomId){ renderRoomDetail(roomId); }
  else{
    state.togetherTab = 'rooms';
    switchTab('pray');
    setTimeout(()=>openRoom(roomId), 200);
  }
}

  if(scope==='committee'){
    const sel = document.getElementById('wf-committee');
    committee = sel ? sel.value : null;
    if(!committee){ toast('위원회를 선택해 주세요'); return; }

  await api.createPrayer({ scope, who, body, urgent, committee });

  toast('기도제목이 공유되었습니다 🙏');
  state.prayerScope = scope==='self' ? 'self' : 'all';
  renderPray();

async function renderCalendar(){
  const view = document.getElementById('view-calendar');
  const cm = state.calMonth;
  const year = cm.getFullYear();
  const month = cm.getMonth()+1;
  const monthEn = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][month-1];

  view.innerHTML = `
    <div class="cal-header">
      <div class="cal-month-nav">
        <div>
          <div class="cal-month">${year}년 ${month}월</div>
          <div class="cal-month-en">${monthEn} · ${year}</div>
        </div>
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
          <button class="cal-nav-btn" onclick="goToToday()" title="이번 달로"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg></button>
          <button class="cal-nav-btn" onclick="changeMonth(1)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
      </div>
    </div>
    <div class="cal-stats" id="calStats">
      <div class="cal-stat-card"><div class="cal-stat-num">···</div><div class="cal-stat-lbl">완주한 날</div></div>
      <div class="cal-stat-card"><div class="cal-stat-num">···</div><div class="cal-stat-lbl">시작한 날</div></div>
      <div class="cal-stat-card"><div class="cal-stat-num">···</div><div class="cal-stat-lbl">평균 단계</div></div>
    </div>
    <div class="cal-grid-wrap" id="calGrid">
      <div class="skeleton" style="height:320px"></div>
    </div>
    <div class="cal-legend">
      <div class="cal-leg-item"><div class="cal-leg-sw" style="background:var(--sage)"></div>5단계 완주</div>
      <div class="cal-leg-item"><div class="cal-leg-sw" style="background:var(--sage-pale)"></div>일부 진행</div>
      <div class="cal-leg-item"><div class="cal-leg-sw" style="background:var(--sage-dark)"></div>오늘</div>
      <div class="cal-leg-item"><div class="cal-leg-sw" style="background:var(--bg-soft);border:1px solid var(--line)"></div>미시작</div>
    </div>
    ${renderFamilyWorshipSection(year, month)}
  `;

  const prog = await api.getMonthProgress(year, month);
  const today = state.currentDate;
  const todayKey = formatDateKey(today);

  // 통계
  const dayKeys = Object.keys(prog);
  const completed = dayKeys.filter(k=>prog[k].total===5).length;
  const started = dayKeys.filter(k=>prog[k].total>0).length;
  const avgStage = started ? (dayKeys.reduce((s,k)=>s+prog[k].total,0)/started).toFixed(1) : '0';

  document.getElementById('calStats').innerHTML = `
    <div class="cal-stat-card"><div class="cal-stat-num">${completed}</div><div class="cal-stat-lbl">완주한 날</div></div>
    <div class="cal-stat-card"><div class="cal-stat-num">${started}</div><div class="cal-stat-lbl">시작한 날</div></div>
    <div class="cal-stat-card"><div class="cal-stat-num">${avgStage}</div><div class="cal-stat-lbl">평균 단계</div></div>
  `;

  // 그리드
  const firstDay = new Date(year, month-1, 1);
  const lastDay = new Date(year, month, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  const prevMonthLast = new Date(year, month-1, 0).getDate();

  const cells = [];
  // 앞 빈칸 (이전 달)
  for(let i=startDow-1; i>=0; i--){
    cells.push({ d:prevMonthLast - i, outside:true });
  }
  // 현재 달
  for(let d=1; d<=daysInMonth; d++){
    const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const p = prog[key];
    cells.push({ d, key, prog:p, dow:new Date(year, month-1, d).getDay() });
  }
  // 뒤 빈칸
  while(cells.length % 7 !== 0){
    cells.push({ d:cells.length - (startDow + daysInMonth) + 1, outside:true });
  }

  document.getElementById('calGrid').innerHTML = `
    <div class="cal-dow-row">
      <div class="cal-dow sun">일</div>
      <div class="cal-dow">월</div>
      <div class="cal-dow">화</div>
      <div class="cal-dow">수</div>
      <div class="cal-dow">목</div>
      <div class="cal-dow">금</div>
      <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid">
      ${cells.map(function(c){
        if(c.outside){
          return '<div class="cal-cell outside"><div class="cal-cell-inner"><span>'+c.d+'</span><div class="cal-dots"><span class="ct"></span><span class="ct"></span><span class="ct"></span><span class="ct"></span></div></div></div>';
        }
        var isToday = c.key===todayKey;
        var isSun = c.dow===0;
        var p = c.prog;
        var total = p ? p.total : 0;
        var cls = '';
        if(isToday) cls = 'today';
        else if(total===5) cls = 'complete';
        else if(total>0) cls = 'partial';
        if(isSun && !isToday && !cls) cls = 'sunday';
        var dots = '';
        for(var i=1;i<=4;i++){
          dots += '<span class="ct '+(p && p['s'+i]===1?'on':'')+'"></span>';
        }
        return '<div class="cal-cell '+cls+'" onclick="goToDay(\''+c.key+'\')"><div class="cal-cell-inner"><span>'+c.d+'</span><div class="cal-dots">'+dots+'</div></div></div>';
      }).join('')}
    </div>
  `;
}

  const m = new Date(state.calMonth);
  m.setMonth(m.getMonth()+delta);
  state.calMonth = m;
  renderCalendar();

function goToToday(){

/* ============================================================================
   애플풍 스크롤 등장 애니메이션 엔진
   - IntersectionObserver 로 화면에 들어오는 블록을 부드럽게 떠오르게 함
   - MutationObserver 로 각 화면이 다시 그려질 때마다 자동으로 재적용
   ============================================================================ */
var _revealIO = null;

function _collectRevealTargets(view){
  // 화면(view)의 최상위 블록들을 대상으로 하되,
  // 묵상 4단계 폼(.lectio-wrap)은 그 안의 단계 박스를 개별 애니메이션한다.
  var out = [];
  Array.prototype.forEach.call(view.children, function(child){
    if(child.classList && child.classList.contains('lectio-wrap')){
      Array.prototype.forEach.call(child.children, function(c){ out.push(c); });
    }else{
      out.push(child);
    }
  });
  return out;
}

function applyReveal(view){
  if(!_revealIO || !view) return;
  var targets = _collectRevealTargets(view);
  targets.forEach(function(el, i){
    if(!el || el.nodeType !== 1) return;
    if(el.classList.contains('skeleton')) return;     // 스켈레톤은 제외
    if(el.dataset && el.dataset.reveal) return;        // 이미 처리됨
    if(el.querySelector && el.querySelector('.skeleton')) return; // 로딩중 블록 제외
    el.dataset.reveal = '1';
    el.classList.add('reveal');
    el.style.transitionDelay = Math.min(i * 55, 280) + 'ms';
    _revealIO.observe(el);
  });
}

function initRevealEngine(){
  // 기능 미지원 또는 모션 최소화 선호 시: 애니메이션 비활성 (콘텐츠는 그대로 노출)
  if(!('IntersectionObserver' in window)) return;
  try{
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  }catch(e){}

  document.documentElement.classList.add('js-reveal');

  var container = document.getElementById('viewContainer');
  _revealIO = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.classList.add('reveal-in');
        e.target.style.transitionDelay = '';   // 1회성 — 지연 초기화
        _revealIO.unobserve(e.target);
      }
    });
  }, { root: container, rootMargin: '0px 0px -6% 0px', threshold: 0.05 });

  // 각 화면이 새로 그려질 때마다(innerHTML 교체 → childList 변경) 재적용
  document.querySelectorAll('.view').forEach(function(view){
    var mo = new MutationObserver(function(){ applyReveal(view); });
    mo.observe(view, { childList: true });
    applyReveal(view);
  });
}

   ============================================================================ */
async function renderMypage(){
  const view = document.getElementById('view-mypage');
  view.innerHTML = `
    <div class="mypage-header">
      <div class="mypage-title">마이 페이지</div>
      <div class="mypage-sub">나의 묵상 여정과 활동</div>
    </div>
    <div style="margin:0 16px 18px"><div class="skeleton" style="height:180px;border-radius:24px"></div></div>
    <div style="margin:0 16px 18px"><div class="skeleton" style="height:80px;border-radius:14px"></div></div>
  `;

  // 렌더 중 어떤 단계라도 실패해도 스켈레톤이 영구히 남지 않도록 try/catch
  try {
    return await _renderMypageBody(view);
  } catch(e){
    console.error('renderMypage failed:', e);
    view.innerHTML = `
      <div class="mypage-header">
        <div class="mypage-title">마이 페이지</div>
      </div>
      <div style="margin:24px 16px;padding:22px 18px;background:var(--bg-card);border:1px solid var(--line);border-radius:14px;color:var(--ink-2);font-size:13px;line-height:1.7">
        화면을 불러오는 중 문제가 발생했습니다.<br/>
        <button class="btn btn-secondary" style="margin-top:10px" onclick="renderMypage()">다시 시도</button>
        <div style="margin-top:10px;font-size:11px;color:var(--ink-3);font-family:var(--en)">${escapeHtml(String(e && e.message || e))}</div>
      </div>
    `;
  }
}

async function _renderMypageBody(view){
  const [user, prog, activity, prefs] = await Promise.all([
    api.getUser(), api.getMonthProgress(2026, 7), api.getMyActivity(), api.getPrefs()
  ]);
  state.user = user;

  const dayKeys = Object.keys(prog);
  const completed = dayKeys.filter(function(k){ return prog[k].total===5; }).length;
  const started = dayKeys.filter(function(k){ return prog[k].total>0; }).length;
  const avgStage = started ? (dayKeys.reduce(function(s,k){return s+prog[k].total;},0)/started).toFixed(1) : '0';

  // 이번 달 미니 캘린더
  const year = 2026, month = 1;
  const firstDay = new Date(year, month-1, 1);
  const lastDay = new Date(year, month, 0);
  const todayKey = formatDateKey(state.currentDate);
  const cells = [];
  for(let i=0; i<firstDay.getDay(); i++) cells.push({outside:true});
  for(let d=1; d<=lastDay.getDate(); d++){
    const key = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const p = prog[key];
    const t = p ? p.total : 0;
    cells.push({d, key, dow:new Date(year, month-1, d).getDay(), total:t, isToday:key===todayKey});
  }
  const miniCal = cells.map(function(c){
    if(c.outside) return '<div class="mc-cell outside"></div>';
    let cls = '';
    if(c.total===5) cls = 'complete';
    else if(c.total>0) cls = 'partial';
    if(c.dow===0) cls += ' sunday';
    if(c.isToday) cls += ' today';
    return '<div class="mc-cell '+cls+'" onclick="goToDay(\''+c.key+'\')">'+c.d+'</div>';
  }).join('');

  const isLoggedIn = user.loggedIn;
  const profileAvatar = user.avatar || '성';
  const affilLine = [user.district, user.grove, user.cell].filter(Boolean).join(' · ') || '소속을 등록해 주세요';
  const subscribed = !!user.subscribed;

  view.innerHTML = `
    <div class="mypage-header">
      <div class="mypage-title">마이 페이지</div>
      <div class="mypage-sub">나의 묵상 여정과 활동</div>
    </div>

    <div class="profile-card">
      <div class="profile-row">
        <div class="profile-avatar-lg">${profileAvatar}</div>
        <div style="flex:1;min-width:0">
          <div class="profile-name">${escapeHtml(user.nickname || user.name || '성도님')}
            ${subscribed
              ? '<span class="badge-pro">PRO · 책자 구독</span>'
              : '<span class="badge-free">FREE</span>'}
          </div>
          <div class="profile-meta">${escapeHtml(affilLine)}</div>
          <div class="profile-meta" style="margin-top:2px">${getChurchName()} · 시작일 ${new Date(user.joinedAt).toLocaleDateString('ko-KR',{year:'numeric',month:'short',day:'numeric'})}</div>
        </div>
      </div>
      <div class="profile-actions">
        <button class="profile-action primary" onclick="openProfileEditor()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          프로필 편집
        </button>
        ${isLoggedIn
          ? '<button class="profile-action" onclick="doLogout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>로그아웃</button>'
          : '<button class="profile-action" onclick="switchTab(\'login\')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>로그인</button>'
        }
      </div>
    </div>

    <!-- 책자 구독 / 무료 사용 안내 카드 -->
    <div class="sub-card ${subscribed?'on':''}">
      <div class="sub-card-top">
        <div class="sub-icon">${subscribed ? '✦' : '+'}</div>
        <div class="sub-text">
          <div class="sub-title">${subscribed ? '말씀함께 책자 구독 중' : '책자 구독으로 모든 기능 열기'}</div>
          <div class="sub-desc">${subscribed
            ? '종이 책자를 매달 받아보시는 동안 앱의 모든 기능을 자유롭게 이용하실 수 있습니다.'
            : '책자 유료 구독자는 앱을 무료로 사용하실 수 있습니다.<br/>무료 이용 시 묵상 5단계(<em>말씀기록</em>) 입력이 제한됩니다.'}</div>
        </div>
      </div>
      <button class="sub-toggle" onclick="toggleSubscription()">
        ${subscribed ? '구독 해지 (데모)' : '책자 구독 신청'}

    <div class="my-stats">

        <div class="menu-text"><div class="menu-ttl">묵상 캘린더</div><div class="menu-sub">월별 4단계 진행 한눈에 보기</div></div>

        <div class="menu-text"><div class="menu-ttl">내가 함께 기도한 목록</div><div class="menu-sub">${activity.prayedCount}건의 중보 활동</div></div>
        <div class="menu-right"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>

        <div class="menu-ic plum"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
        <div class="menu-text"><div class="menu-ttl">좋아요한 칼럼</div><div class="menu-sub">${activity.likedColumns.length}편</div></div>

/* ─────────────────────────────────────────────────────────────
   프로필 편집 모달 — 닉네임/소속/연락처/주소
   ───────────────────────────────────────────────────────────── */
function openProfileEditor(){
  const u = state.user || {};
  const districts = ORG_DATA.districts;
  const committeeNames = ORG_DATA.committees.map(function(c){ return c.name; });

  // 현재 선택된 교구·초원에 따라 다음 단계 옵션 산출
  const curDistrict = districts.find(function(d){ return d.name===u.district; });
  const curGroves = curDistrict ? curDistrict.groves : [];
  const curGrove = curGroves.find(function(g){ return g.name===u.grove; });
  const curCells = curGrove ? curGrove.cells : [];

  // 권역 라벨용 — 교구 옆에 (성남교구) 식 보조 표시
  function distLabel(d){ return d.name + (d.branch ? '  · '+d.branch : ''); }

  document.getElementById('modalContent').innerHTML = `
    <div class="write-form profile-editor">
      <h3>프로필 편집</h3>
      <p class="h-sub">교회 소속과 연락처를 등록해 주세요. 중보기도 가시 범위와 책자 배송에 사용됩니다.</p>

      <label>닉네임 <span class="lbl-aside">앱에서 표시되는 이름</span></label>
      <input type="text" id="pf-nickname" placeholder="예) 선목지기" maxlength="14" value="${escapeHtml(u.nickname||'')}"/>

      <div class="form-section-title">교회 소속</div>

      <label>${tierLabel('zone')||'교구'}</label>
      <select id="pf-district" onchange="onDistrictChange()">
        <option value="">선택해 주세요</option>
        ${districts.map(function(d){
          return '<option value="'+escapeHtml(d.name)+'" '+(u.district===d.name?'selected':'')+'>'+escapeHtml(distLabel(d))+'</option>';
        }).join('')}
      </select>

      <label>${tierLabel('grove')||'초원'}</label>
      <select id="pf-grove" onchange="onGroveChange()" ${curGroves.length?'':'disabled'}>
        <option value="">${curGroves.length?'선택해 주세요':'교구를 먼저 선택'}</option>
        ${curGroves.map(function(g){
          return '<option value="'+escapeHtml(g.name)+'" '+(u.grove===g.name?'selected':'')+'>'+escapeHtml(g.name)+'</option>';
        }).join('')}
      </select>

      <label>${tierLabel('cell')||'목장'}</label>
      <select id="pf-cell" ${curCells.length?'':'disabled'}>
        <option value="">${curCells.length?'선택해 주세요':'초원을 먼저 선택'}</option>
        ${curCells.map(function(c){
          return '<option value="'+escapeHtml(c)+'" '+(u.cell===c?'selected':'')+'>'+escapeHtml(c)+'</option>';
        }).join('')}
      </select>

      <label>위원회 <span class="lbl-aside">복수 선택 가능 · 조직도 14개 위원회</span></label>
      <div class="committee-grid" id="pf-committees">
        ${committeeNames.map(function(name){
          const on = (u.committees||[]).indexOf(name)>=0;
          return '<label class="chk-chip '+(on?'on':'')+'"><input type="checkbox" value="'+escapeHtml(name)+'" '+(on?'checked':'')+' onchange="toggleChip(this)"><span>'+escapeHtml(name)+'</span></label>';
        }).join('')}
      </div>

      <div class="form-section-title">연락 / 배송</div>
      <label>휴대전화</label>
      <input type="tel" id="pf-phone" placeholder="010-0000-0000" inputmode="tel" value="${escapeHtml(u.phone||'')}"/>

      <label>우편번호</label>
      <input type="text" id="pf-zip" placeholder="예) 13594" inputmode="numeric" maxlength="6" value="${escapeHtml(u.zip||'')}"/>

      <label>주소 <span class="lbl-aside">말씀함께 책자 배송지</span></label>
      <input type="text" id="pf-address" placeholder="예) 경기도 성남시 분당구 ○○로 12" value="${escapeHtml(u.address||'')}"/>

      <label>상세주소</label>
      <input type="text" id="pf-address-detail" placeholder="예) 101동 1004호" value="${escapeHtml(u.addressDetail||'')}"/>

      <div class="form-hint">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        주소는 책자 발송에만 사용되며 외부에 공개되지 않습니다.
      </div>

      <button class="btn btn-block" style="margin-top:18px" onclick="saveProfileEditor()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
        저장
      </button>
    </div>
  `;
  openModal();
}

function toggleChip(inputEl){
  if(inputEl && inputEl.parentNode){
    inputEl.parentNode.classList.toggle('on', inputEl.checked);
  }
}

function onDistrictChange(){
  const sel = document.getElementById('pf-district');
  const dist = ORG_DATA.districts.find(function(d){ return d.name===sel.value; });
  const groveSel = document.getElementById('pf-grove');
  const cellSel  = document.getElementById('pf-cell');
  if(!dist){
    groveSel.innerHTML = '<option value="">교구를 먼저 선택</option>';
    groveSel.disabled = true;
    cellSel.innerHTML = '<option value="">초원을 먼저 선택</option>';
    cellSel.disabled = true;
    return;
  }
  groveSel.disabled = false;
  groveSel.innerHTML = '<option value="">선택해 주세요</option>' + dist.groves.map(function(g){
    return '<option value="'+escapeHtml(g.name)+'">'+escapeHtml(g.name)+'</option>';
  }).join('');
  cellSel.innerHTML = '<option value="">초원을 먼저 선택</option>';
  cellSel.disabled = true;
}

function onGroveChange(){
  const dsel = document.getElementById('pf-district');
  const gsel = document.getElementById('pf-grove');
  const cellSel = document.getElementById('pf-cell');
  const dist = ORG_DATA.districts.find(function(d){ return d.name===dsel.value; });
  const grove = dist ? dist.groves.find(function(g){ return g.name===gsel.value; }) : null;
  if(!grove){
    cellSel.innerHTML = '<option value="">초원을 먼저 선택</option>';
    cellSel.disabled = true;
    return;
  }
  cellSel.disabled = false;
  cellSel.innerHTML = '<option value="">선택해 주세요</option>' + grove.cells.map(function(c){
    return '<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>';
  }).join('');
}

async function saveProfileEditor(){
  const nickname = document.getElementById('pf-nickname').value.trim();
  const district = document.getElementById('pf-district').value;
  const grove    = document.getElementById('pf-grove').value;
  const cell     = document.getElementById('pf-cell').value;
  const committees = Array.from(document.querySelectorAll('#pf-committees input[type=checkbox]:checked')).map(function(i){ return i.value; });
  const phone   = document.getElementById('pf-phone').value.trim();
  const zip     = document.getElementById('pf-zip').value.trim();
  const address = document.getElementById('pf-address').value.trim();
  const addressDetail = document.getElementById('pf-address-detail').value.trim();

  if(!nickname){ toast('닉네임을 입력해 주세요'); return; }

  const u = await api.saveProfile({
    nickname, district, grove, cell, committees,
    phone, zip, address, addressDetail,
    loggedIn:true,
  });
  state.user = u;
  closeModal();
  toast('프로필이 저장되었습니다');
  renderMypage();
}

async function toggleSubscription(){
  const cur = state.user || {};
  if(cur.subscribed){
    if(!confirm('책자 구독을 해지하시겠어요?\n\n무료 사용자로 전환되며 묵상 4단계 입력 등 일부 기능이 제한됩니다.')) return;
  }else{
    if(!confirm('말씀함께 책자 구독을 신청하시겠어요?\n\n(데모: 실제 결제 없이 PRO 권한이 즉시 적용됩니다)')) return;
  }
  const u = await api.toggleSubscription();
  state.user = u;
  toast(u.subscribed ? '책자 구독이 시작되었습니다 — PRO 권한 적용' : '무료 사용자로 전환되었습니다');
  renderMypage();
}

async function doLogout(){
  if(!confirm('로그아웃 하시겠어요?\n(활동 기록은 그대로 유지됩니다)')) return;
  await api.logout();
  state.user = await api.getUser();
  toast('로그아웃 되었습니다');
  renderMypage();
}

function setChurchName(v){
  const name=(v||'').trim();
  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { churchName:name }));
  toast(name ? `'${name}'(으)로 저장했습니다` : '교회 이름을 비웠습니다');
}
function setLang(l){
  _write(STORAGE_KEYS.prefs, Object.assign({}, getPrefsSync(), { lang:l }));
  applyI18n();
  if(state && state.tab){ try{ switchTab(state.tab); }catch(e){} }
  toast(l==='ko'?'한국어로 전환했습니다': (l==='en'?'Switched to English · 메뉴 적용됨, 콘텐츠 번역 준비 중':'已切换到中文 · 菜单已应用，内容翻译准备中'));
}

async function togglePref(key, el){
  el.classList.toggle('on');
  const prefs = await api.getPrefs();
  prefs[key] = el.classList.contains('on');
  await api.savePrefs(prefs);
  toast(prefs[key] ? '활성화되었습니다' : '비활성화되었습니다');
}

async function submitLogin(){
  const name = document.getElementById('lg-name').value.trim();
  if(!name){ toast('이름을 입력해 주세요'); return; }
  await api.login(name, '');
  state.user = await api.getUser();
  toast('환영합니다, '+name+' 님!');
  switchTab('mypage');
  // 처음 로그인한 사용자는 곧바로 프로필 편집기로 안내
  setTimeout(function(){
    const u = state.user || {};
    if(!u.district && !u.cell){
      openProfileEditor();
    }
  }, 400);
}


/* ============================================================================
   기도 작성 — 스코프 선택 토글 (`:has()` 폴백)
   ============================================================================ */
function pickScope(el, scope){
  var pick = document.getElementById('wfScopePick');
  if(!pick) return;
  var labels = pick.getElementsByTagName('label');
  for(var i=0;i<labels.length;i++){ labels[i].className = labels[i].className.replace(/\bon\b/g,'').trim(); }
  el.className = (el.className+' on').trim();
  var radio = el.getElementsByTagName('input')[0];
  if(radio) radio.checked = true;
}

/* ============================================================================
   카톡 인앱 브라우저 감지 + 외부 브라우저 유도
   ============================================================================ */
function isKakaoInApp(){
  try{
    var ua = (navigator && navigator.userAgent) ? navigator.userAgent : '';
    return /KAKAOTALK/i.test(ua);
  }catch(e){ return false; }
}

function openExternal(){
  try{
    var url = location.href;
    var ua = navigator.userAgent || '';
    var isAndroid = /Android/i.test(ua);
    if(isAndroid){
      // 카톡 안드로이드 인앱 → 크롬 인텐트
      location.href = 'intent://' + url.replace(/^https?:\/\//,'') + '#Intent;scheme=https;package=com.android.chrome;end';
    }else{
      // 카톡 iOS 인앱 → 사파리로 빠지는 트릭 (사용자가 우측 상단 ··· → Safari로 열기를 누르도록 안내)
      alert('우측 상단 ··· 메뉴 → "Safari로 열기"를 선택해 주세요.\n\n(또는 URL을 길게 눌러 복사한 뒤 Safari 주소창에 붙여넣기)');
    }
  }catch(e){
    alert('URL을 복사한 뒤 Safari/Chrome에서 열어 주세요.');
  }
}

function dismissKakaoBanner(){
  var b = document.getElementById('kakaoBanner');
  if(b) b.className = 'kakao-banner';
}

function checkBrowser(){
  if(!isKakaoInApp()) return;          // 카톡 인앱이 아니면 배너 없음
  var b   = document.getElementById('kakaoBanner');
  var msg = document.getElementById('kakaoBannerMsg');
  if(!b || !msg) return;

  if(safeStore.available){
    // 카톡 인앱에서도 정상 동작 → 안심 안내만 (닫기 가능)
    msg.textContent = '카카오톡에서 바로 열렸습니다. 그대로 이용하셔도 됩니다.';
    b.className = 'kakao-banner show';
    // 정상 동작 시 5초 후 자동으로 닫아 화면을 가리지 않음
    setTimeout(dismissKakaoBanner, 5000);
  }else{
    // 저장소가 막힌 환경 → 기록 유지 안내
    msg.textContent = '이 화면에서도 사용 가능하지만, 작성한 기록을 안전하게 저장하려면 외부 브라우저를 권장합니다.';
    b.className = 'kakao-banner show';
  }
}

/* ============================================================================
   초기화 — 카톡 인앱 브라우저에서도 동작하도록 견고화
   ============================================================================ */
function init(){
  migratePrayersSeed();
  checkBrowser();
  try{ bindEdgeBack(); }catch(e){}
  try{ initRevealEngine(); }catch(e){}
  showSync(true);
  // API 호출이 실패해도 UI는 무조건 렌더
  var done = 0, total = 2;
  function step(){
    done++;
    if(done >= total){
      try{ applyFontSize(); }catch(e){}
      try{ showSync(false); }catch(e){}
      try{ render(); }catch(e){
        // render 자체가 실패해도 기본 UI는 보이도록 폴백
        try{
          var v = document.getElementById('view-today');
          if(v) v.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--ink-3)"><p style="font-size:14px;line-height:1.7">화면을 그리는 중 문제가 발생했습니다.<br/>외부 브라우저(Safari/Chrome)에서 열어 주세요.</p><button class="btn" style="margin-top:14px" onclick="openExternal()">외부 브라우저로 열기</button></div>';
        }catch(e2){}
      }
    }
  }
  try{
    api.getUser().then(function(u){ state.user = u; step(); }, function(){ step(); });
  }catch(e){ step(); }
  try{
    api.getPrefs().then(function(p){ state.fontSize = (p && p.fontSize) || 'm'; step(); }, function(){ step(); });
  }catch(e){ step(); }
}

/* DOMContentLoaded가 이미 발생한 뒤 스크립트가 평가될 수도 있으므로 안전하게 분기 */
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
}else{
  init();
}
</script>

<script>
/* ── v0.95: Lucide 아이콘 자동 렌더링 ─────────────────────────
   동적으로 추가되는 <i data-lucide="..."> 아이콘을 자동 변환 */
(function(){
  if(typeof lucide === 'undefined') return;
  let raf = null;
  const render = () => { raf = null; try{ lucide.createIcons(); }catch(e){} };
  render();
  new MutationObserver(() => {
    if(!raf) raf = requestAnimationFrame(render);
  }).observe(document.body, { childList:true, subtree:true });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
